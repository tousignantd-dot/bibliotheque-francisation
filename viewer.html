<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activité interactive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0f1117; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .bar {
      background: rgba(255,255,255,.05); border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 0 20px; height: 52px; display: flex; align-items: center;
      justify-content: space-between; gap: 16px; flex-shrink: 0;
    }
    .bar-title { font-size: 14px; font-weight: 600; color: #f1f5f9; letter-spacing: -.2px; }
    .bar-right { display: flex; align-items: center; gap: 12px; }

    .status-badges { display: flex; gap: 8px; }
    .badge {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
      border: 1px solid; transition: all .3s ease;
    }
    .badge.pending { color: #64748b; border-color: #1e293b; background: #0f172a; }
    .badge.done { color: #22c55e; border-color: #14532d; background: #052e16; }
    .badge svg { width: 11px; height: 11px; }

    .btn-back {
      font-size: 12px; font-weight: 600; color: #94a3b8;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
      border-radius: 6px; padding: 5px 12px; cursor: pointer;
      font-family: inherit; transition: all .15s; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-back:hover { background: rgba(255,255,255,.12); color: #f1f5f9; }

    iframe {
      flex: 1; width: 100%; border: none; background: #fff;
    }
  </style>
</head>
<body>

<div class="bar">
  <span class="bar-title" id="actTitle">Activité interactive</span>
  <div class="bar-right">
    <div class="status-badges">
      <span class="badge pending" id="badgeDialogue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        Dialogue
      </span>
      <span class="badge pending" id="badgeExercise">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Exercices
      </span>
    </div>
    <a href="javascript:history.back()" class="btn-back">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </a>
  </div>
</div>

<iframe id="actFrame" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>

<script>
  const params = new URLSearchParams(location.search);
  const src        = params.get('src') || '';
  const activityId = parseInt(params.get('activityId')) || null;
  const title      = params.get('title') || 'Activité interactive';
  const code       = params.get('code') || '';

  document.getElementById('actTitle').textContent = title;
  document.getElementById('actFrame').src = src;

  // ── Suivi d'événements ──────────────────────────────────────────────────

  const tracked = { dialogue_listened: false, exercise_completed: false };

  async function track(event, extra = {}) {
    if (tracked[event]) return;
    tracked[event] = true;

    // Mise à jour visuelle immédiate
    if (event === 'dialogue_listened') markDone('badgeDialogue');
    if (event === 'exercise_completed') markDone('badgeExercise');

    try {
      await fetch('/api/student/progress', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, activityId, activityTitle: title, event, ...extra }),
      });
    } catch(e) { /* silencieux */ }
  }

  function markDone(id) {
    const el = document.getElementById(id);
    el.classList.remove('pending');
    el.classList.add('done');
  }

  // Écouter les messages postMessage venant de l'iframe
  window.addEventListener('message', e => {
    const d = e.data;
    if (!d || !d.lms) return;
    if (d.event === 'dialogue_listened') track('dialogue_listened');
    if (d.event === 'exercise_completed') markDone('badgeExercise');
  });

  // Enregistrer l'ouverture (si pas déjà fait par eleve.html)
  if (code && activityId) {
    fetch('/api/student/progress', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, activityId, activityTitle: title, event: 'file_opened' }),
    }).catch(() => {});
  }
</script>
</body>
</html>
