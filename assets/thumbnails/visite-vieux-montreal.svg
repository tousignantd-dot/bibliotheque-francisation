<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B8DBF"/>
      <stop offset="1" stop-color="#2C5282"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>

  <!-- Basilique stylisée -->
  <g transform="translate(100,60)">
    <!-- Clocher -->
    <rect x="45" y="0" width="20" height="60" fill="#D4AF7A"/>
    <!-- Croix sommet -->
    <line x1="55" y1="5" x2="55" y2="15" stroke="#D4AF7A" stroke-width="2"/>
    <line x1="50" y1="10" x2="60" y2="10" stroke="#D4AF7A" stroke-width="2"/>

    <!-- Corps basilique -->
    <polygon points="20,60 90,60 95,120 15,120" fill="#8B6F47"/>
    <rect x="20" y="60" width="70" height="60" fill="#A0826D"/>

    <!-- Portes -->
    <rect x="35" y="95" width="10" height="25" fill="#4A4A4A"/>
    <rect x="55" y="95" width="10" height="25" fill="#4A4A4A"/>

    <!-- Fenêtres -->
    <circle cx="30" cy="80" r="4" fill="#FFD700"/>
    <circle cx="60" cy="80" r="4" fill="#FFD700"/>
    <circle cx="30" cy="100" r="4" fill="#FFD700"/>
    <circle cx="60" cy="100" r="4" fill="#FFD700"/>
  </g>

  <!-- Bâtiments anciens à gauche -->
  <g transform="translate(20,140)">
    <rect x="0" y="0" width="35" height="60" fill="#9B7653" stroke="#6B5341" stroke-width="2"/>
    <rect x="40" y="5" width="35" height="55" fill="#A88B6E" stroke="#6B5341" stroke-width="2"/>

    <!-- Fenêtres -->
    <rect x="5" y="10" width="6" height="6" fill="#E8D5B7"/>
    <rect x="15" y="10" width="6" height="6" fill="#E8D5B7"/>
    <rect x="25" y="10" width="6" height="6" fill="#E8D5B7"/>
    <rect x="5" y="25" width="6" height="6" fill="#E8D5B7"/>
    <rect x="15" y="25" width="6" height="6" fill="#E8D5B7"/>
    <rect x="25" y="25" width="6" height="6" fill="#E8D5B7"/>

    <rect x="45" y="15" width="6" height="6" fill="#E8D5B7"/>
    <rect x="55" y="15" width="6" height="6" fill="#E8D5B7"/>
    <rect x="65" y="15" width="6" height="6" fill="#E8D5B7"/>
  </g>

  <!-- Rue pavée -->
  <line x1="0" y1="210" x2="400" y2="210" stroke="#D4AF7A" stroke-width="2"/>
  <circle cx="25" cy="218" r="2" fill="#A0826D"/>
  <circle cx="50" cy="220" r="2" fill="#A0826D"/>
  <circle cx="75" cy="218" r="2" fill="#A0826D"/>
  <circle cx="100" cy="220" r="2" fill="#A0826D"/>
  <circle cx="125" cy="218" r="2" fill="#A0826D"/>
  <circle cx="150" cy="220" r="2" fill="#A0826D"/>
  <circle cx="175" cy="218" r="2" fill="#A0826D"/>
  <circle cx="200" cy="220" r="2" fill="#A0826D"/>
  <circle cx="225" cy="218" r="2" fill="#A0826D"/>
  <circle cx="250" cy="220" r="2" fill="#A0826D"/>
  <circle cx="275" cy="218" r="2" fill="#A0826D"/>
  <circle cx="300" cy="220" r="2" fill="#A0826D"/>
  <circle cx="325" cy="218" r="2" fill="#A0826D"/>
  <circle cx="350" cy="220" r="2" fill="#A0826D"/>
  <circle cx="375" cy="218" r="2" fill="#A0826D"/>

  <!-- Titre -->
  <text x="200" y="45" font-family="Nunito, Arial, sans-serif" font-size="28" font-weight="900" fill="#fff" text-anchor="middle">Visite du Vieux-Montréal</text>
  <text x="200" y="235" font-family="Nunito, Arial, sans-serif" font-size="13" font-weight="700" fill="#B3D9FF" text-anchor="middle">Histoire · Lieux · Culture · Conseils</text>
</svg>
