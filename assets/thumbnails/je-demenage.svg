      <stop offset="0" stop-color="#7B4F9E"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- maison -->
  <g transform="translate(60,70)">
    <polygon points="70,0 140,55 0,55" fill="#FCA5A5"/>
    <rect x="15" y="55" width="110" height="80" fill="#FDE68A"/>
    <rect x="55" y="85" width="30" height="50" fill="#92400E"/>
    <rect x="25" y="70" width="22" height="22" fill="#BFDBFE"/>
    <rect x="93" y="70" width="22" height="22" fill="#BFDBFE"/>
  </g>
  <!-- boîtes -->
  <g transform="translate(230,110)">
    <rect x="0" y="40" width="60" height="55" rx="4" fill="#D6A05C" stroke="#92561B" stroke-width="3"/>
    <line x1="30" y1="40" x2="30" y2="95" stroke="#92561B" stroke-width="3"/>
    <rect x="20" y="0" width="55" height="45" rx="4" fill="#E8B878" stroke="#92561B" stroke-width="3"/>
    <line x1="47" y1="0" x2="47" y2="45" stroke="#92561B" stroke-width="3"/>
