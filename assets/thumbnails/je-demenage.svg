  </g>
  <text x="200" y="45" font-family="Nunito, Arial, sans-serif" font-size="30" font-weight="900" fill="#fff" text-anchor="middle">Je déménage !</text>
  <text x="200" y="235" font-family="Nunito, Arial, sans-serif" font-size="15" font-weight="700" fill="#E9D5FF" text-anchor="middle">Louer · Meubler · Déménager · Célébrer</text>
