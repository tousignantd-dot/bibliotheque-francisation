<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7B4F9E"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- croix médicale -->
  <g transform="translate(255,95)">
    <circle cx="45" cy="45" r="60" fill="#fff" opacity="0.12"/>
    <rect x="30" y="8" width="30" height="74" rx="6" fill="#FCA5A5"/>
    <rect x="8" y="30" width="74" height="30" rx="6" fill="#FCA5A5"/>
  </g>
  <!-- stéthoscope stylisé -->
  <g transform="translate(70,120)" fill="none" stroke="#C3A8E0" stroke-width="7" stroke-linecap="round">
    <path d="M10 10 v40 a35 35 0 0 0 70 0 v-40"/>
    <circle cx="10" cy="10" r="6" fill="#C3A8E0"/>
    <circle cx="80" cy="10" r="6" fill="#C3A8E0"/>
    <circle cx="45" cy="95" r="16" fill="#FDE68A" stroke="#FDE68A"/>
  </g>
  <text x="30" y="48" font-family="Nunito, Arial, sans-serif" font-size="30" font-weight="900" fill="#fff">Parler de sa santé</text>
  <text x="200" y="235" font-family="Nunito, Arial, sans-serif" font-size="14" font-weight="700" fill="#E9D5FF" text-anchor="middle">Symptômes · Médecin · Médicaments · Prévention</text>
</svg>
