document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

10px;padding:10px 18px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .15s}\n.btn:hover{background:rgba(255,255,255,.3)}\n\n/* SECTIONS */\n.sec{max-width:1500px;margin:0 auto;padding:30px 36px}\n.sec-lbl{display:flex;align-items:center;gap:14px;margin-bottom:20px}\n.sec-num{width:40px;height:40px;border-radius:50%;background:#E0662E;color:#fff;font-weight:900;font-size:19px;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.sec-title{font-size:24px;font-weight:900;color:#3A2A1E}\n.sec-instr{font-size:15px;color:#A5764F;font-weight:700;margin-left:auto;font-style:italic}\n\n/* PROJET / INTRO */\n#projet{background:linear-gradient(180deg,#FFE7CC,#FFF3E4);border-bottom:1px solid #F3D3AE}\n.projet-card{background:#fff;border:2px solid #F3D3AE;border-radius:16px;padding:28px 32px;display:flex;gap:32px;align-items:center;box-shadow:0 8px 30px rgba(184,72,27,.12)}\n.tape{flex:0 0 360px;background:#FFF3E4;border:2px solid #E0662E;border-radius:14px;padding:22px;text-align:center}\n.tape-lbl{font-weight:900;font-size:13px;color:#B8481B;letter-spacing:.12em;margin-bottom:12px;text-transform:uppercase}\n.tape audio{width:100%}\n.tape-warn{font-size:11.5px;color:#B79A80;margin-top:10px;font-style:italic}\n.projet-txt{flex:1}\n.projet-txt h3{font-family:'Pacifico',cursive;font-size:22px;color:#E0662E;margin-bottom:12px}\n.projet-txt p{font-size:16.5px;line-height:1.65;color:#4A3626;margin-bottom:8px}\n.projet-txt strong{color:#3A2A1E}\n.gram-note{background:#E9F6F2;border-left:4px solid #1F8A8F;border-radius:0 8px 8px 0;padding:12px 16px;margin-top:14px;font-size:14px;color:#2C5F5A;line-height:1.55}\n.gram-note b{color:#184D48}\n\n/* DIALOGUES */\n#dial-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}\n@media(max-width:1100px){#dial-grid{grid-template-columns:1fr}}\n.dial{background:#fff;border:2px solid #F3D3AE;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;box-shadow:0 3px 12px rgba(184,72,27,.08)}\n.dial:hover{transform:translateY(-4px);border-color:#E0662E;box-shadow:0 10px 24px rgba(184,72,27,.18)}\n.dial-head{padding:18px 22px;background:linear-gradient(150deg,#1F8A8F,#166B6F);color:#fff;position:relative}\n.dial:nth-child(2) .dial-head{background:linear-gradient(150deg,#E0662E,#C24E1E)}\n.dial:nth-child(3) .dial-head{background:linear-gradient(150deg,#C98A1E,#A96F12)}\n.dial-num{font-size:11px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;opacity:.85;margin-bottom:4px}\n.dial-title{font-size:19px;font-weight:900;line-height:1.2}\n.dial-goal{font-size:12.5px;font-weight:700;opacity:.9;margin-top:6px}\n.dial-body{padding:18px 22px}\n.dial-voix{font-size:13px;color:#A5764F;font-weight:800;margin-bottom:10px}\n.dial-cta{font-size:12.5px;font-weight:800;color:#E0662E;text-transform:uppercase;letter-spacing:.1em}\n.dial.revealed .dial-cta{display:none}\n.dial-lines{display:none;margin-top:6px}\n.dial.revealed .dial-lines{display:block;animation:slideDown .3s ease-out}\n@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}\n.line-row{display:flex;gap:10px;margin-bottom:9px;font-size:14.5px;line-height:1.5}\n.who{flex:0 0 62px;font-weight:900;color:#166B6F}\n.dial:nth-child(2) .who{color:#C24E1E}\n.dial:nth-child(3) .who{color:#A96F12}\n.said{color:#4A3626}\n\n/* CLASSER (interactif) */\n#classer{background:#FFE7CC;border-top:1px solid #F3D3AE;border-bottom:1px solid #F3D3AE}\n.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:18px}\n.legend span{font-size:13px;font-weight:800;padding:5px 12px;border-radius:20px}\n.lg-inv{background:#DDEFF0;color:#166B6F}\n.lg-pro{background:#FBE2D3;color:#B8481B}\n.lg-com{background:#FBEFCF;color:#8A6410}\n.cl-list{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}\n@media(max-width:1000px){.cl-list{grid-template-columns:1fr}}\n.cl-row{background:#fff;border:2px solid #F3D3AE;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(184,72,27,.06)}\n.cl-phrase{flex:1;font-size:16px;font-weight:800;color:#3A2A1E}\n.cl-btns{display:flex;gap:6px}\n.cl-btn{border:2px solid #E9D2B6;background:#FFF7EE;border-radius:8px;padding:7px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;color:#A5764F;transition:all .12s;white-space:nowrap}\n.cl-btn:hover{border-color:#E0662E}\n.cl-btn.good{background:#DBEFD8;border-color:#2E9E5B;color:#1E7040}\n.cl-btn.bad{background:#F5DAD8;border-color:#D64545;color:#9B2B2B}\n\n/* VOCABULAIRE */\n#vocab-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}\n@media(max-width:1200px){#vocab-grid{grid-template-columns:repeat(2,1fr)}}\n@media(max-width:640px){#vocab-grid{grid-template-columns:1fr}}\n.voc{background:#fff;border:2px solid #F3D3AE;border-radius:14px;padding:18px 20px;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .2s;box-shadow:0 3px 12px rgba(184,72,27,.08);min-height:96px}\n.voc:hover{transform:translateY(-3px);border-color:#1F8A8F;box-shadow:0 10px 24px rgba(184,72,27,.16)}\n.voc-word{font-size:18px;font-weight:900;color:#166B6F;display:flex;align-items:center;gap:9px}\n.voc-word .em{font-size:22px}\n.voc-cta{font-size:11.5px;font-weight:800;color:#A5764F;text-transform:uppercase;letter-spacing:.1em;margin-top:8px}\n.voc.revealed .voc-cta{display:none}\n.voc-def{display:none;margin-top:10px}\n.voc.revealed .voc-def{display:block;animation:slideDown .3s ease-out}\n.voc-def p{font-size:13.5px;color:#4A3626;line-height:1.5}\n.voc-def .ex{font-size:12.5px;color:#A5764F;font-style:italic;margin-top:6px;border-top:1px dotted #F3D3AE;padding-top:6px}\n\n/* TÂCHES */\n.tasks{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}\n@media(max-width:1000px){.tasks{grid-template-columns:1fr}}\n.task{background:#fff;border:2px solid #F3D3AE;border-radius:14px;padding:20px 22px;box-shadow:0 3px 12px rgba(184,72,27,.08)}\n.task-n{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:#1F8A8F;color:#fff;font-weight:900;font-size:14px;margin-bottom:10px}\n.task-t{font-size:16.5px;font-weight:900;color:#3A2A1E;margin-bottom:6px}\n.task-d{font-size:14px;color:#5A4636;line-height:1.55}\n.task-d em{color:#B8481B;font-style:normal;font-weight:800}\n\n/* INVITATION */\n.invit{background:#fff;border:3px dashed #E0662E;border-radius:16px;padding:30px 36px;max-width:760px;box-shadow:0 10px 30px rgba(184,72,27,.14)}\n.invit h3{font-family:'Pacifico',cursive;font-size:26px;color:#E0662E;text-align:center;margin-bottom:20px}\n.invit .fld{font-size:16.5px;line-height:2.1;color:#3A2A1E;font-weight:700}\n.invit .line{display:inline-block;border-bottom:2px solid #C9A98A;min-width:320px;height:22px;vertical-align:bottom}\n.invit .foot{text-align:center;margin-top:18px;font-size:14.5px;color:#A5764F;font-weight:700}\n\n/* TIMELINE */\n.steps{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}\n@media(max-width:1200px){.steps{grid-template-columns:repeat(4,1fr)}}\n@media(max-width:800px){.steps{grid-template-columns:repeat(2,1fr)}}\n.step{background:#fff;border:2px solid #F3D3AE;border-radius:12px;padding:16px 14px;text-align:center;box-shadow:0 2px 8px rgba(184,72,27,.06)}\n.step-n{width:32px;height:32px;border-radius:50%;background:#FFE7CC;color:#B8481B;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}\n.step-t{font-size:13.5px;font-weight:800;color:#3A2A1E;margin-bottom:4px;line-height:1.3}\n.step-d{font-size:11.5px;color:#B79A80;font-weight:700}\n\n.footer{padding:26px 36px;text-align:center;font-size:13px;color:#B79A80;font-weight:700;letter-spacing:.05em}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"hdr\">\n  <div class=\"hdr-l\">\n    <div class=\"hdr-badge\">🎉<\u002Fdiv>\n    <div>\n      <div class=\"hdr-eye\">Projet collaboratif · Francisation Niveau 4<\u002Fdiv>\n      <div class=\"hdr-h1\">Organiser une fête de quartier\n        <span class=\"sub\">Inviter, planifier, cuisiner, fêter !<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hdr-r\">\n    <button class=\"btn\" id=\"btn-reset\">↺ Réinitialiser<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 1. LE PROJET -->\n<div id=\"projet\">\n  <div class=\"sec\">\n    <div class=\"sec-lbl\">\n      <div class=\"sec-num\">1<\u002Fdiv>\n      <div class=\"sec-title\">Le projet<\u002Fdiv>\n      <div class=\"sec-instr\">Écoutez les trois dialogues modèles.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"projet-card\">\n      <div class=\"tape\">\n        <div class=\"tape-lbl\">🎧 Les 3 dialogues modèles<\u002Fdiv>\n        <audio id=\"dial-player\" controls=\"\" preload=\"metadata\" src=\"3fe6fb32-26e3-4836-ad29-a2d99d9a8d00\"><\u002Faudio>\n        <div class=\"tape-warn\">On propose, on discute, on décide — au présent.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"projet-txt\">\n        <h3>C'est bientôt l'été !<\u002Fh3>\n        <p>La classe décide d'organiser une grande <strong>fête de quartier<\u002Fstrong> pour rencontrer les voisins et partager de la nourriture de différents pays.<\u002Fp>\n        <p>Mais tout organiser n'est pas facile : il faut <strong>choisir la date<\u002Fstrong>, <strong>inviter les gens<\u002Fstrong>, <strong>préparer la nourriture<\u002Fstrong> et <strong>décider des activités<\u002Fstrong>. En équipe, vous planifiez la fête de A à Z !<\u002Fp>\n        <div class=\"gram-note\">📖 <b>Note :<\u002Fb> tout se passe au <b>présent<\u002Fb>. On <b>propose<\u002Fb> (« Et si on… ? »), on <b>invite<\u002Fb> (« Je t'invite à… »), on <b>se met d'accord<\u002Fb> (« Bonne idée ! ») et on <b>complimente<\u002Fb> (« C'est délicieux ! »).<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 2. LES DIALOGUES -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">2<\u002Fdiv>\n    <div class=\"sec-title\">Les 3 dialogues modèles<\u002Fdiv>\n    <div class=\"sec-instr\">Cliquez sur un dialogue pour lire le texte<\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"dial-grid\">\n    <div class=\"dial\">\n      <div class=\"dial-head\">\n        <div class=\"dial-num\">Dialogue 1<\u002Fdiv>\n        <div class=\"dial-title\">On lance l'idée<\u002Fdiv>\n        <div class=\"dial-goal\">Proposer · réagir · se mettre d'accord<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dial-body\">\n        <div class=\"dial-voix\">🗣️ Léa &amp; Karim<\u002Fdiv>\n        <div class=\"dial-cta\">▸ Lire le dialogue<\u002Fdiv>\n        <div class=\"dial-lines\">\n          <div class=\"line-row\"><span class=\"who\">Léa<\u002Fspan><span class=\"said\">Karim, j'ai une idée ! Et si on organise une fête de quartier cet été ?<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Karim<\u002Fspan><span class=\"said\">Une fête de quartier ? Super idée ! On invite tous les voisins ?<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Léa<\u002Fspan><span class=\"said\">Oui ! Chaque personne apporte un plat de son pays. On partage la nourriture.<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Karim<\u002Fspan><span class=\"said\">J'adore ! Moi, je prépare un couscous. Et toi ?<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Léa<\u002Fspan><span class=\"said\">Moi, je fais un gâteau. On va bien s'amuser !<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Karim<\u002Fspan><span class=\"said\">Parfait. D'abord, on choisit une date. Ensuite, on écrit les invitations.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dial\">\n      <div class=\"dial-head\">\n        <div class=\"dial-num\">Dialogue 2<\u002Fdiv>\n        <div class=\"dial-title\">On choisit la date et le lieu<\u002Fdiv>\n        <div class=\"dial-goal\">Situer dans le temps et l'espace · négocier<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dial-body\">\n        <div class=\"dial-voix\">🗣️ Sofia &amp; Marc<\u002Fdiv>\n        <div class=\"dial-cta\">▸ Lire le dialogue<\u002Fdiv>\n        <div class=\"dial-lines\">\n          <div class=\"line-row\"><span class=\"who\">Sofia<\u002Fspan><span class=\"said\">Alors, quand est-ce qu'on fait la fête ? Moi, je préfère un samedi.<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Marc<\u002Fspan><span class=\"said\">Bonne idée ! Le samedi, tout le monde est libre. Samedi le 15 juin ?<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Sofia<\u002Fspan><span class=\"said\">Parfait ! Et où ? On fait ça dans la rue ?<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Marc<\u002Fspan><span class=\"said\">Non, je préfère le parc du quartier. Il y a de l'espace et des tables.<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Sofia<\u002Fspan><span class=\"said\">Excellent ! Donc, la fête aura lieu au parc, samedi le 15 juin, à midi.<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Marc<\u002Fspan><span class=\"said\">C'est noté ! Maintenant, on prépare les invitations. Qui est-ce qui vient ?<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dial\">\n      <div class=\"dial-head\">\n        <div class=\"dial-num\">Dialogue 3<\u002Fdiv>\n        <div class=\"dial-title\">Le jour de la fête<\u002Fdiv>\n        <div class=\"dial-goal\">Complimenter · exprimer ses goûts · interagir<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dial-body\">\n        <div class=\"dial-voix\">🗣️ Léa &amp; un voisin<\u002Fdiv>\n        <div class=\"dial-cta\">▸ Lire le dialogue<\u002Fdiv>\n        <div class=\"dial-lines\">\n          <div class=\"line-row\"><span class=\"who\">Léa<\u002Fspan><span class=\"said\">Bonjour ! Bienvenue à notre fête de quartier ! Vous voulez goûter ?<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Voisin<\u002Fspan><span class=\"said\">Bonjour ! Avec plaisir. Hmm, qu'est-ce que c'est ? Ça sent très bon !<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Léa<\u002Fspan><span class=\"said\">C'est un couscous, un plat traditionnel. Et voici un gâteau au miel.<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Voisin<\u002Fspan><span class=\"said\">C'est délicieux ! Vous cuisinez très bien !<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Léa<\u002Fspan><span class=\"said\">Merci beaucoup ! Servez-vous, il y en a pour tout le monde.<\u002Fspan><\u002Fdiv>\n          <div class=\"line-row\"><span class=\"who\">Voisin<\u002Fspan><span class=\"said\">Quelle belle fête ! C'est une très bonne idée de rassembler les voisins.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 3. CLASSER LES PHRASES -->\n<div id=\"classer\">\n  <div class=\"sec\">\n    <div class=\"sec-lbl\">\n      <div class=\"sec-num\">3<\u002Fdiv>\n      <div class=\"sec-title\">À quoi sert cette phrase ?<\u002Fdiv>\n      <div class=\"sec-instr\">Cliquez : est-ce pour inviter, proposer ou complimenter ?<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"legend\">\n      <span class=\"lg-inv\">🙋 Inviter<\u002Fspan>\n      <span class=\"lg-pro\">💡 Proposer<\u002Fspan>\n      <span class=\"lg-com\">👏 Complimenter<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"cl-list\" id=\"cl-list\">\n      <div class=\"cl-row\" data-ans=\"inv\"><div class=\"cl-phrase\">« Je t'invite à ma fête. »<\u002Fdiv><div class=\"cl-btns\"><button class=\"cl-btn\" data-c=\"inv\">Inviter<\u002Fbutton><button class=\"cl-btn\" data-c=\"pro\">Proposer<\u002Fbutton><button class=\"cl-btn\" data-c=\"com\">Complimenter<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"cl-row\" data-ans=\"pro\"><div class=\"cl-phrase\">« Et si on organise une fête ? »<\u002Fdiv><div class=\"cl-btns\"><button class=\"cl-btn\" data-c=\"inv\">Inviter<\u002Fbutton><button class=\"cl-btn\" data-c=\"pro\">Proposer<\u002Fbutton><button class=\"cl-btn\" data-c=\"com\">Complimenter<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"cl-row\" data-ans=\"com\"><div class=\"cl-phrase\">« C'est délicieux ! »<\u002Fdiv><div class=\"cl-btns\"><button class=\"cl-btn\" data-c=\"inv\">Inviter<\u002Fbutton><button class=\"cl-btn\" data-c=\"pro\">Proposer<\u002Fbutton><button class=\"cl-btn\" data-c=\"com\">Complimenter<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"cl-row\" data-ans=\"inv\"><div class=\"cl-phrase\">« Veux-tu venir samedi ? »<\u002Fdiv><div class=\"cl-btns\"><button class=\"cl-btn\" data-c=\"inv\">Inviter<\u002Fbutton><button class=\"cl-btn\" data-c=\"pro\">Proposer<\u002Fbutton><button class=\"cl-btn\" data-c=\"com\">Complimenter<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"cl-row\" data-ans=\"pro\"><div class=\"cl-phrase\">« On peut apporter un gâteau. »<\u002Fdiv><div class=\"cl-btns\"><button class=\"cl-btn\" data-c=\"inv\">Inviter<\u002Fbutton><button class=\"cl-btn\" data-c=\"pro\">Proposer<\u002Fbutton><button class=\"cl-btn\" data-c=\"com\">Complimenter<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"cl-row\" data-ans=\"com\"><div class=\"cl-phrase\">« Tu cuisines très bien ! »<\u002Fdiv><div class=\"cl-btns\"><button class=\"cl-btn\" data-c=\"inv\">Inviter<\u002Fbutton><button class=\"cl-btn\" data-c=\"pro\">Proposer<\u002Fbutton><button class=\"cl-btn\" data-c=\"com\">Complimenter<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"cl-row\" data-ans=\"inv\"><div class=\"cl-phrase\">« Vous êtes invités à la fête. »<\u002Fdiv><div class=\"cl-btns\"><button class=\"cl-btn\" data-c=\"inv\">Inviter<\u002Fbutton><button class=\"cl-btn\" data-c=\"pro\">Proposer<\u002Fbutton><button class=\"cl-btn\" data-c=\"com\">Complimenter<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"cl-row\" data-ans=\"pro\"><div class=\"cl-phrase\">« Je propose de faire ça au parc. »<\u002Fdiv><div class=\"cl-btns\"><button class=\"cl-btn\" data-c=\"inv\">Inviter<\u002Fbutton><button class=\"cl-btn\" data-c=\"pro\">Proposer<\u002Fbutton><button class=\"cl-btn\" data-c=\"com\">Complimenter<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"cl-row\" data-ans=\"com\"><div class=\"cl-phrase\">« Quelle belle fête ! »<\u002Fdiv><div class=\"cl-btns\"><button class=\"cl-btn\" data-c=\"inv\">Inviter<\u002Fbutton><button class=\"cl-btn\" data-c=\"pro\">Proposer<\u002Fbutton><button class=\"cl-btn\" data-c=\"com\">Complimenter<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"cl-row\" data-ans=\"inv\"><div class=\"cl-phrase\">« Qui est-ce qui vient ? »<\u002Fdiv><div class=\"cl-btns\"><button class=\"cl-btn\" data-c=\"inv\">Inviter<\u002Fbutton><button class=\"cl-btn\" data-c=\"pro\">Proposer<\u002Fbutton><button class=\"cl-btn\" data-c=\"com\">Complimenter<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 4. VOCABULAIRE -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">4<\u002Fdiv>\n    <div class=\"sec-title\">Vocabulaire de la fête<\u002Fdiv>\n    <div class=\"sec-instr\">Cliquez sur un mot pour lire sa définition<\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"vocab-grid\">\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">🎉<\u002Fspan>une fête<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est un moment joyeux où des gens se rassemblent pour s'amuser.<\u002Fp><div class=\"ex\">On organise une fête pour rencontrer les voisins.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">🏘️<\u002Fspan>un quartier<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est une partie d'une ville, avec des maisons et des voisins.<\u002Fp><div class=\"ex\">Dans mon quartier, il y a un beau parc.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">✉️<\u002Fspan>une invitation<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est un message pour demander à quelqu'un de venir à un événement.<\u002Fp><div class=\"ex\">J'écris une invitation pour la fête.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">🙋<\u002Fspan>inviter<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est demander à quelqu'un de venir à un événement.<\u002Fp><div class=\"ex\">Nous invitons tous les voisins à la fête.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">👋<\u002Fspan>un voisin<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est une personne qui habite près de chez nous.<\u002Fp><div class=\"ex\">Mon voisin est très gentil.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">🍳<\u002Fspan>préparer<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est faire les choses à l'avance pour être prêt.<\u002Fp><div class=\"ex\">Nous préparons la nourriture pour la fête.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">🍽️<\u002Fspan>un plat<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est un aliment préparé qu'on sert à table.<\u002Fp><div class=\"ex\">Chaque personne apporte un plat de son pays.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">🥗<\u002Fspan>apporter<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est prendre quelque chose avec soi pour l'amener quelque part.<\u002Fp><div class=\"ex\">J'apporte une salade et un dessert.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">🎈<\u002Fspan>décorer<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est mettre de belles choses pour rendre un endroit joli.<\u002Fp><div class=\"ex\">On décore le parc avec des ballons.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">🤝<\u002Fspan>partager<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est donner une partie de quelque chose aux autres.<\u002Fp><div class=\"ex\">À la fête, on partage la nourriture.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">😋<\u002Fspan>délicieux<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est très bon à manger.<\u002Fp><div class=\"ex\">Ce gâteau est délicieux !<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"voc\"><div class=\"voc-word\"><span class=\"em\">🎶<\u002Fspan>s'amuser<\u002Fdiv><div class=\"voc-cta\">Voir la définition<\u002Fdiv><div class=\"voc-def\"><p>C'est passer un bon moment, avoir du plaisir.<\u002Fp><div class=\"ex\">Tout le monde s'amuse à la fête.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 5. LE PROJET EN ÉQUIPE -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">5<\u002Fdiv>\n    <div class=\"sec-title\">Le projet en équipe — les 6 tâches<\u002Fdiv>\n    <div class=\"sec-instr\">En équipes de 3-4 personnes<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tasks\">\n    <div class=\"task\"><div class=\"task-n\">1<\u002Fdiv><div class=\"task-t\">La date et le lieu<\u002Fdiv><div class=\"task-d\">Choisissez la date, l'heure et le lieu. Chacun donne son avis et on se met d'accord. <em>« Moi, je préfère… »<\u002Fem><\u002Fdiv><\u002Fdiv>\n    <div class=\"task\"><div class=\"task-n\">2<\u002Fdiv><div class=\"task-t\">La liste des invités<\u002Fdiv><div class=\"task-d\">Décidez qui vous invitez (voisins, familles, amis). Combien de personnes ? <em>« Qui est-ce qui vient ? »<\u002Fem><\u002Fdiv><\u002Fdiv>\n    <div class=\"task\"><div class=\"task-n\">3<\u002Fdiv><div class=\"task-t\">Le menu<\u002Fdiv><div class=\"task-d\">Chaque membre choisit un plat à apporter. Faites la liste du menu. <em>« J'apporte… », « Je prépare… »<\u002Fem><\u002Fdiv><\u002Fdiv>\n    <div class=\"task\"><div class=\"task-n\">4<\u002Fdiv><div class=\"task-t\">Les activités<\u002Fdiv><div class=\"task-d\">Choisissez 2-3 activités (musique, jeux, danse). Discutez et décidez ensemble. <em>« Et si on… ? »<\u002Fem><\u002Fdiv><\u002Fdiv>\n    <div class=\"task\"><div class=\"task-n\">5<\u002Fdiv><div class=\"task-t\">L'invitation<\u002Fdiv><div class=\"task-d\">Rédigez ensemble une courte invitation : qui invite, quoi, quand, où. <em>« Vous êtes invités à… »<\u002Fem><\u002Fdiv><\u002Fdiv>\n    <div class=\"task\"><div class=\"task-n\">6<\u002Fdiv><div class=\"task-t\">La présentation<\u002Fdiv><div class=\"task-d\">Présentez votre projet à la classe. Chaque membre parle d'une partie (date, invités, menu, activités).<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 6. GABARIT INVITATION -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">6<\u002Fdiv>\n    <div class=\"sec-title\">Votre invitation<\u002Fdiv>\n    <div class=\"sec-instr\">Remplissez le gabarit en équipe<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"invit\">\n    <h3>🎉 Invitation 🎉<\u002Fh3>\n    <div class=\"fld\">Vous êtes invités à : <span class=\"line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Quand ? (jour, date, heure) : <span class=\"line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Où ? : <span class=\"line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Apportez : <span class=\"line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"foot\">Confirmez votre présence, s'il vous plaît ! Merci !<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 7. DÉROULEMENT -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">7<\u002Fdiv>\n    <div class=\"sec-title\">Déroulement de l'activité<\u002Fdiv>\n    <div class=\"sec-instr\">≈ 4 heures, divisible en 2 séances de 2 h<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"steps\">\n    <div class=\"step\"><div class=\"step-n\">1<\u002Fdiv><div class=\"step-t\">Mise en train<\u002Fdiv><div class=\"step-d\">15 min · Groupe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">2<\u002Fdiv><div class=\"step-t\">Les dialogues<\u002Fdiv><div class=\"step-d\">30 min · Dyade<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">3<\u002Fdiv><div class=\"step-t\">Vocabulaire<\u002Fdiv><div class=\"step-d\">20 min · Groupe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">4<\u002Fdiv><div class=\"step-t\">Projet en équipe<\u002Fdiv><div class=\"step-d\">60 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">5<\u002Fdiv><div class=\"step-t\">Rédiger l'invitation<\u002Fdiv><div class=\"step-d\">25 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">6<\u002Fdiv><div class=\"step-t\">Les présentations<\u002Fdiv><div class=\"step-d\">40 min · Groupe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">7<\u002Fdiv><div class=\"step-t\">Clôture &amp; vote<\u002Fdiv><div class=\"step-d\">10 min · Groupe<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"footer\">Francisation · Niveau 4 (LAN-4049-8) · Inviter, proposer, se mettre d'accord, complimenter · « La fête aura lieu… »<\u002Fdiv>\n\n<script>\n// Dialogues reveal\ndocument.querySelectorAll('.dial').forEach(d => d.addEventListener('click', () => d.classList.toggle('revealed')));\n// Vocabulaire reveal\ndocument.querySelectorAll('.voc').forEach(v => v.addEventListener('click', () => v.classList.toggle('revealed')));\n\n// Classer les phrases\ndocument.querySelectorAll('.cl-row').forEach(row => {\n  const ans = row.dataset.ans;\n  row.querySelectorAll('.cl-btn').forEach(btn => {\n    btn.addEventListener('click', () => {\n      row.querySelectorAll('.cl-btn').forEach(b => b.classList.remove('good','bad'));\n      btn.classList.add(btn.dataset.c === ans ? 'good' : 'bad');\n    });\n  });\n});\n\n// Reset\ndocument.getElementById('btn-reset').addEventListener('click', () => {\n  document.querySelectorAll('.dial,.voc').forEach(x => x.classList.remove('revealed'));\n  document.querySelectorAll('.cl-btn').forEach(b => b.classList.remove('good','bad'));\n  document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
