document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

*::after{box-sizing:border-box;margin:0;padding:0}\nhtml,body{min-height:100%;background:#EFE3CC;font-family:'Nunito',sans-serif;color:#3A2E22}\n\n/* HEADER */\n#hdr{background:#F7EFDE;color:#3A2E22;padding:20px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;border-bottom:3px solid #6B4F3A;box-shadow:0 4px 18px rgba(107,79,58,.18)}\n.hdr-l{display:flex;align-items:center;gap:18px}\n.hdr-badge{width:54px;height:54px;border-radius:50%;border:3px solid #6B4F3A;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:#EFE3CC}\n.hdr-eye{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.28em;color:#8A6A48;margin-bottom:3px}\n.hdr-h1{font-size:26px;font-weight:900;line-height:1.15;color:#3A2E22}\n.hdr-h1 .sub{font-family:'Special Elite',cursive;font-size:15px;font-weight:400;color:#8A7B64;display:block;margin-top:2px}\n.hdr-r{display:flex;gap:12px}\n.btn{background:rgba(107,79,58,.1);color:#6B4F3A;border:2px solid rgba(107,79,58,.45);border-radius:10px;padding:10px 18px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .15s}\n.btn:hover{background:rgba(107,79,58,.2)}\n\n/* SECTIONS */\n.sec{max-width:1500px;margin:0 auto;padding:30px 36px}\n.sec-lbl{display:flex;align-items:center;gap:14px;margin-bottom:20px}\n.sec-num{width:40px;height:40px;border-radius:50%;background:#6B4F3A;color:#F7EFDE;font-weight:900;font-size:19px;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.sec-title{font-size:24px;font-weight:900;color:#3A2E22}\n.sec-instr{font-size:15px;color:#8A7B64;font-weight:700;margin-left:auto;font-style:italic}\n\n/* MISSION */\n#mission{background:linear-gradient(180deg,#F7EFDE,#EBDCC0);border-bottom:1px solid #DCC9A8}\n.mission-card{background:#fff;border:2px solid #DCC9A8;border-radius:16px;padding:28px 32px;display:flex;gap:32px;align-items:center;box-shadow:0 8px 30px rgba(107,79,58,.12)}\n.tape{flex:0 0 340px;background:#F7EFDE;border:2px solid #6B4F3A;border-radius:14px;padding:22px;text-align:center}\n.tape-lbl{font-family:'Special Elite',cursive;font-size:13px;color:#6B4F3A;letter-spacing:.15em;margin-bottom:12px}\n.tape audio{width:100%}\n.tape-warn{font-size:11.5px;color:#A89A80;margin-top:10px;font-style:italic}\n.mission-txt{flex:1}\n.mission-txt h3{font-family:'Special Elite',cursive;font-size:20px;color:#6B4F3A;margin-bottom:12px}\n.mission-txt p{font-size:16.5px;line-height:1.65;color:#4A3D2E;margin-bottom:8px}\n.mission-txt strong{color:#3A2E22}\n.gram-note{background:#FBF4E5;border-left:4px solid #C9A24A;border-radius:0 8px 8px 0;padding:12px 16px;margin-top:14px;font-size:14px;color:#6B5A3A;line-height:1.55}\n.gram-note b{color:#3A2E22}\n\n/* PERSONNES */\n#suspects-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}\n@media(max-width:1200px){#suspects-grid{grid-template-columns:repeat(2,1fr)}}\n.suspect{background:#fff;border:2px solid #DCC9A8;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;box-shadow:0 3px 12px rgba(107,79,58,.08)}\n.suspect:hover{transform:translateY(-4px);border-color:#6B4F3A;box-shadow:0 10px 24px rgba(107,79,58,.18)}\n.suspect-photo{height:150px;background:linear-gradient(160deg,#D8C6A4,#C9B48F);display:flex;align-items:center;justify-content:center;font-size:64px;border-bottom:2px solid #DCC9A8;position:relative;filter:sepia(.3)}\n.suspect-num{position:absolute;top:10px;left:10px;background:#6B4F3A;color:#F7EFDE;font-size:11px;font-weight:900;padding:4px 10px;border-radius:6px;letter-spacing:.1em}\n.suspect-body{padding:18px 20px}\n.suspect-name{font-size:18px;font-weight:900;color:#3A2E22;margin-bottom:2px}\n.suspect-role{font-family:'Special Elite',cursive;font-size:13px;color:#6B4F3A;margin-bottom:10px}\n.suspect-desc{font-size:14px;color:#8A7B64;line-height:1.5;margin-bottom:12px}\n.suspect-cta{font-size:12.5px;font-weight:800;color:#6B4F3A;text-transform:uppercase;letter-spacing:.1em}\n.suspect.revealed .suspect-cta{display:none}\n.alibi{display:none;background:#FAF4E7;margin:0 -20px -18px;padding:16px 20px;border-top:2px dashed #DCC9A8}\n.suspect.revealed .alibi{display:block;animation:slideDown .3s ease-out}\n@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}\n.alibi-lbl{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.16em;color:#6B4F3A;margin-bottom:8px}\n.alibi q{display:block;font-size:13.5px;color:#4A3D2E;line-height:1.5;margin-bottom:6px;quotes:\"« \" \" »\"}\n.alibi .clue{margin-top:10px;font-size:12.5px;color:#8A6A48;font-style:italic;border-top:1px dotted #DCC9A8;padding-top:8px}\n\n/* AUDIO RÉCITS */\n.alibis-audio{margin-top:22px;background:#fff;border:2px solid #DCC9A8;border-radius:14px;padding:20px 26px;display:flex;align-items:center;gap:24px;box-shadow:0 3px 12px rgba(107,79,58,.08)}\n.alibis-audio .ic{font-size:34px}\n.alibis-audio .lbl{font-weight:800;font-size:16px;color:#3A2E22}\n.alibis-audio .lbl span{display:block;font-size:13px;color:#8A7B64;font-weight:600;margin-top:2px}\n.alibis-audio audio{flex:1}\n\n/* PRÉSENT OU PASSÉ ? (mini-exercice interactif) */\n#pp-zone{background:#EBDCC0;border-top:1px solid #DCC9A8;border-bottom:1px solid #DCC9A8}\n.pp-list{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}\n@media(max-width:900px){.pp-list{grid-template-columns:1fr}}\n.pp-row{background:#fff;border:2px solid #DCC9A8;border-radius:12px;padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(107,79,58,.06)}\n.pp-phrase{flex:1;font-size:17px;font-weight:800;color:#3A2E22}\n.pp-btns{display:flex;gap:8px}\n.pp-btn{border:2px solid #DCC9A8;background:#F7EFDE;border-radius:8px;padding:8px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;color:#6B4F3A;transition:all .12s}\n.pp-btn:hover{border-color:#6B4F3A}\n.pp-btn.good{background:#DBEFD8;border-color:#2E9E5B;color:#1E7040}\n.pp-btn.bad{background:#F5DAD8;border-color:#D64545;color:#9B2B2B}\n\n/* INDICES */\n#temoin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}\n@media(max-width:1000px){#temoin-grid{grid-template-columns:1fr}}\n.temoin{background:#fff;border:2px solid #DCC9A8;border-radius:16px;padding:22px 24px;cursor:pointer;transition:border-color .2s,box-shadow .2s;min-height:150px;position:relative;box-shadow:0 3px 12px rgba(107,79,58,.08)}\n.temoin:hover{border-color:#6B4F3A;box-shadow:0 10px 24px rgba(107,79,58,.18)}\n.temoin-name{font-size:16px;font-weight:900;color:#3A2E22;margin-bottom:4px;display:flex;align-items:center;gap:10px}\n.temoin-txt{display:none;font-size:14.5px;color:#4A3D2E;line-height:1.6;margin-top:10px}\n.temoin.revealed .temoin-txt{display:block;animation:slideDown .3s ease-out}\n.temoin-cta{font-size:12.5px;font-weight:800;color:#6B4F3A;text-transform:uppercase;letter-spacing:.1em;position:absolute;bottom:18px}\n.temoin.revealed .temoin-cta{display:none}\n\n/* RAPPORT (association) */\n.rapport{background:#fff;color:#3A2E22;border:2px solid #6B4F3A;border-radius:16px;padding:30px 36px;font-family:'Special Elite',cursive;max-width:900px;box-shadow:0 10px 34px rgba(107,79,58,.16)}\n.rapport h3{font-size:21px;margin-bottom:18px;border-bottom:2px solid #3A2E22;padding-bottom:10px;letter-spacing:.05em}\n.rapport .fld{margin-bottom:16px;font-size:16px;line-height:1.8}\n.rapport .line{display:inline-block;border-bottom:2px solid #999;min-width:280px;height:20px;vertical-align:bottom}\n.rapport .line.short{min-width:160px}\n\n/* TIMELINE */\n.steps{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}\n@media(max-width:1200px){.steps{grid-template-columns:repeat(4,1fr)}}\n@media(max-width:800px){.steps{grid-template-columns:repeat(2,1fr)}}\n.step{background:#fff;border:2px solid #DCC9A8;border-radius:12px;padding:16px 14px;text-align:center;box-shadow:0 2px 8px rgba(107,79,58,.06)}\n.step-n{width:32px;height:32px;border-radius:50%;background:#EBDCC0;color:#6B4F3A;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}\n.step-t{font-size:13.5px;font-weight:800;color:#3A2E22;margin-bottom:4px;line-height:1.3}\n.step-d{font-size:11.5px;color:#A89A80;font-weight:700}\n\n/* SOLUTION */\n#solution-box{display:none;background:#fff;border:2px solid #6B4F3A;border-radius:16px;padding:26px 30px;margin-top:20px;animation:slideDown .3s ease-out;box-shadow:0 6px 20px rgba(107,79,58,.12)}\n#solution-box.on{display:block}\n#solution-box h4{color:#6B4F3A;font-size:19px;margin-bottom:12px}\n#solution-box p{font-size:15.5px;line-height:1.7;color:#4A3D2E}\n#solution-box strong{color:#3A2E22}\n\n.footer{padding:26px 36px;text-align:center;font-size:13px;color:#A89A80;font-weight:700;letter-spacing:.06em}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"hdr\">\n  <div class=\"hdr-l\">\n    <div class=\"hdr-badge\">📷<\u002Fdiv>\n    <div>\n      <div class=\"hdr-eye\">Dossier détective · Francisation Niveau 4<\u002Fdiv>\n      <div class=\"hdr-h1\">Le mystère de la vieille photo\n        <span class=\"sub\">Qui sont les personnes sur la photo ?<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hdr-r\">\n    <button class=\"btn\" id=\"btn-reset\">↺ Réinitialiser<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 1. LA VIEILLE PHOTO -->\n<div id=\"mission\">\n  <div class=\"sec\">\n    <div class=\"sec-lbl\">\n      <div class=\"sec-num\">1<\u002Fdiv>\n      <div class=\"sec-title\">La vieille photo<\u002Fdiv>\n      <div class=\"sec-instr\">Écoutez la voix du passé.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mission-card\">\n      <div class=\"tape\">\n        <div class=\"tape-lbl\">▸ MESSAGE DU PASSÉ — DOSSIER Nº 001<\u002Fdiv>\n        <audio id=\"msg-player\" controls=\"\" preload=\"metadata\" src=\"86419ffb-df0f-46d0-91d5-258e6b3fdde4\"><\u002Faudio>\n        <div class=\"tape-warn\">Écoutez le passé… et trouvez la vérité.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mission-txt\">\n        <h3>Votre mission, détectives :<\u002Fh3>\n        <p>Dans une vieille boîte, la classe trouve une <strong>photo d'il y a très longtemps<\u002Fstrong>. Il y a quatre personnes, mais on ne sait pas qui elles sont !<\u002Fp>\n        <p>Chaque personne raconte <strong>comment elle était avant<\u002Fstrong>. <strong>Écoutez<\u002Fstrong> les récits, <strong>observez<\u002Fstrong> la photo, puis <strong>associez<\u002Fstrong> chaque récit à la bonne personne.<\u002Fp>\n        <div class=\"gram-note\">📖 <b>Note :<\u002Fb> les personnes parlent à l'<b>imparfait<\u002Fb> (j'étais, il y avait, c'était…). Vous, vous ÉCOUTEZ le passé. Pour parler, vous utilisez surtout « <b>Avant, j'étais…<\u002Fb> ».<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 2. LES 4 PERSONNES -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">2<\u002Fdiv>\n    <div class=\"sec-title\">Les 4 personnes de la photo<\u002Fdiv>\n    <div class=\"sec-instr\">Cliquez sur une personne pour lire son récit du passé<\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"suspects-grid\">\n    <div class=\"suspect\" data-s=\"1\">\n      <div class=\"suspect-photo\">👨‍🌾<span class=\"suspect-num\">PERSONNE 1<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">L'homme au chapeau<\u002Fdiv>\n        <div class=\"suspect-role\">debout, à gauche<\u002Fdiv>\n        <div class=\"suspect-desc\">Il est grand, il porte un grand chapeau et un long manteau.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Écouter son passé<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Son récit du passé<\u002Fdiv>\n          <q>Avant, j'étais fermier. Je travaillais dans les champs.<\u002Fq>\n          <q>À cette époque, je me levais très tôt, à cinq heures.<\u002Fq>\n          <q>Il y avait beaucoup d'animaux : des vaches, des poules.<\u002Fq>\n          <q>Le soir, j'étais fatigué, mais j'étais heureux.<\u002Fq>\n          <div class=\"clue\">🔎 Il parle d'une ferme et d'animaux.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"suspect\" data-s=\"2\">\n      <div class=\"suspect-photo\">👩‍🏫<span class=\"suspect-num\">PERSONNE 2<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">La femme aux cheveux longs<\u002Fdiv>\n        <div class=\"suspect-role\">avec un livre<\u002Fdiv>\n        <div class=\"suspect-desc\">Elle a de longs cheveux, une belle robe et un livre dans les mains.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Écouter son passé<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Son récit du passé<\u002Fdiv>\n          <q>Avant, j'étais enseignante. J'adorais les livres.<\u002Fq>\n          <q>Dans mon école, il y avait beaucoup d'enfants.<\u002Fq>\n          <q>À cette époque, on écrivait avec une plume et de l'encre.<\u002Fq>\n          <q>J'étais sévère, mais mes élèves m'aimaient bien.<\u002Fq>\n          <div class=\"clue\">🔎 Elle parle d'école et de livres.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"suspect\" data-s=\"3\">\n      <div class=\"suspect-photo\">⚽<span class=\"suspect-num\">PERSONNE 3<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">Le jeune garçon<\u002Fdiv>\n        <div class=\"suspect-role\">avec un ballon<\u002Fdiv>\n        <div class=\"suspect-desc\">Il est petit, il a une casquette et un ballon à ses pieds.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Écouter son passé<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Son récit du passé<\u002Fdiv>\n          <q>Avant, j'étais un enfant. Je jouais tout le temps dehors !<\u002Fq>\n          <q>Avec mes amis, on jouait au ballon dans la rue.<\u002Fq>\n          <q>Il n'y avait pas de télévision, alors on inventait des jeux.<\u002Fq>\n          <q>J'étais toujours content quand il faisait beau.<\u002Fq>\n          <div class=\"clue\">🔎 Il parle de jeux et d'un ballon.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"suspect\" data-s=\"4\">\n      <div class=\"suspect-photo\">🧵<span class=\"suspect-num\">PERSONNE 4<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">La dame âgée<\u002Fdiv>\n        <div class=\"suspect-role\">assise, avec des lunettes<\u002Fdiv>\n        <div class=\"suspect-desc\">Elle est assise, elle a des lunettes et un châle sur les épaules.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Écouter son passé<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Son récit du passé<\u002Fdiv>\n          <q>Avant, j'étais couturière. Je faisais des vêtements pour le village.<\u002Fq>\n          <q>Dans ma petite maison, il y avait beaucoup de tissus colorés.<\u002Fq>\n          <q>À cette époque, les gens réparaient leurs vêtements.<\u002Fq>\n          <q>J'étais patiente et j'aimais mon travail.<\u002Fq>\n          <div class=\"clue\">🔎 Elle parle de couture et de tissus.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"alibis-audio\">\n    <div class=\"ic\">🎧<\u002Fdiv>\n    <div class=\"lbl\">Écoutez les 4 récits du passé\n      <span>Version audio — les personnes racontent comment c'était avant (imparfait)<\u002Fspan>\n    <\u002Fdiv>\n    <audio id=\"ali-player\" controls=\"\" preload=\"metadata\" src=\"230d1d8b-834b-4791-9be6-c5ca190da0a0\"><\u002Faudio>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 3. PRÉSENT OU PASSÉ ? -->\n<div id=\"pp-zone\">\n  <div class=\"sec\">\n    <div class=\"sec-lbl\">\n      <div class=\"sec-num\">3<\u002Fdiv>\n      <div class=\"sec-title\">Présent ou passé ?<\u002Fdiv>\n      <div class=\"sec-instr\">Écoutez la phrase, puis choisissez : maintenant ou avant ?<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pp-list\" id=\"pp-list\">\n      <div class=\"pp-row\" data-ans=\"present\"><div class=\"pp-phrase\">« Je travaille dans les champs. »<\u002Fdiv><div class=\"pp-btns\"><button class=\"pp-btn\" data-c=\"present\">Présent<\u002Fbutton><button class=\"pp-btn\" data-c=\"passe\">Passé<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"pp-row\" data-ans=\"passe\"><div class=\"pp-phrase\">« Je travaillais dans les champs. »<\u002Fdiv><div class=\"pp-btns\"><button class=\"pp-btn\" data-c=\"present\">Présent<\u002Fbutton><button class=\"pp-btn\" data-c=\"passe\">Passé<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"pp-row\" data-ans=\"passe\"><div class=\"pp-phrase\">« Il y avait beaucoup d'enfants. »<\u002Fdiv><div class=\"pp-btns\"><button class=\"pp-btn\" data-c=\"present\">Présent<\u002Fbutton><button class=\"pp-btn\" data-c=\"passe\">Passé<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"pp-row\" data-ans=\"present\"><div class=\"pp-phrase\">« Il y a beaucoup d'enfants. »<\u002Fdiv><div class=\"pp-btns\"><button class=\"pp-btn\" data-c=\"present\">Présent<\u002Fbutton><button class=\"pp-btn\" data-c=\"passe\">Passé<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"pp-row\" data-ans=\"passe\"><div class=\"pp-phrase\">« Avant, j'étais couturière. »<\u002Fdiv><div class=\"pp-btns\"><button class=\"pp-btn\" data-c=\"present\">Présent<\u002Fbutton><button class=\"pp-btn\" data-c=\"passe\">Passé<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"pp-row\" data-ans=\"present\"><div class=\"pp-phrase\">« Aujourd'hui, je suis étudiant. »<\u002Fdiv><div class=\"pp-btns\"><button class=\"pp-btn\" data-c=\"present\">Présent<\u002Fbutton><button class=\"pp-btn\" data-c=\"passe\">Passé<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"pp-row\" data-ans=\"passe\"><div class=\"pp-phrase\">« On jouait au ballon dans la rue. »<\u002Fdiv><div class=\"pp-btns\"><button class=\"pp-btn\" data-c=\"present\">Présent<\u002Fbutton><button class=\"pp-btn\" data-c=\"passe\">Passé<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"pp-row\" data-ans=\"present\"><div class=\"pp-phrase\">« On joue au ballon dans le parc. »<\u002Fdiv><div class=\"pp-btns\"><button class=\"pp-btn\" data-c=\"present\">Présent<\u002Fbutton><button class=\"pp-btn\" data-c=\"passe\">Passé<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 4. LES INDICES -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">4<\u002Fdiv>\n    <div class=\"sec-title\">Les cartes-indices<\u002Fdiv>\n    <div class=\"sec-instr\">Révélez les indices pour vérifier vos associations<\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"temoin-grid\">\n    <div class=\"temoin\">\n      <div class=\"temoin-name\">✉️ Indice A — Une lettre ancienne<\u002Fdiv>\n      <div class=\"temoin-txt\">« Sur la photo, la personne qui travaillait la terre est debout, à gauche. Elle portait toujours un chapeau. »<\u002Fdiv>\n      <div class=\"temoin-cta\">🔍 Révéler l'indice<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"temoin\">\n      <div class=\"temoin-name\">📓 Indice B — Un vieux cahier<\u002Fdiv>\n      <div class=\"temoin-txt\">« La personne qui enseignait tenait toujours un livre. Elle avait de longs cheveux. »<\u002Fdiv>\n      <div class=\"temoin-cta\">🔍 Révéler l'indice<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"temoin\">\n      <div class=\"temoin-name\">📔 Indice C — Un album de famille<\u002Fdiv>\n      <div class=\"temoin-txt\">« Le plus jeune sur la photo aimait le sport. Il avait toujours un ballon avec lui. »<\u002Fdiv>\n      <div class=\"temoin-cta\">🔍 Révéler l'indice<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 5. RAPPORT -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">5<\u002Fdiv>\n    <div class=\"sec-title\">Le rapport d'enquête<\u002Fdiv>\n    <div class=\"sec-instr\">Associez chaque personne — puis présentez-vous au passé !<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"rapport\">\n    <h3>RAPPORT D'ENQUÊTE — ÉQUIPE Nº ____<\u002Fh3>\n    <div class=\"fld\">Personne 1 (l'homme au chapeau) = <span class=\"line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Personne 2 (la femme au livre) = <span class=\"line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Personne 3 (le garçon au ballon) = <span class=\"line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Personne 4 (la dame assise) = <span class=\"line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\" style=\"margin-top:22px;border-top:2px dashed #ccc;padding-top:16px\">Et moi ! Avant, dans mon pays, j'étais <span class=\"line short\"><\u002Fspan> et j'aimais <span class=\"line short\"><\u002Fspan>.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 6. DÉROULEMENT -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">6<\u002Fdiv>\n    <div class=\"sec-title\">Déroulement de l'enquête<\u002Fdiv>\n    <div class=\"sec-instr\">≈ 3 heures, divisible en 2 séances<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"steps\">\n    <div class=\"step\"><div class=\"step-n\">1<\u002Fdiv><div class=\"step-t\">La vieille photo<\u002Fdiv><div class=\"step-d\">15 min · Groupe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">2<\u002Fdiv><div class=\"step-t\">Écouter le passé<\u002Fdiv><div class=\"step-d\">30 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">3<\u002Fdiv><div class=\"step-t\">Présent ou passé ?<\u002Fdiv><div class=\"step-d\">20 min · Individuel<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">4<\u002Fdiv><div class=\"step-t\">Associer les descriptions<\u002Fdiv><div class=\"step-d\">30 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">5<\u002Fdiv><div class=\"step-t\">Les indices<\u002Fdiv><div class=\"step-d\">20 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">6<\u002Fdiv><div class=\"step-t\">Se présenter au passé<\u002Fdiv><div class=\"step-d\">25 min · Dyade<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">7<\u002Fdiv><div class=\"step-t\">La révélation<\u002Fdiv><div class=\"step-d\">15 min · Groupe<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <button class=\"btn\" id=\"btn-solution\" style=\"margin-top:24px\">🗝️ Solution (réservée à l'enseignant·e)<\u002Fbutton>\n  <div id=\"solution-box\">\n    <h4>🗝️ La solution<\u002Fh4>\n    <p><strong>Personne 1<\u002Fstrong> (l'homme au chapeau) = le <strong>fermier<\u002Fstrong> qui travaillait dans les champs (Indice A). <strong>Personne 2<\u002Fstrong> (la femme aux cheveux longs, avec un livre) = l'<strong>enseignante<\u002Fstrong> (Indice B). <strong>Personne 3<\u002Fstrong> (le jeune garçon avec un ballon) = l'<strong>enfant<\u002Fstrong> qui jouait dehors (Indice C). <strong>Personne 4<\u002Fstrong> (la dame âgée assise, avec des lunettes) = la <strong>couturière<\u002Fstrong> qui faisait des vêtements. La clé : croiser la <strong>description physique<\u002Fstrong> (présent, sur la photo) avec le <strong>récit du passé<\u002Fstrong> (imparfait, à l'écoute).<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"footer\">Francisation · Niveau 4 (LAN-4049-8) · Compréhension de l'imparfait à l'écoute · Se présenter au passé : « Avant, j'étais… »<\u002Fdiv>\n\n<script>\n// Lecture enchaînée des segments audio (encodés à vitesse normale, sans perte de qualité)\nfunction setupPlaylist(playerId, segClass){\n  const player = document.getElementById(playerId);\n  const segs = [...document.querySelectorAll('.'+segClass)].map(a => a.getAttribute('src') || a.src);\n  if(!player || !segs.length) return;\n  let i = 0;\n  player.src = segs[0];\n  player.addEventListener('ended', () => {\n    if(i < segs.length - 1){ i++; player.src = segs[i]; player.play().catch(()=>{}); }\n    else { i = 0; player.src = segs[0]; }\n  });\n}\nsetupPlaylist('msg-player','seg-msg');\nsetupPlaylist('ali-player','seg-ali');\n\n// Personnes reveal\ndocument.querySelectorAll('.suspect').forEach(s => s.addEventListener('click', () => s.classList.toggle('revealed')));\n// Indices reveal\ndocument.querySelectorAll('.temoin').forEach(t => t.addEventListener('click', () => t.classList.toggle('revealed')));\n\n// Présent ou passé ?\ndocument.querySelectorAll('.pp-row').forEach(row => {\n  const ans = row.dataset.ans;\n  row.querySelectorAll('.pp-btn').forEach(btn => {\n    btn.addEventListener('click', () => {\n      row.querySelectorAll('.pp-btn').forEach(b => b.classList.remove('good','bad'));\n      btn.classList.add(btn.dataset.c === ans ? 'good' : 'bad');\n    });\n  });\n});\n\n// Solution toggle\ndocument.getElementById('btn-solution').addEventListener('click', () => {\n  const box = document.getElementById('solution-box');\n  if (box.classList.contains('on')) { box.classList.remove('on'); return; }\n  if (confirm('Cette section est réservée à l\\'enseignant·e. Afficher la solution ?')) box.classList.add('on');\n});\n\n// Reset\ndocument.getElementById('btn-reset').addEventListener('click', () => {\n  document.querySelectorAll('.suspect,.temoin').forEach(x => x.classList.remove('revealed'));\n  document.querySelectorAll('.pp-btn').forEach(b => b.classList.remove('good','bad'));\n  document.getElementById('solution-box').classList.remove('on');\n  document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
