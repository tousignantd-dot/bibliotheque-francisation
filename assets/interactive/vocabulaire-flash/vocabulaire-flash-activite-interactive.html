<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vocabulaire — Cartes mémoire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#EEF7F0;font-family:'Nunito','Arial Rounded MT Bold',sans-serif;color:#123321}
body{display:flex;flex-direction:column;min-height:100vh}

#hdr{background:#2E7D4F;color:#fff;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 3px 16px rgba(46,125,79,.3)}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-ic{width:44px;height:44px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.hdr-eye{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.2em;opacity:.7;line-height:1}
.hdr-h1{font-size:24px;font-weight:900;line-height:1.15}
.hdr-r{display:flex;align-items:center;gap:12px}
#prog-chip{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.45);border-radius:999px;padding:8px 18px;font-size:14px;font-weight:900;white-space:nowrap}
#streak-chip{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.45);border-radius:999px;padding:8px 16px;font-size:14px;font-weight:900;white-space:nowrap;transition:transform .2s}
#streak-chip.bump{transform:scale(1.15)}
#langSelect{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.45);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:800;color:#fff;font-family:'Nunito',sans-serif;cursor:pointer}
#langSelect option{color:#123321}

#main{flex:1;display:flex;justify-content:center;padding:32px 20px;overflow-y:auto}
#card{width:100%;max-width:560px;display:flex;flex-direction:column;gap:18px}

/* Écran de démarrage */
#startView .field{margin-bottom:16px}
#startView label{display:block;font-size:13px;font-weight:800;color:#2E7D4F;margin-bottom:6px}
#startView select{width:100%;height:44px;border:2.5px solid #B8DEC4;border-radius:10px;padding:0 14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#123321;background:#fff}
.start-card{background:#fff;border-radius:18px;padding:28px 30px;box-shadow:0 2px 14px rgba(0,0,0,.06)}
.start-stats{display:flex;gap:10px;margin-bottom:18px}
.stat-box{flex:1;background:#F0FAF3;border-radius:10px;padding:10px 14px;text-align:center}
.stat-box .n{font-size:22px;font-weight:900;color:#2E7D4F}
.stat-box .l{font-size:11px;font-weight:800;color:#5A8A6D;text-transform:uppercase;letter-spacing:.06em}

#progbar{display:flex;gap:4px}
.pseg{height:5px;flex:1;border-radius:3px;background:#D0EBD9}
.pseg.done{background:#2E7D4F}

/* Carte flash */
#flashcard{background:#fff;border-radius:18px;padding:40px 32px;box-shadow:0 2px 14px rgba(0,0,0,.06);min-height:220px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:14px;cursor:pointer}
.card-domaine{display:inline-block;background:#EAF6EE;color:#2E7D4F;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;padding:4px 12px;border-radius:8px}
.card-definition{font-size:19px;font-weight:700;line-height:1.6;color:#123321}
.card-hint{font-size:13px;color:#7A9885;font-weight:700}
.card-word{font-size:26px;font-weight:900;color:#2E7D4F}
.card-exemple{font-size:15px;font-style:italic;color:#4A6B57;line-height:1.6}
.btn-translate{background:#EFF6FF;color:#1D4ED8;border:2px solid #BFDBFE;border-radius:10px;padding:8px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s}
.btn-translate:hover{background:#DBEAFE}
.btn-translate:disabled{opacity:.6;cursor:wait}
.translation-box{background:#EFF6FF;border:2px solid #BFDBFE;border-radius:10px;padding:10px 16px;font-size:14px;color:#1E3A8A;line-height:1.55;text-align:left}
.translation-box b{font-size:17px}

.guess-zone{width:100%;display:flex;flex-direction:column;gap:10px;align-items:center}
#guessInput{width:100%;max-width:320px;height:48px;border:2.5px solid #B8DEC4;border-radius:10px;padding:0 16px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;text-align:center;color:#123321;background:#F7FCFB}
#guessInput:focus{outline:none;border-color:#2E7D4F;background:#fff}
#guessInput.correct{border-color:#4ADE80;background:#ECFDF5;color:#166534}
#guessInput.wrong{border-color:#F87171;background:#FEF2F2;color:#991B1B}
.guess-actions{display:flex;gap:8px;width:100%;max-width:320px}
.guess-actions .btn{padding:10px 14px;font-size:14px}
.btn-secondary{background:#F0FAF3;color:#2E7D4F;border-color:#D0EBD9}
.btn-secondary:hover{background:#E1F4E7}
.guess-feedback{font-size:14px;font-weight:800;min-height:20px}
.guess-feedback.ok{color:#166534}
.guess-feedback.no{color:#B91C1C}

.actions{display:flex;gap:10px}
.btn{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;border-radius:10px;padding:14px 18px;cursor:pointer;border:2.5px solid transparent;transition:all .15s;flex:1}
.btn-primary{background:#2E7D4F;color:#fff}
.btn-primary:hover{background:#256640}
.btn-encore{background:#FEF2F2;color:#B91C1C;border-color:#FCA5A5}
.btn-encore:hover{background:#FEE2E2}
.btn-difficile{background:#FFF7ED;color:#92400E;border-color:#FBBF24}
.btn-difficile:hover{background:#FEF3C7}
.btn-facile{background:#ECFDF5;color:#166534;border-color:#86EFAC}
.btn-facile:hover{background:#D1FAE5}

/* Écran final */
#endView{display:none;background:#fff;border-radius:18px;padding:36px 30px;text-align:center;box-shadow:0 2px 14px rgba(0,0,0,.06)}
#endView.on{display:block}
#endView .emoji{font-size:52px;margin-bottom:10px}
#endView h2{font-size:24px;font-weight:900;margin-bottom:6px}
#endView p{font-size:15px;color:#5A8A6D;margin-bottom:20px}

.hidden{display:none}
</style>
</head>
<body>

<div id="hdr">
  <div class="hdr-l">
    <div class="hdr-ic">🃏</div>
    <div>
      <div class="hdr-eye">Francisation · Niveau 4</div>
      <div class="hdr-h1">Vocabulaire — Cartes mémoire</div>
    </div>
  </div>
  <div class="hdr-r">
    <select id="langSelect" title="Ma langue maternelle">
      <option value="">🌐 Choisir ma langue</option>
      <option value="anglais">English</option>
      <option value="espagnol">Español</option>
      <option value="arabe">العربية</option>
      <option value="créole haïtien">Kreyòl ayisyen</option>
      <option value="mandarin">中文</option>
      <option value="portugais">Português</option>
      <option value="tagalog">Tagalog</option>
      <option value="vietnamien">Tiếng Việt</option>
      <option value="hindi">हिन्दी</option>
      <option value="ourdou">اردو</option>
      <option value="bengali">বাংলা</option>
      <option value="russe">Русский</option>
      <option value="ukrainien">Українська</option>
      <option value="roumain">Română</option>
      <option value="persan">فارسی</option>
      <option value="turc">Türkçe</option>
      <option value="italien">Italiano</option>
      <option value="__autre__">Autre…</option>
    </select>
    <span id="streak-chip"></span>
    <span id="prog-chip"></span>
  </div>
</div>

<div id="main">
  <div id="card">

    <div id="startView">
      <div class="start-card">
        <div class="field">
          <label>Domaine à réviser</label>
          <select id="domainSelect">
            <option value="">Tous les domaines</option>
          </select>
        </div>
        <div class="start-stats" id="startStats"></div>
        <button class="btn btn-primary" id="startBtn" style="width:100%">Commencer la session</button>
      </div>
    </div>

    <div id="sessionView" class="hidden">
      <div id="progbar"></div>
      <div id="flashcard" style="cursor:default">
        <span class="card-domaine" id="cardDomaine"></span>
        <div class="card-definition" id="cardFront"></div>
        <button class="btn-translate" id="translateDefBtn">🌐 Traduire la définition</button>
        <div class="translation-box hidden" id="translationDefBox"></div>

        <div class="guess-zone" id="guessZone">
          <input type="text" id="guessInput" placeholder="Écris le mot ici…" autocomplete="off" autocapitalize="off" spellcheck="false" />
          <div class="guess-feedback" id="guessFeedback"></div>
          <div class="guess-actions">
            <button class="btn btn-secondary" id="giveUpBtn">🙈 Je ne sais pas</button>
            <button class="btn btn-primary" id="checkGuessBtn">Vérifier</button>
          </div>
        </div>

        <div id="cardBack" class="hidden">
          <div class="card-word" id="cardWord"></div>
          <div class="card-exemple" id="cardExemple"></div>
          <button class="btn-translate" id="translateBtn" style="margin-top:10px">🌐 Traduire dans ma langue</button>
          <div class="translation-box hidden" id="translationBox" style="margin-top:10px"></div>
        </div>
      </div>
      <div class="actions hidden" id="rateActions">
        <button class="btn btn-encore" id="btnEncore">😵 Encore</button>
        <button class="btn btn-difficile" id="btnDifficile">🤔 Difficile</button>
        <button class="btn btn-facile" id="btnFacile">😊 Facile</button>
      </div>
    </div>

    <div id="endView">
      <div class="emoji">🎉</div>
      <h2>Session terminée !</h2>
      <p id="endSummary"></p>
      <button class="btn btn-primary" id="restartBtn" style="max-width:240px;margin:0 auto">Nouvelle session</button>
    </div>

  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const studentCode = params.get('code') || '';

let cards = [];
let idx = 0;
let revealed = false;
let counts = { encore: 0, difficile: 0, facile: 0 };
let streak = 0;
let bestStreak = 0;
let cachedTranslation = null; // {wordId, traduction, definitionTraduite, exempleTraduit}

/* ── Langue maternelle ─────────────────────────────────────────────── */
const langSelect = document.getElementById('langSelect');
const savedLang = localStorage.getItem('vocabLang') || '';
const savedLangLabel = localStorage.getItem('vocabLangLabel') || '';
if (savedLang && [...langSelect.options].some(o => o.value === savedLang)) {
  langSelect.value = savedLang;
} else if (savedLangLabel) {
  const opt = document.createElement('option');
  opt.value = savedLangLabel; opt.textContent = savedLangLabel;
  langSelect.insertBefore(opt, langSelect.querySelector('option[value="__autre__"]'));
  langSelect.value = savedLangLabel;
}

langSelect.addEventListener('change', () => {
  if (langSelect.value === '__autre__') {
    const custom = prompt('Quelle est ta langue maternelle ?');
    if (custom && custom.trim()) {
      const label = custom.trim();
      const opt = document.createElement('option');
      opt.value = label; opt.textContent = label;
      langSelect.insertBefore(opt, langSelect.querySelector('option[value="__autre__"]'));
      langSelect.value = label;
      localStorage.setItem('vocabLang', label);
      localStorage.setItem('vocabLangLabel', label);
    } else {
      langSelect.value = savedLang || '';
    }
  } else {
    localStorage.setItem('vocabLang', langSelect.value);
    localStorage.removeItem('vocabLangLabel');
  }
});

async function loadDomains(){
  try {
    const res = await fetch('/api/vocab/session?code=' + encodeURIComponent(studentCode) + '&n=1');
    const data = await res.json();
    if (!res.ok) return;
    const sel = document.getElementById('domainSelect');
    (data.domaines || []).forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      sel.appendChild(opt);
    });
    document.getElementById('startStats').innerHTML =
      '<div class="stat-box"><div class="n">' + data.dueCount + '</div><div class="l">à réviser</div></div>' +
      '<div class="stat-box"><div class="n">' + data.newCount + '</div><div class="l">nouveaux mots</div></div>';
  } catch (e) { /* silencieux */ }
}

document.getElementById('startBtn').addEventListener('click', startSession);

async function startSession(){
  const domain = document.getElementById('domainSelect').value;
  try {
    const res = await fetch('/api/vocab/session?code=' + encodeURIComponent(studentCode) + '&n=10' + (domain ? '&domain=' + encodeURIComponent(domain) : ''));
    const data = await res.json();
    if (!res.ok || !data.cards || data.cards.length === 0) {
      alert('Aucune carte disponible pour le moment.');
      return;
    }
    cards = data.cards;
    idx = 0;
    counts = { encore: 0, difficile: 0, facile: 0 };
    streak = 0;
    bestStreak = 0;
    updateStreakChip();
    document.getElementById('startView').classList.add('hidden');
    document.getElementById('sessionView').classList.remove('hidden');
    document.getElementById('endView').classList.remove('on');
    renderCard();
  } catch (e) {
    alert('Impossible de charger les cartes. Vérifie ta connexion.');
  }
}

function buildProgbar(){
  const bar = document.getElementById('progbar');
  bar.innerHTML = '';
  cards.forEach((_, i) => {
    const seg = document.createElement('div');
    seg.className = 'pseg' + (i < idx ? ' done' : '');
    bar.appendChild(seg);
  });
}

function renderCard(){
  const c = cards[idx];
  document.getElementById('prog-chip').textContent = 'Carte ' + (idx+1) + ' / ' + cards.length;
  document.getElementById('cardDomaine').textContent = c.domaine;
  document.getElementById('cardFront').textContent = c.definition;
  document.getElementById('cardBack').classList.add('hidden');
  document.getElementById('rateActions').classList.add('hidden');
  document.getElementById('cardWord').textContent = c.mot;
  document.getElementById('cardExemple').textContent = c.exemple;

  const translationBox = document.getElementById('translationBox');
  translationBox.classList.add('hidden');
  translationBox.textContent = '';
  const translateBtn = document.getElementById('translateBtn');
  translateBtn.disabled = false;
  translateBtn.textContent = '🌐 Traduire dans ma langue';
  translateBtn.classList.remove('hidden');

  const translationDefBox = document.getElementById('translationDefBox');
  translationDefBox.classList.add('hidden');
  translationDefBox.textContent = '';
  const translateDefBtn = document.getElementById('translateDefBtn');
  translateDefBtn.disabled = false;
  translateDefBtn.textContent = '🌐 Traduire la définition';
  translateDefBtn.classList.remove('hidden');

  const guessInput = document.getElementById('guessInput');
  guessInput.value = '';
  guessInput.disabled = false;
  guessInput.classList.remove('correct', 'wrong');
  document.getElementById('guessFeedback').textContent = '';
  document.getElementById('guessFeedback').className = 'guess-feedback';
  document.getElementById('guessZone').classList.remove('hidden');
  document.getElementById('checkGuessBtn').disabled = false;
  document.getElementById('giveUpBtn').disabled = false;

  cachedTranslation = null;
  revealed = false;
  buildProgbar();
  guessInput.focus();
}

function normalizeGuess(s){
  return (s || '')
    .trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/^(un |une |le |la |les |l')/, '')
    .trim();
}

function revealCard(){
  if (revealed) return;
  revealed = true;
  document.getElementById('cardBack').classList.remove('hidden');
  document.getElementById('rateActions').classList.remove('hidden');
  document.getElementById('guessInput').disabled = true;
  document.getElementById('checkGuessBtn').disabled = true;
  document.getElementById('giveUpBtn').disabled = true;
}

function updateStreakChip(){
  const chip = document.getElementById('streak-chip');
  chip.textContent = '🔥 ' + streak;
  chip.classList.add('bump');
  setTimeout(() => chip.classList.remove('bump'), 200);
}

document.getElementById('checkGuessBtn').addEventListener('click', () => {
  const c = cards[idx];
  const guessInput = document.getElementById('guessInput');
  const feedback = document.getElementById('guessFeedback');
  const ok = normalizeGuess(guessInput.value) === normalizeGuess(c.mot);

  if (ok){
    guessInput.classList.remove('wrong');
    guessInput.classList.add('correct');
    streak++;
    bestStreak = Math.max(bestStreak, streak);
    updateStreakChip();
    feedback.className = 'guess-feedback ok';
    feedback.textContent = '🎉 Bravo ! Bonne réponse.';
    setTimeout(revealCard, 500);
  } else {
    guessInput.classList.remove('correct');
    guessInput.classList.add('wrong');
    streak = 0;
    updateStreakChip();
    feedback.className = 'guess-feedback no';
    feedback.textContent = 'Pas tout à fait… réessaie ou révèle la réponse.';
  }
});

document.getElementById('guessInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('checkGuessBtn').click();
});

document.getElementById('giveUpBtn').addEventListener('click', () => {
  streak = 0;
  updateStreakChip();
  revealCard();
});

async function getTranslation(){
  const c = cards[idx];
  if (cachedTranslation && cachedTranslation.wordId === c.id) return cachedTranslation;
  const res = await fetch('/api/vocab/translate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ code: studentCode, wordId: c.id, language: langSelect.value }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Traduction indisponible pour le moment.');
  cachedTranslation = Object.assign({ wordId: c.id }, data);
  return cachedTranslation;
}

document.getElementById('translateDefBtn').addEventListener('click', async () => {
  const lang = langSelect.value;
  if (!lang || lang === '__autre__') {
    alert('Choisis d\'abord ta langue maternelle en haut de la page.');
    return;
  }
  const btn = document.getElementById('translateDefBtn');
  const box = document.getElementById('translationDefBox');
  btn.disabled = true;
  btn.textContent = 'Traduction en cours…';
  try {
    const data = await getTranslation();
    box.textContent = data.definitionTraduite;
    box.classList.remove('hidden');
    btn.classList.add('hidden');
  } catch (err) {
    box.textContent = err.message;
    box.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = '🌐 Traduire la définition';
  }
});

document.getElementById('translateBtn').addEventListener('click', async () => {
  const lang = langSelect.value;
  if (!lang || lang === '__autre__') {
    alert('Choisis d\'abord ta langue maternelle en haut de la page.');
    return;
  }
  const translateBtn = document.getElementById('translateBtn');
  const translationBox = document.getElementById('translationBox');
  translateBtn.disabled = true;
  translateBtn.textContent = 'Traduction en cours…';
  try {
    const data = await getTranslation();
    translationBox.innerHTML = '<b>' + escHtml(data.traduction) + '</b><br>' + escHtml(data.exempleTraduit);
    translationBox.classList.remove('hidden');
    translateBtn.classList.add('hidden');
  } catch (err) {
    translationBox.textContent = err.message;
    translationBox.classList.remove('hidden');
    translateBtn.disabled = false;
    translateBtn.textContent = '🌐 Traduire dans ma langue';
  }
});

function escHtml(s){
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function rate(quality){
  const c = cards[idx];
  counts[quality]++;
  fetch('/api/vocab/answer', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ code: studentCode, wordId: c.id, quality }),
  }).catch(() => {});

  idx++;
  if (idx >= cards.length) {
    endSession();
  } else {
    renderCard();
  }
}

document.getElementById('btnEncore').addEventListener('click', () => rate('encore'));
document.getElementById('btnDifficile').addEventListener('click', () => rate('difficile'));
document.getElementById('btnFacile').addEventListener('click', () => rate('facile'));

function endSession(){
  document.getElementById('sessionView').classList.add('hidden');
  document.getElementById('endView').classList.add('on');
  document.getElementById('endSummary').textContent =
    cards.length + ' mots revus — ' + counts.facile + ' faciles, ' + counts.difficile + ' difficiles, ' + counts.encore + ' à revoir. Meilleure série : 🔥 ' + bestStreak + '.';
  document.getElementById('prog-chip').textContent = '';
  document.getElementById('streak-chip').textContent = '';
  lmsTrack('exercise_completed', { zonesDone: cards.length, score: Math.round((counts.facile / cards.length) * 100) });
}

document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('endView').classList.remove('on');
  document.getElementById('startView').classList.remove('hidden');
  loadDomains();
});

function lmsTrack(event, data) {
  try { window.parent.postMessage(Object.assign({lms: true, event: event}, data||{}), '*'); } catch(e) {}
}

loadDomains();
</script>
</body>
</html>
