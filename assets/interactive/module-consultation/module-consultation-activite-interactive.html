<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{display:flex;flex-direction:column;min-height:100vh}

#hdr{background:#0F766E;color:#fff;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 3px 16px rgba(15,118,110,.3);flex-shrink:0}

.hdr-eye{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.2em;opacity:.7;line-height:1}

#prog-chip{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.45);border-radius:999px;padding:8px 18px;font-size:16px;font-weight:900;white-space:nowrap}

#tabs{background:#fff;display:flex;gap:6px;padding:10px 32px;position:sticky;top:76px;z-index:190;box-shadow:0 2px 12px rgba(0,0,0,.07);flex-wrap:wrap}
.tab{border:2.5px solid transparent;border-radius:999px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:14.5px;font-weight:800;cursor:pointer;background:#EDF6F4;color:#5E8A82;transition:all .15s;display:flex;align-items:center;gap:8px}
.tab .tno{width:24px;height:24px;border-radius:50%;background:#B7DED7;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0}
.tab.on{background:#0F766E;color:#fff}
.tab.on .tno{background:rgba(255,255,255,.28)}

#sel-banner{background:#FEF3C7;border-bottom:3px solid #F59E0B;padding:10px 32px;display:none;align-items:center;gap:10px;font-size:19px;font-weight:800;color:#92400E;flex-shrink:0;position:sticky;top:132px;z-index:180}

.sec{display:none;flex-direction:column}

.audio-pl{flex:0 0 160px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:6px;gap:10px}
.audio-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;opacity:.6;text-align:center}
.btn-lu{background:rgba(255,255,255,.12);color:#E8F5F2;border:2px solid rgba(255,255,255,.35);border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s;text-align:center;line-height:1.3;width:100%}
.btn-lu:hover{background:rgba(255,255,255,.25)}

.dial-txt{flex:1;min-width:280px;display:flex;flex-direction:column;gap:7px;font-size:19px;font-weight:600;line-height:1.7;padding-right:8px}
.d-lbl{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:#7FD4C9;margin-bottom:6px;opacity:.85}

.intro{background:#DCEFEB;padding:14px 32px;font-size:17px;font-weight:700;color:#0B5C56;line-height:1.5;border-bottom:2px solid #B7DED7}

.exs{flex:1;padding:22px 32px 48px;display:flex;flex-direction:column;gap:20px}

.card{background:#fff;border-radius:18px;padding:22px 26px;box-shadow:0 4px 20px rgba(15,118,110,.08)}

.tag{color:#fff;border-radius:999px;padding:5px 16px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}

.savoir{background:#F1FBF9;border-left:5px solid #0F766E;border-radius:0 14px 14px 0;padding:16px 22px;margin-bottom:4px}

.rows{display:flex;flex-direction:column;gap:8px}

.qcard{background:#F0FAF7;border-left:4px solid #0F766E;border-radius:0 10px 10px 0;padding:12px 16px;display:flex;flex-direction:column;justify-content:center}
.qlbl{font-size:13px;font-weight:800;color:#0F766E;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}

.blanks-p{font-size:22px;line-height:2.9;font-weight:600;color:#123B32}

.zone{display:flex;align-items:center;justify-content:center;min-height:54px;border-radius:10px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:background .18s,border-color .18s,color .18s,transform .12s;user-select:none;text-align:center;padding:10px 14px;border:2.5px solid;line-height:1.35}
.zone.empty{background:#F0F9FF;border-color:#93C5D6;border-style:dashed;color:#94A3B8;font-size:17px}
.zone.dov{background:#E0F2FE!important;border-color:#38BDF8!important;border-style:solid!important;transform:scale(1.02)}
.zvf{min-width:150px;font-size:19px}
.f-vrai{background:#DCFCE7;border-color:#4ADE80;border-style:solid;color:#166534}
.f-faux{background:#FEE2E2;border-color:#FCA5A5;border-style:solid;color:#991B1B}
.zone.filled{background:#DBEAFE;border-color:#60A5FA;border-style:solid;color:#1E3A8A;font-size:17px}
.fb-ok{background:#D1FAE5!important;border-color:#34D399!important;border-style:solid!important;color:#065F46!important}
.fb-no{background:#FEE2E2!important;border-color:#F87171!important;border-style:solid!important;color:#991B1B!important;animation:shk .5s ease}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}60%{transform:translateX(6px)}80%{transform:translateX(-3px)}}

.blank{display:inline-block;min-width:130px;padding:4px 14px;margin:0 3px;border-radius:8px;font-weight:800;vertical-align:middle;cursor:pointer;transition:background .18s,border-color .18s,color .18s;user-select:none;border:2.5px dashed #93C5D6;background:#F0F9FF;color:#94A3B8;font-size:20px;text-align:center}
.blank.filled{border-style:solid;border-color:#5EEAD4;background:#CCFBF1;color:#0B5C56}
.blank.fb-ok{border-style:solid;border-color:#34D399;background:#D1FAE5;color:#065F46}
.blank.fb-no{border-style:solid;border-color:#F87171;background:#FEE2E2;color:#991B1B;animation:shk .5s ease}
.blank.dov{border-style:solid;border-color:#38BDF8;background:#E0F2FE}

.bsec{border-radius:12px;padding:14px 12px;flex-shrink:0}
.bsec.b1{background:#EDF6F4;border:1.5px solid #B7DED7}
.blbl{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px;color:#0F766E}
.btiles{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.btiles.vert{flex-direction:column;flex-wrap:nowrap}

.tile{border-radius:10px;font-weight:800;font-family:'Nunito',sans-serif;cursor:grab;transition:all .15s;user-select:none;border:2.5px solid;box-shadow:0 2px 7px rgba(0,0,0,.08);padding:10px 14px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.35}
.tile:active{cursor:grabbing;transform:scale(1.04);box-shadow:0 5px 14px rgba(0,0,0,.15)}
.tile.sel{background:#FEF9C3!important;border-color:#FBBF24!important;color:#92400E!important;box-shadow:0 0 0 4px rgba(245,158,11,.22),0 2px 7px rgba(0,0,0,.08)!important;transform:translateY(-1px)}
.tv{background:#DCFCE7;border-color:#4ADE80;color:#166534;font-size:19px;padding:13px 22px}
.tf{background:#FEE2E2;border-color:#FCA5A5;color:#991B1B;font-size:19px;padding:13px 22px}
.tn{background:#F0FDFA;border-color:#5EEAD4;color:#0B5C56;font-size:16px}
.ta{background:#FFF7ED;border-color:#FDBA74;color:#9A3412;font-size:15px}
.bempty{font-size:13px;color:#94A3B8;font-weight:600;text-align:center;padding:8px 0;font-style:italic}

.ghost{position:fixed;z-index:9999;pointer-events:none;opacity:.88;transform:scale(1.06) rotate(1.5deg);box-shadow:0 8px 24px rgba(0,0,0,.25);border-radius:10px}

#fc-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(15,25,35,.6);backdrop-filter:blur(5px);align-items:center;justify-content:center}
#fc-overlay.on{display:flex}
#fc-box{background:#0F766E;border-radius:24px;padding:44px 56px;max-width:760px;width:92%;box-shadow:0 24px 64px rgba(0,0,0,.4);display:flex;flex-direction:column;align-items:center;gap:20px;animation:fcPop .3s cubic-bezier(.34,1.4,.64,1)}
@keyframes fcPop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
#fc-counter{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.22em;color:rgba(255,255,255,.5)}
#fc-word{font-size:36px;font-weight:900;color:#fff;text-align:center;line-height:1.2;border-bottom:2px solid rgba(255,255,255,.18);padding-bottom:18px;width:100%}
#fc-def{font-size:21px;font-weight:700;color:#fff;line-height:1.6;text-align:center}
#fc-ex{font-size:18px;font-weight:600;color:rgba(255,255,255,.78);line-height:1.6;text-align:center;font-style:italic}
#fc-ex strong{font-weight:900;font-style:normal;color:#fff}
#fc-def.hidden,#fc-ex.hidden{display:none}
#fc-reveal-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:8px 20px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
#fc-reveal-btn:hover{background:rgba(255,255,255,.38)}
#fc-reveal-btn.hidden{display:none}
#fc-btns{display:flex;gap:14px;margin-top:6px;flex-wrap:wrap;justify-content:center}
.fc-btn{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.38);color:#fff;border-radius:10px;padding:10px 22px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer}
.fc-btn:hover{background:rgba(255,255,255,.28)}

.vocab-sec{background:#EDF6F4;border-bottom:3px solid rgba(15,118,110,.15);padding:14px 32px 18px}
.vocab-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px 20px}
.vw{display:flex;align-items:baseline;gap:8px;padding:7px 10px;border-radius:8px;background:rgba(255,255,255,.6);cursor:pointer}
.vw span.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#0F766E;flex-shrink:0}
.vw span.w{font-size:17px;font-weight:700;color:#123B32}

/* Sections personnalisées (oral / écrit / autoéval) */
.custom{max-width:660px}
.lead{font-size:16px;font-weight:700;color:#3B6156;line-height:1.6;margin-bottom:14px}
.rec-zone{display:flex;flex-direction:column;align-items:center;gap:10px;margin:8px 0}
#recBtn{width:78px;height:78px;border-radius:50%;border:none;background:#0F766E;color:#fff;font-size:30px;cursor:pointer;box-shadow:0 4px 16px rgba(15,118,110,.32)}
#recBtn.recording{background:#E23D2E;animation:pulse 1.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(226,61,46,.45)}70%{box-shadow:0 0 0 16px rgba(226,61,46,0)}100%{box-shadow:0 0 0 0 rgba(226,61,46,0)}}
.rec-lbl{font-size:13.5px;font-weight:800;color:#5E8A82}
textarea,input.txt{width:100%;border:2.5px solid #B7DED7;border-radius:12px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:#123B32;background:#F7FCFB;resize:vertical}
textarea:focus{outline:none;border-color:#0F766E}
.btn{font-family:'Nunito',sans-serif;font-size:14.5px;font-weight:800;border-radius:10px;padding:11px 18px;cursor:pointer;border:2.5px solid transparent}
.btn-pri{background:#0F766E;color:#fff}.btn-pri:hover{background:#0B5C56}.btn-pri:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:#EDF6F4;color:#0F766E;border-color:#B7DED7}.btn-ghost:hover{background:#DCEFEB}
.btn-send{background:#12556B;color:#fff}.btn-send:disabled{opacity:.5}
.fb{background:#F0FAF7;border:2px solid #B7DED7;border-radius:12px;padding:14px 16px;display:none;flex-direction:column;gap:8px;margin-top:12px}
.fb.on{display:flex}
.fb-t{font-size:11.5px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:#0B5C56}
.fb-c{font-size:15px;font-weight:800;color:#0B5C56;line-height:1.5}
.fb-e{font-size:12.5px;font-weight:700;color:#B45309;line-height:1.5;padding-left:14px;position:relative}
.fb-e::before{content:"•";position:absolute;left:2px}
.status{font-size:13.5px;font-weight:800;color:#5E8A82;text-align:center;display:none;margin-top:8px}
.status.on{display:block}
.err{font-size:13px;font-weight:800;color:#B91C1C;background:#FEF2F2;border:2px solid #FCA5A5;border-radius:10px;padding:10px 14px;display:none;margin-top:8px}
.err.on{display:block}
.sent{font-size:13px;font-weight:800;color:#12556B}
.selfrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid #DCEFEB}
.self-txt{font-size:15px;font-weight:800;color:#123B32}
.self-opts{display:flex;gap:6px}
.self-opts button{width:40px;height:40px;border-radius:9px;border:2px solid #B7DED7;background:#fff;font-size:19px;cursor:pointer}
.self-opts button.sel{border-color:#0F766E;background:#DCEFEB}
.hidden{display:none!important}

@media(max-width:900px){.vocab-grid{grid-template-columns:1fr 1fr}.rrow2{grid-template-columns:1fr}.hdr-h1{font-size:22px}}
</style>

<body>

<div id="hdr">
  <div class="hdr-l">
    <div class="hdr-ic">👨‍⚕️</div>
    <div><div class="hdr-eye">Francisation · Niveau 4 · Module complet</div><div class="hdr-h1">La visite chez le médecin</div></div>
  </div>
  <div class="hdr-r">
    <div id="prog-chip">⭐ 0 / 0</div>
    <button id="btn-reset">↺ Réinitialiser</button>
  </div>
</div>

<div id="tabs"></div>

<div id="sel-banner">
  ✋ Sélectionné : «&nbsp;<span id="sel-lbl">—</span>&nbsp;» — Cliquez sur une case pour le placer.
</div>

<div id="sections"></div>

<div id="fc-overlay">
  <div id="fc-box">
    <div id="fc-counter">Carte 1 / 12</div>
    <div id="fc-word">—</div>
    <button id="fc-reveal-btn">Voir la définition</button>
    <div id="fc-def" class="hidden">—</div>
    <div id="fc-ex" class="hidden">—</div>
    <div id="fc-btns">
      <button class="fc-btn" id="fc-prev">← Précédente</button>
      <button class="fc-btn" id="fc-next">Suivante →</button>
      <button class="fc-btn" id="fc-close">✕ Fermer</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  LA VISITE CHEZ LE MÉDECIN — Module interactif Niveau 4 (FLS)
//  Sections : Je me prépare · Chez le médecin · La langue · Je parle ·
//             J'écris · Je m'évalue — suivi LMS intégré
// ═══════════════════════════════════════════════════════════════════════

function getCode(){
  const own=new URLSearchParams(location.search).get('code');
  if(own) return own;
  try{ return new URLSearchParams(window.parent.location.search).get('code')||''; }catch(e){ return ''; }
}
const studentCode=getCode();

// ── DIALOGUES ─────────────────────────────────────────────────────────
const DIALOGUES = {
  prep: {
    label: "Dialogue — Prendre un rendez-vous",
    lines: [
      ["LA RÉCEPTIONNISTE","Clinique Saint-Laurent, bonjour."],
      ["SAMI","Bonjour, j'aimerais prendre un rendez-vous. Je ne me sens pas bien."],
      ["LA RÉCEPTIONNISTE","Quels sont vos symptômes ?"],
      ["SAMI","J'ai mal à la gorge et je tousse depuis trois jours. J'ai aussi un peu de fièvre."],
      ["LA RÉCEPTIONNISTE","Avez-vous votre carte d'assurance maladie ?"],
      ["SAMI","Oui, je l'ai."],
      ["LA RÉCEPTIONNISTE","Parfait. Pouvez-vous venir demain à quatorze heures ?"],
      ["SAMI","Oui, c'est parfait. Merci beaucoup."],
    ]
  },
  co: {
    label: "Dialogue — La consultation",
    lines: [
      ["LE MÉDECIN","Bonjour, installez-vous. Qu'est-ce qui vous amène aujourd'hui ?"],
      ["FATIMA","Bonjour docteur. J'ai très mal à la tête depuis une semaine."],
      ["LE MÉDECIN","Est-ce que vous avez aussi de la fièvre ?"],
      ["FATIMA","Oui, un peu. Et je suis très fatiguée."],
      ["LE MÉDECIN","Est-ce que vous dormez bien la nuit ?"],
      ["FATIMA","Non, pas très bien. Je me réveille souvent."],
      ["LE MÉDECIN","Je comprends. Ce n'est rien de grave. Je vais vous prescrire un médicament pour la douleur. Reposez-vous et buvez beaucoup d'eau."],
      ["FATIMA","D'accord. Merci beaucoup, docteur."],
    ]
  },
};

// ── SECTIONS ──────────────────────────────────────────────────────────
const SECTIONS = [
  {id:'prep', no:'▶', title:'Je me prépare', color:'#0F766E',
   intro:"🩺 Fatima ne se sent pas bien. Avant de voir le médecin, elle prend un rendez-vous. Lisez le dialogue, découvrez le vocabulaire, puis faites les exercices.",
   dialogue:'prep'},
  {id:'co', no:'1', title:'Chez le médecin', color:'#C0573A',
   intro:"👨‍⚕️ Fatima est maintenant dans le bureau du médecin. Écoutez la consultation, puis répondez aux exercices de compréhension.",
   dialogue:'co'},
  {id:'langue', no:'2', title:'La langue', color:'#6B4FBB',
   intro:"✍️ Travaillons la grammaire utile chez le médecin : parler de la douleur, donner un conseil, poser une question et parler de la durée."},
  {id:'parle', no:'3', title:'Je parle', color:'#0D9488', custom:true,
   intro:"🎤 À ton tour de parler ! Enregistre-toi en privé, obtiens une rétroaction, puis envoie ta meilleure prise à ton enseignant si tu le veux."},
  {id:'ecris', no:'4', title:"J'écris", color:'#0E7490', custom:true,
   intro:"📝 Raconte ta visite par écrit. L'assistant corrige ton texte en privé."},
  {id:'eval', no:'✓', title:'Je m\'évalue', color:'#166534', custom:true,
   intro:"🌟 Fais le point : qu'est-ce que tu es maintenant capable de faire ?"},
];

// ── EXERCICES ─────────────────────────────────────────────────────────
// type 'vf'     : lignes {id,txt,ok} — tuiles fixes (labels)
// type 'match'  : lignes {id,q,aid,a} — banque = réponses
// type 'blanks' : segs {k:'t'/'b',id,c} + words {id,l}
const EXOS = [
  // ── JE ME PRÉPARE ──
  {sec:'prep', id:'pr1', type:'match', num:'Exercice 1', tit:'Le bon professionnel', color:'#0F766E',
   sub:'Associez chaque problème au bon professionnel de la santé.',
   rows:[
    {id:'pr1a', q:"J'ai mal aux dents.", aid:'pa1', a:"le dentiste"},
    {id:'pr1b', q:"Je vois mal de loin.", aid:'pa2', a:"l'optométriste"},

const ZONES = {};
EXOS.forEach(ex => {
  if (ex.type === 'vf')     ex.rows.forEach(r => ZONES[r.id] = {cv:r.ok, zcat:'vf', exo:ex.id});
  if (ex.type === 'match')  ex.rows.forEach(r => ZONES[r.id] = {cv:r.aid, zcat:'id', exo:ex.id});
  if (ex.type === 'rows')   ex.rows.forEach(r => ZONES[r.id] = {cv:r.cv, zcat:'id', exo:ex.id});
  if (ex.type === 'blanks') ex.segs.filter(s=>s.k==='b').forEach(s =>
    ZONES[s.id] = {cv:s.c, zcat: ex.byLabel ? 'lbl' : 'id', exo:ex.id});
});
const TOTAL_ZONES = Object.keys(ZONES).length;

// ── LMS TRACKING ──────────────────────────────────────────────────────
function lmsTrack(event, data) {
  try { window.parent.postMessage(Object.assign({lms:true, event:event}, data||{}), '*'); } catch(e) {}
  try {
    const up = new URLSearchParams(window.parent.location.search);
    const code = up.get('code'), actId = parseInt(up.get('activityId'))||null, title = up.get('title')||'';
    if (code && actId) {
      fetch('/api/student/progress', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(Object.assign({code, activityId:actId, activityTitle:title, event}, data||{})),
      }).catch(()=>{});
    }
  } catch(e2) {}
}
const TR = {attempts:{}, correct:{}};
function trackPlacement(zid, ok) {
  if (ok && !TR.correct[zid]) {
    TR.correct[zid] = true;
    if (!(zid in TR.attempts)) TR.attempts[zid] = 0;
    const zonesDone = Object.keys(TR.correct).length;
    const firstTry = Object.keys(TR.correct).filter(k => (TR.attempts[k]||0)===0).length;
    const totalErrors = Object.keys(TR.attempts).reduce((s,k)=>s+(TR.attempts[k]||0),0);
    lmsTrack('exercise_completed', {zones:TOTAL_ZONES, zonesDone, firstTry, totalErrors});
  } else if (!ok && !TR.correct[zid]) {
    TR.attempts[zid] = (TR.attempts[zid]||0) + 1;
  }
  updateChip();
}

// ── DIALOGUE (synthèse vocale) ────────────────────────────────────────
let dialogueRead = false;
function playDialogue(dialId, btn){
  try{
    speechSynthesis.cancel();
    const voices = speechSynthesis.getVoices();
    const fr = voices.filter(v=>/^fr/i.test(v.lang));
    (DIALOGUES[dialId].lines||[]).forEach((l,i)=>{
      const u=new SpeechSynthesisUtterance(l[1]);
      u.lang='fr-CA'; u.rate=0.95; u.pitch=(i%2===0)?1.12:0.9;
      if(fr.length) u.voice=(i%2===0)?fr[0]:(fr[1]||fr[0]);
      speechSynthesis.speak(u);
    });
    if(!dialogueRead){ dialogueRead=true; lmsTrack('dialogue_listened'); }
  }catch(e){}
}
function markRead(btn){
  btn.classList.add('done'); btn.textContent='✓ Lu';
  if(!dialogueRead){ dialogueRead=true; lmsTrack('dialogue_listened'); }
}

// ── LOGIQUE DE PLACEMENT ──────────────────────────────────────────────
function checkOk(zid, iid, lbl) {
  const z = ZONES[zid];
  if (!z) return false;
  if (z.zcat === 'vf' || z.zcat === 'lbl') return lbl === z.cv;
  return iid === z.cv;
}
function doPlace(zid, iid, lbl, cat, from) {
  if (from === zid) { S.sel = null; render(); return; }
  if (from && from !== zid) { if (S.pl[zid]) S.pl[from] = S.pl[zid]; else delete S.pl[from]; delete S.fb[from]; delete S.fb[zid]; }
  else if (!from && S.pl[zid]) { delete S.pl[zid]; delete S.fb[zid]; }
  S.pl[zid] = {iid, lbl, cat}; S.sel = null;
  const ok = checkOk(zid, iid, lbl);
  S.fb[zid] = ok ? 'ok' : 'no';
  trackPlacement(zid, ok);
  render();
  setTimeout(() => { delete S.fb[zid]; if (!ok) delete S.pl[zid]; render(); }, ok ? 1400 : 850);
}
function zoneClick(zid) {
  if (S.sel) { doPlace(zid, S.sel.iid, S.sel.lbl, S.sel.cat, S.sel.from); }
  else if (S.pl[zid] && !S.fb[zid]) {
    const {iid,lbl,cat} = S.pl[zid];
    delete S.pl[zid]; delete S.fb[zid];
    S.sel = {iid,lbl,cat,from:zid}; render();
  }
}
function tileClick(iid, lbl, cat) {
  if (S.sel && S.sel.iid === iid && !S.sel.from) S.sel = null;
  else S.sel = {iid,lbl,cat,from:null};
  render();
}

// ── DRAG & DROP ───────────────────────────────────────────────────────
let dd = null;
function drg(el, iid, lbl, cat, from) {
  el.draggable = true;
  el.addEventListener('dragstart', e => { dd = {iid,lbl,cat,from:from||null}; e.dataTransfer.setData('text/plain', JSON.stringify(dd)); e.dataTransfer.effectAllowed='move'; setTimeout(()=>el.style.opacity='.45',0); });
  el.addEventListener('dragend', () => { el.style.opacity=''; dd=null; });
}
function drp(el, zid) {
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dov'); });
  el.addEventListener('dragleave', () => el.classList.remove('dov'));
  el.addEventListener('drop', e => { e.preventDefault(); el.classList.remove('dov'); let d=dd; if(!d){try{d=JSON.parse(e.dataTransfer.getData('text/plain'))}catch{}} if(!d)return; doPlace(zid, d.iid, d.lbl, d.cat, d.from); dd=null; });
}
let ts=null, ghost=null;
function tch(el, iid, lbl, cat, from) {
  el.addEventListener('touchstart', e => { const t=e.touches[0]; ts={x:t.clientX,y:t.clientY,iid,lbl,cat,from:from||null,el,moved:false}; }, {passive:true});
}
document.addEventListener('touchmove', e => {
  if(!ts) return;
  const t=e.touches[0], dx=t.clientX-ts.x, dy=t.clientY-ts.y;
  if(!ts.moved && Math.sqrt(dx*dx+dy*dy)>8){
    ts.moved=true;
    const r=ts.el.getBoundingClientRect();
    ghost=ts.el.cloneNode(true);
    ghost.className=ts.el.className+' ghost'; ghost.style.width=r.width+'px';
    ghost.style.left=(t.clientX-r.width/2)+'px'; ghost.style.top=(t.clientY-r.height/2)+'px';
    document.body.appendChild(ghost);
  }
  if(ts.moved && ghost){ e.preventDefault(); ghost.style.left=(t.clientX-ghost.offsetWidth/2)+'px'; ghost.style.top=(t.clientY-ghost.offsetHeight/2)+'px'; }
}, {passive:false});
document.addEventListener('touchend', e => {
  if(!ts) return;
  if(ts.moved && ghost){
    ghost.remove(); ghost=null;
    const t=e.changedTouches[0];
    const zel=document.elementsFromPoint(t.clientX,t.clientY).find(x=>x.dataset&&x.dataset.zid);
    if(zel) doPlace(zel.dataset.zid, ts.iid, ts.lbl, ts.cat, ts.from);
    e.preventDefault();
  }
  ts=null;
});

// ── HELPERS ───────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function usedIds(){return new Set(Object.values(S.pl).map(p=>p.iid))}
function shuffled(arr, seed){
  const a=arr.slice(); let s=seed||42;
  for(let i=a.length-1;i>0;i--){ s=(s*9301+49297)%233280; const j=Math.floor((s/233280)*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function mkZone(zid, extra, placeholder){
  const el=document.createElement('div');
  const placed=S.pl[zid], fb=S.fb[zid], z=ZONES[zid];
  let cls=['zone']; if(extra)cls.push(extra);
  if(fb)cls.push('fb-'+fb);
  else if(placed){
    if(z.zcat==='vf'&&(placed.lbl==='VRAI'||placed.lbl==='FAUX'))cls.push(placed.lbl==='VRAI'?'f-vrai':'f-faux');
    else cls.push('filled');
  } else cls.push('empty');
  el.className=cls.join(' ');
  el.dataset.zid=zid;
  el.textContent=placed?placed.lbl:(placeholder||'déposer ici');
  el.addEventListener('click',()=>zoneClick(zid));
  drp(el,zid);
  if(placed&&!fb){drg(el,placed.iid,placed.lbl,placed.cat,zid);tch(el,placed.iid,placed.lbl,placed.cat,zid)}
  return el;
}
function mkBlank(zid){
  const el=document.createElement('span');
  const placed=S.pl[zid], fb=S.fb[zid];
  let cls=['blank'];
  if(fb)cls.push('fb-'+fb); else if(placed)cls.push('filled');
  el.className=cls.join(' ');
  el.dataset.zid=zid;
  el.textContent=placed?placed.lbl:'…';
  el.addEventListener('click',()=>zoneClick(zid));
  drp(el,zid);
  if(placed&&!fb){drg(el,placed.iid,placed.lbl,placed.cat,zid);tch(el,placed.iid,placed.lbl,placed.cat,zid)}
  return el;
}
function mkTile(iid,lbl,cat,cls){
  const t=document.createElement('div');
  t.className='tile '+cls+(S.sel&&S.sel.iid===iid&&!S.sel.from?' sel':'');
  t.textContent=lbl;
  t.addEventListener('click',()=>tileClick(iid,lbl,cat));
  drg(t,iid,lbl,cat,null); tch(t,iid,lbl,cat,null);
  return t;
}

    h+='<div class="exs" id="exs-'+sec.id+'"></div>';
    d.innerHTML=h;
    wrap.appendChild(d);
  });
  // cartes d'exercices (sections à moteur)
  EXOS.forEach(ex=>{
    const host=document.getElementById('exs-'+ex.sec);
    const card=document.createElement('div');
    card.className='card';
    let h='';
    if(ex.savoir){
      h+='<div class="savoir"><h3>'+ex.savoir.h+'</h3><table>';
      ex.savoir.rows.forEach(r=>{h+='<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>'});
      h+='</table></div>';
    }
    h+='<div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">';
    h+='<div style="flex:1;min-width:300px">';
    h+='<div class="c-hdr"><span class="tag" style="background:'+ex.color+'">'+esc(ex.num)+'</span><span class="ctit" style="color:'+ex.color+'">'+esc(ex.tit)+'</span><span class="csub">'+esc(ex.sub)+'</span></div>';
    if(ex.type==='blanks') h+='<p class="blanks-p" id="mount-'+ex.id+'"></p>';
    else h+='<div class="rows" id="mount-'+ex.id+'"></div>';
    h+='</div>';
    const vert=(ex.type==='match'||ex.type==='rows')?' vert':'';
    const bw=(ex.type==='match'||ex.type==='rows')?'300px':'220px';
    h+='<div class="bsec b1" style="flex:0 0 '+bw+'"><div class="blbl">Réponses</div><div class="btiles'+vert+'" id="bank-'+ex.id+'"></div></div>';
    h+='</div>';
    card.innerHTML=h;
    host.appendChild(card);
  });
  injectCustom();
}

// ── ENREGISTREMENT (production orale) ─────────────────────────────────
let mediaRecorder=null, audioChunks=[], audioBlob=null, audioUrl=null, recognition=null, isRec=false, poFeedback="";
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
async function toggleRec(){
  if(isRec){ stopRec(); return; }
  hideErr('poErr');
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ showErr('poErr',"Impossible d'accéder au micro. Vérifie les autorisations."); return; }
  audioChunks=[];
  const mime = MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':(MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':'');
  mediaRecorder = mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
  mediaRecorder.ondataavailable=e=>{ if(e.data.size>0)audioChunks.push(e.data); };
  mediaRecorder.onstop=()=>{
    stream.getTracks().forEach(t=>t.stop());
    audioBlob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});
    if(audioUrl)URL.revokeObjectURL(audioUrl);
    audioUrl=URL.createObjectURL(audioBlob);
    const a=document.getElementById('poAudio'); if(a)a.src=audioUrl;
    document.getElementById('poPrev').classList.remove('hidden');
  };
  mediaRecorder.start();
  if(SR){
    recognition=new SR(); recognition.lang='fr-CA'; recognition.continuous=true; recognition.interimResults=false;
    let tr='';
    recognition.onresult=e=>{ for(let i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal)tr+=e.results[i][0].transcript+' '; } const b=document.getElementById('poText'); if(b)b.value=tr.trim(); };
    try{ recognition.start(); }catch(e){}
  }
  isRec=true;
  const btn=document.getElementById('recBtn'); btn.classList.add('recording'); btn.textContent='⏹';
  document.getElementById('recLbl').textContent="Enregistrement… touche pour arrêter";
}
function stopRec(){
  isRec=false;
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  if(recognition){ try{recognition.stop();}catch(e){} }
  const btn=document.getElementById('recBtn'); if(btn){ btn.classList.remove('recording'); btn.textContent='🎤'; }
  const l=document.getElementById('recLbl'); if(l)l.textContent="Touche pour réenregistrer";
}
function resetRec(){
  audioBlob=null; if(audioUrl){URL.revokeObjectURL(audioUrl);audioUrl=null;}
  document.getElementById('poPrev').classList.add('hidden');
  document.getElementById('poText').value='';
  const fb=document.getElementById('poFb'); fb.classList.remove('on'); fb.innerHTML='';
  document.getElementById('poSend').style.display='none';
  hideErr('poErr');
}
async function poGetFeedback(){
  const text=document.getElementById('poText').value.trim();
  if(!text){ showErr('poErr',"Je n'ai pas capté ta réponse. Réenregistre-toi ou écris ta phrase."); return; }
  hideErr('poErr');
  document.getElementById('poStatus').classList.add('on');
  document.getElementById('poFbBtn').disabled=true;
  try{
    const res=await fetch('/api/correct-french',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:studentCode,text,question:"Le médecin demande « Qu'est-ce qui vous amène aujourd'hui ? » et l'élève décrit ses symptômes."})});
    const data=await res.json();
    document.getElementById('poStatus').classList.remove('on');
    document.getElementById('poFbBtn').disabled=false;
    if(!res.ok){ showErr('poErr',data.error||'Une erreur est survenue.'); return; }
    renderCorr('poFb',data,text); poFeedback=corrSummary(data,text);
    document.getElementById('poSend').style.display='flex';
  }catch(e){
    document.getElementById('poStatus').classList.remove('on');
    document.getElementById('poFbBtn').disabled=false;
    showErr('poErr','Impossible de contacter le serveur.');
  }
}
async function poSend(){
  if(!audioBlob){ showErr('poErr',"Enregistre-toi d'abord."); return; }
  const btn=document.getElementById('poSendBtn'); btn.disabled=true; btn.textContent='Envoi…';
  const ext=(audioBlob.type||'').includes('mp4')?'m4a':'webm';
  const fd=new FormData();
  fd.append('code',studentCode); fd.append('theme','Santé'); fd.append('taskId','module-consultation-po');
  fd.append('taskLabel','Production orale — consultation'); fd.append('question','Décrire ses symptômes pendant la consultation');
  fd.append('transcription',document.getElementById('poText').value.trim()); fd.append('feedback',poFeedback);
  fd.append('audio',audioBlob,'enregistrement.'+ext);
  try{
    const res=await fetch('/api/oral/submit',{method:'POST',body:fd});
    const data=await res.json();
    if(!res.ok){ showErr('poErr',data.error||"L'envoi a échoué."); btn.disabled=false; btn.textContent='📨 Envoyer à mon enseignant'; return; }
    document.getElementById('poSend').innerHTML='<span class="sent">✅ Envoyé à ton enseignant !</span>';
  }catch(e){ showErr('poErr',"Impossible d'envoyer."); btn.disabled=false; btn.textContent='📨 Envoyer à mon enseignant'; }
}

// ── CORRECTION ÉCRITE ─────────────────────────────────────────────────
async function peCheck(){
  const text=document.getElementById('peText').value.trim();
  if(!text){ showErr('peErr',"Écris ton message d'abord."); return; }
  hideErr('peErr');
  document.getElementById('peStatus').classList.add('on');
  document.getElementById('peBtn').disabled=true;
  try{
    const res=await fetch('/api/correct-french',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:studentCode,text,question:"L'élève écrit un court message à un ami pour raconter sa visite chez le médecin (diagnostic et conseils reçus)."})});
    const data=await res.json();
    document.getElementById('peStatus').classList.remove('on');
    document.getElementById('peBtn').disabled=false;
    if(!res.ok){ showErr('peErr',data.error||'Une erreur est survenue.'); return; }
    renderCorr('peFb',data,text);
  }catch(e){
    document.getElementById('peStatus').classList.remove('on');
    document.getElementById('peBtn').disabled=false;
    showErr('peErr','Impossible de contacter le serveur.');
  }
}
function renderCorr(elId,data,orig){
  const fb=document.getElementById(elId);
  const corr=data.corrige||data.corrected||'';
  const errs=data.erreurs||data.errors||[];
  let html='<div class="fb-t">Rétroaction privée</div>';
  if(data.memePhrase){ html+='<div class="fb-c">✅ Ton texte est déjà correct. Bravo !</div>'; }
  else{
    if(corr) html+='<div class="fb-c">✍️ '+esc(corr)+'</div>';
    errs.forEach(e=>{ html+='<div class="fb-e">'+esc(e.explication||e.explanation||e)+'</div>'; });
  }
  fb.innerHTML=html; fb.classList.add('on');
}
function corrSummary(data,orig){
  const corr=data.corrige||data.corrected||'';
  const errs=data.erreurs||data.errors||[];
  if(data.memePhrase) return "Phrase correcte : "+(corr||orig);
  return "Correction : "+corr+(errs.length?' | '+errs.map(e=>e.explication||e.explanation||e).join(' '):'');
}
function showErr(id,msg){ const e=document.getElementById(id); if(e){e.textContent=msg; e.classList.add('on');} }
function hideErr(id){ const e=document.getElementById(id); if(e)e.classList.remove('on'); }

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  SECTIONS.forEach(sec=>{
    document.getElementById('tab-'+sec.id).classList.toggle('on', curSec===sec.id);
    document.getElementById('sec-'+sec.id).classList.toggle('on', curSec===sec.id);
    const zids=Object.keys(ZONES).filter(z=>{const ex=EXOS.find(e=>e.id===ZONES[z].exo);return ex.sec===sec.id});
    const done=zids.length>0&&zids.every(z=>TR.correct[z]);
    document.getElementById('tab-'+sec.id).classList.toggle('done',done);
  });
  const ban=document.getElementById('sel-banner');
  if(S.sel){ban.classList.add('on');document.getElementById('sel-lbl').textContent=S.sel.lbl}
  else ban.classList.remove('on');

  const used=usedIds();
  EXOS.forEach(ex=>{
    const mount=document.getElementById('mount-'+ex.id);
    const bank=document.getElementById('bank-'+ex.id);
    if(!mount||!bank) return;
    mount.innerHTML=''; bank.innerHTML='';

    if(ex.type==='vf'){
      ex.rows.forEach(r=>{
        const row=document.createElement('div');row.className='rrow';
        const txt=document.createElement('div');txt.className='stxt';txt.innerHTML=r.txt;
        row.appendChild(txt);row.appendChild(mkZone(r.id,'zvf'));
        mount.appendChild(row);
      });
      ex.tiles.forEach((lbl,i)=>{
        bank.appendChild(mkTile(ex.id+'_t'+i,lbl,ex.id,lbl==='VRAI'||lbl==='MUETTE'?'tv':'tf'));
      });
    }
    if(ex.type==='match'){
      ex.rows.forEach(r=>{
        const row=document.createElement('div');row.className='rrow2';
        const qc=document.createElement('div');qc.className='qcard';
        qc.innerHTML='<div class="qlbl">Question</div><div class="qtxt">'+esc(r.q)+'</div>';
        row.appendChild(qc);row.appendChild(mkZone(r.id,null,'glissez la réponse ici'));
        mount.appendChild(row);
      });
      shuffled(ex.rows,7).forEach(r=>{ if(used.has(r.aid))return; bank.appendChild(mkTile(r.aid,r.a,ex.id,'ta')); });
      if(!bank.children.length)bank.innerHTML='<div class="bempty">Toutes les réponses sont placées !</div>';
    }
    if(ex.type==='blanks'){
      ex.segs.forEach(sg=>{ if(sg.k==='t'){mount.appendChild(document.createTextNode(sg.t))} else{mount.appendChild(mkBlank(sg.id))} });
      shuffled(ex.words,23).forEach(w=>{ if(used.has(w.id))return; bank.appendChild(mkTile(w.id,w.l,ex.id,'tn')); });
      if(!bank.children.length)bank.innerHTML='<div class="bempty">Tous les mots sont placés !</div>';
    }
  });
  updateChip();
}
function updateChip(){
  const n=Object.keys(TR.correct).length;
  document.getElementById('prog-chip').textContent='⭐ '+n+' / '+TOTAL_ZONES;
}

document.getElementById('btn-reset').addEventListener('click',()=>{ S.pl={};S.sel=null;S.fb={};render(); });

document.getElementById('fc-next').addEventListener('click',()=>{fcIdx=(fcIdx+1)%FC_CARDS.length;fcShow()});

document.getElementById('fc-overlay').addEventListener('click',e=>{if(e.target.id==='fc-overlay')document.getElementById('fc-overlay').classList.remove('on')});

buildStatic();
render();
lmsTrack('file_opened');
