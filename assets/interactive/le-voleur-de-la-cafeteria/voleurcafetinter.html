    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);

        let finalBytes = bytes;
        if (entry.compressed) {

            const reader = ds.readable.getReader();

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

:before,*::after{box-sizing:border-box;margin:0;padding:0}\nhtml,body{min-height:100%;background:#F5EFE6;font-family:'Nunito',sans-serif;color:#2A2420}\n\n/* HEADER */\n#hdr{background:#FBF7F0;color:#2A2420;padding:20px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;border-bottom:3px solid #C75B39;box-shadow:0 4px 18px rgba(120,90,60,.14)}\n.hdr-l{display:flex;align-items:center;gap:18px}\n.hdr-badge{width:54px;height:54px;border-radius:50%;border:3px solid #C75B39;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:#F5EFE6}\n.hdr-eye{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.28em;color:#C75B39;margin-bottom:3px}\n.hdr-h1{font-size:26px;font-weight:900;line-height:1.15;color:#2A2420}\n.hdr-h1 .sub{font-family:'Special Elite',cursive;font-size:15px;font-weight:400;color:#8A7F70;display:block;margin-top:2px}\n.hdr-r{display:flex;gap:12px}\n.btn{background:rgba(199,91,57,.1);color:#C75B39;border:2px solid rgba(199,91,57,.45);border-radius:10px;padding:10px 18px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .15s}\n.btn:hover{background:rgba(199,91,57,.2)}\n\n/* SECTIONS */\n.sec{max-width:1500px;margin:0 auto;padding:30px 36px}\n.sec-lbl{display:flex;align-items:center;gap:14px;margin-bottom:20px}\n.sec-num{width:40px;height:40px;border-radius:50%;background:#C75B39;color:#fff;font-weight:900;font-size:19px;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.sec-title{font-size:24px;font-weight:900;color:#2A2420}\n.sec-instr{font-size:15px;color:#8A7F70;font-weight:700;margin-left:auto;font-style:italic}\n\n/* MISSION */\n#mission{background:linear-gradient(180deg,#FBF7F0,#F0E7DA);border-bottom:1px solid #E6DDCF}\n.mission-card{background:#fff;border:2px solid #E6DDCF;border-radius:16px;padding:28px 32px;display:flex;gap:32px;align-items:center;box-shadow:0 8px 30px rgba(120,90,60,.1)}\n.tape{flex:0 0 340px;background:#FBF7F0;border:2px solid #C75B39;border-radius:14px;padding:22px;text-align:center}\n.tape-lbl{font-family:'Special Elite',cursive;font-size:13px;color:#C75B39;letter-spacing:.15em;margin-bottom:12px}\n.tape audio{width:100%}\n.tape-warn{font-size:11.5px;color:#A89A88;margin-top:10px;font-style:italic}\n.mission-txt{flex:1}\n.mission-txt h3{font-family:'Special Elite',cursive;font-size:20px;color:#C75B39;margin-bottom:12px}\n.mission-txt p{font-size:16.5px;line-height:1.65;color:#4A4038;margin-bottom:8px}\n.mission-txt strong{color:#2A2420}\n\n/* SUSPECTS */\n#suspects-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}\n@media(max-width:1200px){#suspects-grid{grid-template-columns:repeat(2,1fr)}}\n.suspect{background:#fff;border:2px solid #E6DDCF;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;box-shadow:0 3px 12px rgba(120,90,60,.07)}\n.suspect:hover{transform:translateY(-4px);border-color:#C75B39;box-shadow:0 10px 24px rgba(120,90,60,.16)}\n.suspect-photo{height:130px;background:#F0E9DD;display:flex;align-items:center;justify-content:center;font-size:64px;border-bottom:2px solid #E6DDCF;position:relative}\n.suspect-num{position:absolute;top:10px;left:10px;background:#C75B39;color:#fff;font-size:11px;font-weight:900;padding:4px 10px;border-radius:6px;letter-spacing:.1em}\n.suspect-body{padding:18px 20px}\n.suspect-name{font-size:19px;font-weight:900;color:#2A2420;margin-bottom:2px}\n.suspect-role{font-family:'Special Elite',cursive;font-size:13px;color:#C75B39;margin-bottom:10px}\n.suspect-desc{font-size:14px;color:#8A7F70;line-height:1.5;margin-bottom:12px}\n.suspect-cta{font-size:12.5px;font-weight:800;color:#C75B39;text-transform:uppercase;letter-spacing:.1em}\n.suspect.revealed .suspect-cta{display:none}\n.alibi{display:none;background:#FAF6EF;margin:0 -20px -18px;padding:16px 20px;border-top:2px dashed #E6DDCF}\n.suspect.revealed .alibi{display:block;animation:slideDown .3s ease-out}\n@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}\n.alibi-lbl{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.18em;color:#C75B39;margin-bottom:8px}\n.alibi q{display:block;font-size:14px;color:#4A4038;line-height:1.55;margin-bottom:6px;quotes:\"« \" \" »\"}\n\n/* AUDIO HABITUDES */\n.alibis-audio{margin-top:22px;background:#fff;border:2px solid #E6DDCF;border-radius:14px;padding:20px 26px;display:flex;align-items:center;gap:24px;box-shadow:0 3px 12px rgba(120,90,60,.07)}\n.alibis-audio .ic{font-size:34px}\n.alibis-audio .lbl{font-weight:800;font-size:16px;color:#2A2420}\n.alibis-audio .lbl span{display:block;font-size:13px;color:#8A7F70;font-weight:600;margin-top:2px}\n.alibis-audio audio{flex:1}\n\n/* INDICES */\n#temoin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}\n@media(max-width:1000px){#temoin-grid{grid-template-columns:1fr}}\n.temoin{background:#fff;border:2px solid #E6DDCF;border-radius:16px;padding:22px 24px;cursor:pointer;transition:border-color .2s,box-shadow .2s;min-height:150px;position:relative;box-shadow:0 3px 12px rgba(120,90,60,.07)}\n.temoin:hover{border-color:#C75B39;box-shadow:0 10px 24px rgba(120,90,60,.16)}\n.temoin-name{font-size:17px;font-weight:900;color:#2A2420;margin-bottom:4px;display:flex;align-items:center;gap:10px}\n.temoin-txt{display:none;font-size:15px;color:#4A4038;line-height:1.6;margin-top:10px}\n.temoin.revealed .temoin-txt{display:block;animation:slideDown .3s ease-out}\n.temoin-cta{font-size:12.5px;font-weight:800;color:#C75B39;text-transform:uppercase;letter-spacing:.1em;position:absolute;bottom:18px}\n.temoin.revealed .temoin-cta{display:none}\n\n/* VERDICT */\n#verdict-zone{background:#F0E7DA;border-top:1px solid #E6DDCF;border-bottom:1px solid #E6DDCF}\n.verdict-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}\n@media(max-width:1200px){.verdict-grid{grid-template-columns:repeat(2,1fr)}}\n.verdict-opt{background:#fff;border:3px solid #E6DDCF;border-radius:14px;padding:18px;text-align:center;cursor:pointer;transition:all .15s;font-size:17px;font-weight:800;color:#4A4038}\n.verdict-opt:hover{border-color:#C75B39;color:#2A2420}\n.verdict-opt .em{font-size:38px;display:block;margin-bottom:8px}\n.verdict-opt.sel{border-color:#C75B39;background:rgba(199,91,57,.08);color:#C75B39}\n.verdict-opt.good{border-color:#2E9E5B;background:rgba(46,158,91,.1);color:#2E9E5B;animation:pulse .5s}\n.verdict-opt.bad{border-color:#D64545;background:rgba(214,69,69,.08);color:#D64545;animation:shake .4s}\n@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}\n@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}\n#verdict-actions{display:flex;gap:14px;align-items:center}\n#btn-verdict{background:#C75B39;color:#fff;border:none;border-radius:10px;padding:14px 32px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;cursor:pointer;letter-spacing:.03em;transition:filter .15s}\n#btn-verdict:hover{filter:brightness(1.08)}\n#btn-verdict:disabled{opacity:.35;cursor:not-allowed}\n#verdict-msg{font-size:16px;font-weight:800}\n#verdict-msg.ok{color:#2E9E5B}\n#verdict-msg.ko{color:#D64545}\n\n/* RAPPORT */\n.rapport{background:#fff;color:#2A2420;border:2px solid #C75B39;border-radius:16px;padding:30px 36px;font-family:'Special Elite',cursive;max-width:900px;box-shadow:0 10px 34px rgba(120,90,60,.14)}\n.rapport h3{font-size:21px;margin-bottom:18px;border-bottom:2px solid #2A2420;padding-bottom:10px;letter-spacing:.05em}\n.rapport .fld{margin-bottom:16px;font-size:16px;line-height:1.8}\n.rapport .line{display:inline-block;border-bottom:2px solid #999;min-width:280px;height:20px;vertical-align:bottom}\n.rapport .line.short{min-width:160px}\n\n/* TIMELINE */\n.steps{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}\n@media(max-width:1200px){.steps{grid-template-columns:repeat(4,1fr)}}\n@media(max-width:800px){.steps{grid-template-columns:repeat(2,1fr)}}\n.step{background:#fff;border:2px solid #E6DDCF;border-radius:12px;padding:16px 14px;text-align:center;box-shadow:0 2px 8px rgba(120,90,60,.06)}\n.step-n{width:32px;height:32px;border-radius:50%;background:#F0E9DD;color:#C75B39;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}\n.step-t{font-size:13.5px;font-weight:800;color:#2A2420;margin-bottom:4px;line-height:1.3}\n.step-d{font-size:11.5px;color:#A89A88;font-weight:700}\n\n/* SOLUTION (teacher) */\n#solution-box{display:none;background:#fff;border:2px solid #C75B39;border-radius:16px;padding:26px 30px;margin-top:20px;animation:slideDown .3s ease-out;box-shadow:0 6px 20px rgba(120,90,60,.1)}\n#solution-box.on{display:block}\n#solution-box h4{color:#C75B39;font-size:19px;margin-bottom:12px}\n#solution-box p{font-size:15.5px;line-height:1.7;color:#4A4038}\n#solution-box strong{color:#2A2420}\n\n.footer{padding:26px 36px;text-align:center;font-size:13px;color:#A89A88;font-weight:700;letter-spacing:.06em}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"hdr\">\n  <div class=\"hdr-l\">\n    <div class=\"hdr-badge\">🔍<\u002Fdiv>\n    <div>\n      <div class=\"hdr-eye\">Dossier détective · Francisation Niveau 4<\u002Fdiv>\n      <div class=\"hdr-h1\">Le voleur de la cafétéria\n        <span class=\"sub\">Qui mange le dessert de Sofia chaque midi ?<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hdr-r\">\n    <button class=\"btn\" id=\"btn-reset\">↺ Réinitialiser<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 1. APPEL -->\n<div id=\"mission\">\n  <div class=\"sec\">\n    <div class=\"sec-lbl\">\n      <div class=\"sec-num\">1<\u002Fdiv>\n      <div class=\"sec-title\">L'appel à l'aide<\u002Fdiv>\n      <div class=\"sec-instr\">Écoutez bien Sofia.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mission-card\">\n      <div class=\"tape\">\n        <div class=\"tape-lbl\">▸ APPEL À L'AIDE — DOSSIER Nº 001<\u002Fdiv>\n        <audio id=\"msg-player\" controls=\"\" preload=\"metadata\" src=\"f9dfea7c-cf9b-4c06-a980-9d2d1e007efb\"><\u002Faudio>\n        <audio class=\"seg-msg\" preload=\"none\" src=\"f9dfea7c-cf9b-4c06-a980-9d2d1e007efb\" style=\"display:none\"><\u002Faudio>\n        <audio class=\"seg-msg\" preload=\"none\" src=\"7cbcfc86-4a66-4663-9276-1225d0da11ee\" style=\"display:none\"><\u002Faudio>\n        <div class=\"tape-warn\">L'enquête commence maintenant…<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mission-txt\">\n        <h3>Votre mission, détectives :<\u002Fh3>\n        <p>Chaque midi, à la cafétéria, le <strong>dessert de Sofia disparaît<\u002Fstrong> de son plateau : un gâteau, un yogourt, un fruit…<\u002Fp>\n        <p>Il y a <strong>quatre suspects<\u002Fstrong>. Chacun a des habitudes différentes à l'heure du dîner.<\u002Fp>\n        <p><strong>Observez<\u002Fstrong> les suspects. <strong>Posez<\u002Fstrong> des questions au présent. <strong>Comparez<\u002Fstrong> leurs habitudes. Puis nommez le voleur dans votre rapport d'équipe.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 2. SUSPECTS -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">2<\u002Fdiv>\n    <div class=\"sec-title\">Les 4 suspects<\u002Fdiv>\n    <div class=\"sec-instr\">Cliquez sur un suspect pour lire ses habitudes<\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"suspects-grid\">\n    <div class=\"suspect\" data-s=\"1\">\n      <div class=\"suspect-photo\">🍰<span class=\"suspect-num\">SUSPECT 1<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">Karim<\u002Fdiv>\n        <div class=\"suspect-role\">le gourmand<\u002Fdiv>\n        <div class=\"suspect-desc\">Grand, cheveux noirs, un chandail vert, toujours un grand appétit.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Voir ses habitudes<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Ses habitudes<\u002Fdiv>\n          <q>Le midi, je mange beaucoup ! J'adore les desserts.<\u002Fq>\n          <q>Je m'assois toujours à côté de Sofia, à la même table.<\u002Fq>\n          <q>Chaque jour, je prends deux desserts : un pour moi et… euh…<\u002Fq>\n          <q>J'aime beaucoup le gâteau au chocolat !<\u002Fq>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"suspect\" data-s=\"2\">\n      <div class=\"suspect-photo\">🥗<span class=\"suspect-num\">SUSPECT 2<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">Emma<\u002Fdiv>\n        <div class=\"suspect-role\">la sportive<\u002Fdiv>\n        <div class=\"suspect-desc\">Cheveux blonds attachés, un survêtement de sport, une bouteille d'eau.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Voir ses habitudes<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Ses habitudes<\u002Fdiv>\n          <q>À midi, je mange une salade et un fruit. C'est tout.<\u002Fq>\n          <q>Je ne mange jamais de gâteau. Je fais attention à ma santé.<\u002Fq>\n          <q>Je m'assois loin de Sofia, près de la fenêtre.<\u002Fq>\n          <q>Après le dîner, je vais toujours au gymnase.<\u002Fq>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"suspect\" data-s=\"3\">\n      <div class=\"suspect-photo\">🎒<span class=\"suspect-num\">SUSPECT 3<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">Lucas<\u002Fdiv>\n        <div class=\"suspect-role\">le distrait<\u002Fdiv>\n        <div class=\"suspect-desc\">Petit, lunettes, un sac à dos toujours ouvert, l'air rêveur.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Voir ses habitudes<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Ses habitudes<\u002Fdiv>\n          <q>Le midi, j'oublie souvent mon lunch à la maison !<\u002Fq>\n          <q>Alors, je mange parfois les restes des autres.<\u002Fq>\n          <q>Je m'assois à différentes tables, jamais la même.<\u002Fq>\n          <q>Mais je n'aime pas le yogourt. Ça, jamais !<\u002Fq>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"suspect\" data-s=\"4\">\n      <div class=\"suspect-photo\">🍓<span class=\"suspect-num\">SUSPECT 4<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">Mia<\u002Fdiv>\n        <div class=\"suspect-role\">la discrète<\u002Fdiv>\n        <div class=\"suspect-desc\">Cheveux bruns courts, un chandail rose, très timide.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Voir ses habitudes<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Ses habitudes<\u002Fdiv>\n          <q>Le midi, je mange mon lunch tranquillement.<\u002Fq>\n          <q>J'apporte toujours mon propre dessert de la maison.<\u002Fq>\n          <q>Je m'assois en face de Sofia, mais je parle peu.<\u002Fq>\n          <q>J'adore les yogourts et les fruits !<\u002Fq>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"alibis-audio\">\n    <div class=\"ic\">🎧<\u002Fdiv>\n    <div class=\"lbl\">Écoutez les habitudes des suspects\n      <span>Version audio — pour l'écoute en classe avant ou après la lecture<\u002Fspan>\n    <\u002Fdiv>\n    <audio id=\"ali-player\" controls=\"\" preload=\"metadata\" src=\"16f33d32-3bfb-4649-8d23-cd950dd85f47\"><\u002Faudio>\n    <audio class=\"seg-ali\" preload=\"none\" src=\"16f33d32-3bfb-4649-8d23-cd950dd85f47\" style=\"display:none\"><\u002Faudio>\n    <audio class=\"seg-ali\" preload=\"none\" src=\"37166d08-1f89-46e5-b39a-e279e8e6b657\" style=\"display:none\"><\u002Faudio>\n    <audio class=\"seg-ali\" preload=\"none\" src=\"516457ce-f1ce-427f-9f6f-dbc2ffa4fda2\" style=\"display:none\"><\u002Faudio>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 3. INDICES -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">3<\u002Fdiv>\n    <div class=\"sec-title\">Les cartes-indices<\u002Fdiv>\n    <div class=\"sec-instr\">Révélez les indices un à un, au bon moment<\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"temoin-grid\">\n    <div class=\"temoin\">\n      <div class=\"temoin-name\">👩‍🍳 Indice A — La cuisinière<\u002Fdiv>\n      <div class=\"temoin-txt\">« Chaque midi, je vois une personne prendre quelque chose sur le plateau de Sofia. Cette personne est assise juste à côté d'elle. »<\u002Fdiv>\n      <div class=\"temoin-cta\">🔍 Révéler l'indice<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"temoin\">\n      <div class=\"temoin-name\">🧑 Indice B — Un autre élève<\u002Fdiv>\n      <div class=\"temoin-txt\">« Le dessert disparaît toujours quand Sofia va chercher son jus. À ce moment-là, la personne à côté d'elle est seule à la table. »<\u002Fdiv>\n      <div class=\"temoin-cta\">🔍 Révéler l'indice<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"temoin\">\n      <div class=\"temoin-name\">😢 Indice C — Sofia<\u002Fdiv>\n      <div class=\"temoin-txt\">« Le voleur prend tous mes desserts : gâteau, yogourt, fruit. Il mange vraiment de tout ! »<\u002Fdiv>\n      <div class=\"temoin-cta\">🔍 Révéler l'indice<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 4. VERDICT -->\n<div id=\"verdict-zone\">\n  <div class=\"sec\">\n    <div class=\"sec-lbl\">\n      <div class=\"sec-num\">4<\u002Fdiv>\n      <div class=\"sec-title\">Le verdict de l'équipe<\u002Fdiv>\n      <div class=\"sec-instr\">Discutez, puis choisissez le voleur<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"verdict-grid\">\n      <div class=\"verdict-opt\" data-v=\"karim\"><span class=\"em\">🍰<\u002Fspan>Karim<\u002Fdiv>\n      <div class=\"verdict-opt\" data-v=\"emma\"><span class=\"em\">🥗<\u002Fspan>Emma<\u002Fdiv>\n      <div class=\"verdict-opt\" data-v=\"lucas\"><span class=\"em\">🎒<\u002Fspan>Lucas<\u002Fdiv>\n      <div class=\"verdict-opt\" data-v=\"mia\"><span class=\"em\">🍓<\u002Fspan>Mia<\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"verdict-actions\">\n      <button id=\"btn-verdict\" disabled=\"\">⚖️ Rendre le verdict<\u002Fbutton>\n      <div id=\"verdict-msg\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 5. RAPPORT -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">5<\u002Fdiv>\n    <div class=\"sec-title\">Le rapport d'enquête<\u002Fdiv>\n    <div class=\"sec-instr\">À rédiger en équipe — au présent !<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"rapport\">\n    <h3>RAPPORT D'ENQUÊTE — ÉQUIPE Nº ____<\u002Fh3>\n    <div class=\"fld\">Le voleur de desserts est : <span class=\"line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Il/elle s'assoit : <span class=\"line short\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Habitude 1 : <span class=\"line\" style=\"min-width:420px\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Habitude 2 : <span class=\"line\" style=\"min-width:420px\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Nous pensons que c'est cette personne parce qu'elle <span class=\"line\" style=\"min-width:320px\"><\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 6. DÉROULEMENT -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">6<\u002Fdiv>\n    <div class=\"sec-title\">Déroulement de l'enquête<\u002Fdiv>\n    <div class=\"sec-instr\">≈ 3 heures, divisible en 2 séances<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"steps\">\n    <div class=\"step\"><div class=\"step-n\">1<\u002Fdiv><div class=\"step-t\">L'appel à l'aide<\u002Fdiv><div class=\"step-d\">15 min · Groupe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">2<\u002Fdiv><div class=\"step-t\">Préparer les questions<\u002Fdiv><div class=\"step-d\">20 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">3<\u002Fdiv><div class=\"step-t\">Observer les suspects<\u002Fdiv><div class=\"step-d\">45 min · Dyade<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">4<\u002Fdiv><div class=\"step-t\">Les indices<\u002Fdiv><div class=\"step-d\">20 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">5<\u002Fdiv><div class=\"step-t\">Recouper les habitudes<\u002Fdiv><div class=\"step-d\">25 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">6<\u002Fdiv><div class=\"step-t\">La conclusion<\u002Fdiv><div class=\"step-d\">25 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">7<\u002Fdiv><div class=\"step-t\">La révélation<\u002Fdiv><div class=\"step-d\">15 min · Groupe<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <button class=\"btn\" id=\"btn-solution\" style=\"margin-top:24px\">🗝️ Solution (réservée à l'enseignant·e)<\u002Fbutton>\n  <div id=\"solution-box\">\n    <h4>🗝️ La solution<\u002Fh4>\n    <p>Le voleur est <strong>Karim (Suspect 1)<\u002Fstrong>. La personne est assise <strong>juste à côté de Sofia<\u002Fstrong> (Indice A) et reste seule à la table quand Sofia va chercher son jus (Indice B). Karim dit lui-même qu'il s'assoit toujours à côté de Sofia et qu'il prend « deux desserts ». Le voleur mange <strong>de tout<\u002Fstrong> (gâteau, yogourt, fruit — Indice C) : ça élimine Lucas (qui déteste le yogourt) et Emma (qui ne mange jamais de gâteau et s'assoit loin). Mia apporte son propre dessert et s'assoit en face, pas à côté. Donc c'est <strong>Karim<\u002Fstrong>, le gourmand assis juste à côté de Sofia !<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"footer\">Francisation · Niveau 4 (LAN-4049-8) · Production orale, compréhension orale et production écrite · Présent de l'indicatif, adverbes de fréquence et vocabulaire des aliments<\u002Fdiv>\n\n<script>\n// Lecture enchaînée des segments audio (encodés à vitesse normale, sans perte de qualité)\nfunction setupPlaylist(playerId, segClass){\n  const player = document.getElementById(playerId);\n  const segs = [...document.querySelectorAll('.'+segClass)].map(a => a.getAttribute('src') || a.src);\n  if(!player || !segs.length) return;\n  let i = 0;\n  player.src = segs[0];\n  player.addEventListener('ended', () => {\n    if(i < segs.length - 1){\n      i++;\n      player.src = segs[i];\n      player.play().catch(()=>{});\n    } else {\n      i = 0;\n      player.src = segs[0];\n    }\n  });\n}\nsetupPlaylist('msg-player','seg-msg');\nsetupPlaylist('ali-player','seg-ali');\n\n// Suspects reveal\ndocument.querySelectorAll('.suspect').forEach(s => {\n  s.addEventListener('click', () => s.classList.toggle('revealed'));\n});\n// Indices reveal\ndocument.querySelectorAll('.temoin').forEach(t => {\n  t.addEventListener('click', () => t.classList.toggle('revealed'));\n});\n\n// Verdict\nlet selected = null;\nconst btnV = document.getElementById('btn-verdict');\nconst msg = document.getElementById('verdict-msg');\ndocument.querySelectorAll('.verdict-opt').forEach(o => {\n  o.addEventListener('click', () => {\n    document.querySelectorAll('.verdict-opt').forEach(x => x.classList.remove('sel','good','bad'));\n    o.classList.add('sel');\n    selected = o.dataset.v;\n    btnV.disabled = false;\n    msg.textContent = '';\n    msg.className = '';\n  });\n});\nbtnV.addEventListener('click', () => {\n  if (!selected) return;\n  const el = document.querySelector('.verdict-opt.sel');\n  if (selected === 'karim') {\n    el.classList.remove('sel'); el.classList.add('good');\n    msg.textContent = '✓ Bravo, détectives ! Vous avez trouvé le voleur. Décrivez ses habitudes au présent !';\n    msg.className = 'ok';\n  } else {\n    el.classList.remove('sel'); el.classList.add('bad');\n    msg.textContent = '✗ Hum… les indices ne concordent pas. Comparez la place à table et les goûts.';\n    msg.className = 'ko';\n  }\n});\n\n// Solution toggle\ndocument.getElementById('btn-solution').addEventListener('click', () => {\n  const box = document.getElementById('solution-box');\n  if (box.classList.contains('on')) { box.classList.remove('on'); return; }\n  if (confirm('Cette section est réservée à l\\'enseignant·e. Afficher la solution ?')) {\n    box.classList.add('on');\n  }\n});\n\n// Reset\ndocument.getElementById('btn-reset').addEventListener('click', () => {\n  document.querySelectorAll('.suspect,.temoin').forEach(x => x.classList.remove('revealed'));\n  document.querySelectorAll('.verdict-opt').forEach(x => x.classList.remove('sel','good','bad'));\n  document.getElementById('solution-box').classList.remove('on');\n  selected = null; btnV.disabled = true;\n  msg.textContent = ''; msg.className = '';\n  document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
