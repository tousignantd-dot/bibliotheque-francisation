document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

efore,*::after{box-sizing:border-box;margin:0;padding:0}\nhtml,body{min-height:100%;background:#14181F;font-family:'Nunito',sans-serif;color:#E8E4DA}\n\n/* HEADER */\n#hdr{background:#0D1017;color:#fff;padding:20px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;border-bottom:3px solid #D9A441;box-shadow:0 6px 24px rgba(0,0,0,.6)}\n.hdr-l{display:flex;align-items:center;gap:18px}\n.hdr-badge{width:54px;height:54px;border-radius:50%;border:3px solid #D9A441;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;background:#1A1F2B}\n.hdr-eye{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.28em;color:#D9A441;margin-bottom:3px}\n.hdr-h1{font-size:26px;font-weight:900;line-height:1.15}\n.hdr-h1 .sub{font-family:'Special Elite',cursive;font-size:15px;font-weight:400;color:#9AA3B2;display:block;margin-top:2px}\n.hdr-r{display:flex;gap:12px}\n.btn{background:rgba(217,164,65,.12);color:#D9A441;border:2px solid rgba(217,164,65,.5);border-radius:10px;padding:10px 18px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .15s}\n.btn:hover{background:rgba(217,164,65,.28)}\n\n/* SECTIONS */\n.sec{max-width:1500px;margin:0 auto;padding:30px 36px}\n.sec-lbl{display:flex;align-items:center;gap:14px;margin-bottom:20px}\n.sec-num{width:40px;height:40px;border-radius:50%;background:#D9A441;color:#14181F;font-weight:900;font-size:19px;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.sec-title{font-size:24px;font-weight:900;color:#fff}\n.sec-instr{font-size:15px;color:#9AA3B2;font-weight:700;margin-left:auto;font-style:italic}\n\n/* MISSION */\n#mission{background:linear-gradient(180deg,#0D1017,#1A1F2B);border-bottom:1px solid #2A3140}\n.mission-card{background:#1E2430;border:2px solid #2E3646;border-radius:16px;padding:28px 32px;display:flex;gap:32px;align-items:center;box-shadow:0 10px 40px rgba(0,0,0,.4)}\n.tape{flex:0 0 340px;background:#14181F;border:2px solid #D9A441;border-radius:14px;padding:22px;text-align:center}\n.tape-lbl{font-family:'Special Elite',cursive;font-size:13px;color:#D9A441;letter-spacing:.15em;margin-bottom:12px}\n.tape audio{width:100%;filter:invert(.88) hue-rotate(180deg)}\n.tape-warn{font-size:11.5px;color:#7A8494;margin-top:10px;font-style:italic}\n.mission-txt{flex:1}\n.mission-txt h3{font-family:'Special Elite',cursive;font-size:20px;color:#D9A441;margin-bottom:12px}\n.mission-txt p{font-size:16.5px;line-height:1.65;color:#C9CFDA;margin-bottom:8px}\n.mission-txt strong{color:#fff}\n\n/* SUSPECTS */\n#suspects-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}\n@media(max-width:1200px){#suspects-grid{grid-template-columns:repeat(2,1fr)}}\n.suspect{background:#1E2430;border:2px solid #2E3646;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;position:relative}\n.suspect:hover{transform:translateY(-4px);border-color:#D9A441}\n.suspect-photo{height:130px;background:#252C3A;display:flex;align-items:center;justify-content:center;font-size:64px;border-bottom:2px solid #2E3646;position:relative}\n.suspect-num{position:absolute;top:10px;left:10px;background:#D9A441;color:#14181F;font-size:11px;font-weight:900;padding:4px 10px;border-radius:6px;letter-spacing:.1em}\n.suspect-body{padding:18px 20px}\n.suspect-name{font-size:19px;font-weight:900;color:#fff;margin-bottom:2px}\n.suspect-role{font-family:'Special Elite',cursive;font-size:13px;color:#D9A441;margin-bottom:10px}\n.suspect-desc{font-size:14px;color:#9AA3B2;line-height:1.5;margin-bottom:12px}\n.suspect-cta{font-size:12.5px;font-weight:800;color:#D9A441;text-transform:uppercase;letter-spacing:.1em}\n.suspect.revealed .suspect-cta{display:none}\n.alibi{display:none;background:#171C26;margin:0 -20px -18px;padding:16px 20px;border-top:2px dashed #2E3646}\n.suspect.revealed .alibi{display:block;animation:slideDown .3s ease-out}\n@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}\n.alibi-lbl{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.18em;color:#D9A441;margin-bottom:8px}\n.alibi q{display:block;font-size:14px;color:#C9CFDA;line-height:1.55;margin-bottom:6px;quotes:\"« \" \" »\"}\n\n/* AUDIO ALIBIS */\n.alibis-audio{margin-top:22px;background:#1E2430;border:2px solid #2E3646;border-radius:14px;padding:20px 26px;display:flex;align-items:center;gap:24px}\n.alibis-audio .ic{font-size:34px}\n.alibis-audio .lbl{font-weight:800;font-size:16px;color:#fff}\n.alibis-audio .lbl span{display:block;font-size:13px;color:#9AA3B2;font-weight:600;margin-top:2px}\n.alibis-audio audio{flex:1;filter:invert(.88) hue-rotate(180deg)}\n\n/* WITNESSES */\n#temoin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}\n@media(max-width:1000px){#temoin-grid{grid-template-columns:1fr}}\n.temoin{background:#1E2430;border:2px solid #2E3646;border-radius:16px;padding:22px 24px;cursor:pointer;transition:border-color .2s;min-height:150px;position:relative}\n.temoin:hover{border-color:#D9A441}\n.temoin-name{font-size:17px;font-weight:900;color:#fff;margin-bottom:4px;display:flex;align-items:center;gap:10px}\n.temoin-txt{display:none;font-size:15px;color:#C9CFDA;line-height:1.6;margin-top:10px}\n.temoin.revealed .temoin-txt{display:block;animation:slideDown .3s ease-out}\n.temoin-cta{font-size:12.5px;font-weight:800;color:#D9A441;text-transform:uppercase;letter-spacing:.1em;position:absolute;bottom:18px}\n.temoin.revealed .temoin-cta{display:none}\n\n/* VERDICT */\n#verdict-zone{background:#1A1F2B;border-top:1px solid #2A3140;border-bottom:1px solid #2A3140}\n.verdict-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}\n@media(max-width:1200px){.verdict-grid{grid-template-columns:repeat(2,1fr)}}\n.verdict-opt{background:#1E2430;border:3px solid #2E3646;border-radius:14px;padding:18px;text-align:center;cursor:pointer;transition:all .15s;font-size:17px;font-weight:800;color:#C9CFDA}\n.verdict-opt:hover{border-color:#D9A441;color:#fff}\n.verdict-opt .em{font-size:38px;display:block;margin-bottom:8px}\n.verdict-opt.sel{border-color:#D9A441;background:rgba(217,164,65,.1);color:#D9A441}\n.verdict-opt.good{border-color:#4ADE80;background:rgba(74,222,128,.1);color:#4ADE80;animation:pulse .5s}\n.verdict-opt.bad{border-color:#F87171;background:rgba(248,113,113,.08);color:#F87171;animation:shake .4s}\n@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}\n@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}\n#verdict-actions{display:flex;gap:14px;align-items:center}\n#btn-verdict{background:#D9A441;color:#14181F;border:none;border-radius:10px;padding:14px 32px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;cursor:pointer;letter-spacing:.03em;transition:filter .15s}\n#btn-verdict:hover{filter:brightness(1.12)}\n#btn-verdict:disabled{opacity:.35;cursor:not-allowed}\n#verdict-msg{font-size:16px;font-weight:800}\n#verdict-msg.ok{color:#4ADE80}\n#verdict-msg.ko{color:#F87171}\n\n/* RAPPORT */\n.rapport{background:#F5F0E4;color:#2A2A2A;border-radius:16px;padding:30px 36px;font-family:'Special Elite',cursive;max-width:900px;box-shadow:0 14px 50px rgba(0,0,0,.5)}\n.rapport h3{font-size:21px;margin-bottom:18px;border-bottom:2px solid #2A2A2A;padding-bottom:10px;letter-spacing:.05em}\n.rapport .fld{margin-bottom:16px;font-size:16px;line-height:1.8}\n.rapport .line{display:inline-block;border-bottom:2px solid #555;min-width:280px;height:20px;vertical-align:bottom}\n.rapport .line.short{min-width:160px}\n\n/* TIMELINE */\n.steps{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}\n@media(max-width:1200px){.steps{grid-template-columns:repeat(4,1fr)}}\n@media(max-width:800px){.steps{grid-template-columns:repeat(2,1fr)}}\n.step{background:#1E2430;border:2px solid #2E3646;border-radius:12px;padding:16px 14px;text-align:center}\n.step-n{width:32px;height:32px;border-radius:50%;background:#2E3646;color:#D9A441;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}\n.step-t{font-size:13.5px;font-weight:800;color:#fff;margin-bottom:4px;line-height:1.3}\n.step-d{font-size:11.5px;color:#7A8494;font-weight:700}\n\n/* SOLUTION (teacher) */\n#solution-box{display:none;background:#1E2430;border:2px solid #D9A441;border-radius:16px;padding:26px 30px;margin-top:20px;animation:slideDown .3s ease-out}\n#solution-box.on{display:block}\n#solution-box h4{color:#D9A441;font-size:19px;margin-bottom:12px}\n#solution-box p{font-size:15.5px;line-height:1.7;color:#C9CFDA}\n#solution-box strong{color:#fff}\n\n.footer{padding:26px 36px;text-align:center;font-size:13px;color:#5A6374;font-weight:700;letter-spacing:.06em}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"hdr\">\n  <div class=\"hdr-l\">\n    <div class=\"hdr-badge\">🕵️<\u002Fdiv>\n    <div>\n      <div class=\"hdr-eye\">Dossier confidentiel · Francisation Niveau 4<\u002Fdiv>\n      <div class=\"hdr-h1\">L'enquête criminelle\n        <span class=\"sub\">Qui a volé le café du professeur ?<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hdr-r\">\n    <button class=\"btn\" id=\"btn-reset\">↺ Réinitialiser<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 1. MISSION -->\n<div id=\"mission\">\n  <div class=\"sec\">\n    <div class=\"sec-lbl\">\n      <div class=\"sec-num\">1<\u002Fdiv>\n      <div class=\"sec-title\">La mission<\u002Fdiv>\n      <div class=\"sec-instr\">Fermez les yeux. Écoutez.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"mission-card\">\n      <div class=\"tape\">\n        <div class=\"tape-lbl\">▸ MESSAGE SECRET — PIÈCE Nº 001<\u002Fdiv>\n        <audio id=\"msg-player\" controls=\"\" preload=\"metadata\" src=\"bd040b85-810f-4f6d-9e4f-081120a15e21\"><\u002Faudio>\n        <audio class=\"seg-msg\" preload=\"none\" src=\"bd040b85-810f-4f6d-9e4f-081120a15e21\" style=\"display:none\"><\u002Faudio>\n        <audio class=\"seg-msg\" preload=\"none\" src=\"cbb52d00-b7f2-4f7f-adf0-dc315fe85da1\" style=\"display:none\"><\u002Faudio>\n        <div class=\"tape-warn\">Ce message va s'effacer dans trois, deux, un…<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mission-txt\">\n        <h3>Votre mission, agent :<\u002Fh3>\n        <p>Ce matin, <strong>entre 8 h et 9 h<\u002Fstrong>, quelqu'un a volé le café préféré du professeur.<\u002Fp>\n        <p>Il y a <strong>quatre suspects<\u002Fstrong>. Chacun raconte quelque chose de différent.<\u002Fp>\n        <p><strong>Interrogez<\u002Fstrong> les suspects. <strong>Écoutez<\u002Fstrong> les témoins. <strong>Comparez<\u002Fstrong> les réponses. Puis nommez le coupable dans votre rapport d'équipe.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 2. SUSPECTS -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">2<\u002Fdiv>\n    <div class=\"sec-title\">Les 4 suspects<\u002Fdiv>\n    <div class=\"sec-instr\">Cliquez sur un suspect pour lire son alibi<\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"suspects-grid\">\n    <div class=\"suspect\" data-s=\"1\">\n      <div class=\"suspect-photo\">👩‍🏫<span class=\"suspect-num\">SUSPECT 1<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">Madame Rousseau<\u002Fdiv>\n        <div class=\"suspect-role\">la collègue<\u002Fdiv>\n        <div class=\"suspect-desc\">Grande, cheveux bruns, lunettes, un foulard vert.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Voir son alibi<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Son alibi<\u002Fdiv>\n          <q>Ce matin, je suis arrivée à huit heures.<\u002Fq>\n          <q>D'abord, j'ai pris un café à la cafétéria, PAS dans la classe.<\u002Fq>\n          <q>Ensuite, j'ai parlé avec le concierge dans le couloir.<\u002Fq>\n          <q>Je n'ai pas pris le café du professeur. Je n'aime pas le café !<\u002Fq>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"suspect\" data-s=\"2\">\n      <div class=\"suspect-photo\">🧢<span class=\"suspect-num\">SUSPECT 2<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">Marco<\u002Fdiv>\n        <div class=\"suspect-role\">l'étudiant pressé<\u002Fdiv>\n        <div class=\"suspect-desc\">Petit, cheveux noirs, une casquette bleue, un sac à dos rouge.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Voir son alibi<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Son alibi<\u002Fdiv>\n          <q>Je suis arrivé en retard, à huit heures et demie.<\u002Fq>\n          <q>J'ai couru dans le couloir parce que j'étais pressé.<\u002Fq>\n          <q>Je suis entré dans la classe, mais je n'ai rien pris.<\u002Fq>\n          <q>J'ai juste posé mon sac et je suis allé aux toilettes.<\u002Fq>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"suspect\" data-s=\"3\">\n      <div class=\"suspect-photo\">👱‍♀️<span class=\"suspect-num\">SUSPECT 3<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">Léa<\u002Fdiv>\n        <div class=\"suspect-role\">l'étudiante gentille<\u002Fdiv>\n        <div class=\"suspect-desc\">Cheveux blonds, un chandail jaune, des espadrilles blanches.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Voir son alibi<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Son alibi<\u002Fdiv>\n          <q>Ce matin, je suis arrivée tôt, à huit heures moins quart.<\u002Fq>\n          <q>J'ai vu une tasse de café sur le bureau du professeur.<\u002Fq>\n          <q>J'ai trouvé que ça sentait très bon !<\u002Fq>\n          <q>Mais je n'ai pas touché à la tasse. J'ai commencé mes devoirs.<\u002Fq>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"suspect\" data-s=\"4\">\n      <div class=\"suspect-photo\">🧹<span class=\"suspect-num\">SUSPECT 4<\u002Fspan><\u002Fdiv>\n      <div class=\"suspect-body\">\n        <div class=\"suspect-name\">Monsieur Chen<\u002Fdiv>\n        <div class=\"suspect-role\">le concierge<\u002Fdiv>\n        <div class=\"suspect-desc\">Grand, cheveux gris, un uniforme bleu, un trousseau de clés.<\u002Fdiv>\n        <div class=\"suspect-cta\">🔍 Voir son alibi<\u002Fdiv>\n        <div class=\"alibi\">\n          <div class=\"alibi-lbl\">Son alibi<\u002Fdiv>\n          <q>J'ai nettoyé la classe à huit heures et quart.<\u002Fq>\n          <q>J'ai vu une personne avec une casquette bleue près du bureau.<\u002Fq>\n          <q>Cette personne tenait quelque chose dans ses mains.<\u002Fq>\n          <q>Après, je suis parti nettoyer une autre classe.<\u002Fq>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"alibis-audio\">\n    <div class=\"ic\">🎧<\u002Fdiv>\n    <div class=\"lbl\">Écoutez les alibis des suspects\n      <span>Version audio — pour l'écoute en classe avant ou après la lecture<\u002Fspan>\n    <\u002Fdiv>\n    <audio id=\"ali-player\" controls=\"\" preload=\"metadata\" src=\"7b35369d-fe92-4f12-87a9-08f19d38c15e\"><\u002Faudio>\n    <audio class=\"seg-ali\" preload=\"none\" src=\"7b35369d-fe92-4f12-87a9-08f19d38c15e\" style=\"display:none\"><\u002Faudio>\n    <audio class=\"seg-ali\" preload=\"none\" src=\"022ce16f-8cc7-40f6-9944-4dae29655719\" style=\"display:none\"><\u002Faudio>\n    <audio class=\"seg-ali\" preload=\"none\" src=\"5546c0c7-b954-4a12-a4a7-9d55df62c122\" style=\"display:none\"><\u002Faudio>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 3. TÉMOINS -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">3<\u002Fdiv>\n    <div class=\"sec-title\">Les témoins<\u002Fdiv>\n    <div class=\"sec-instr\">Révélez les indices un à un, au bon moment<\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"temoin-grid\">\n    <div class=\"temoin\">\n      <div class=\"temoin-name\">👁️ Témoin A — La secrétaire<\u002Fdiv>\n      <div class=\"temoin-txt\">« Ce matin, j'ai vu Madame Rousseau à la cafétéria à huit heures. Elle buvait un grand café ! »<\u002Fdiv>\n      <div class=\"temoin-cta\">🔍 Révéler le témoignage<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"temoin\">\n      <div class=\"temoin-name\">👁️ Témoin B — Un autre étudiant<\u002Fdiv>\n      <div class=\"temoin-txt\">« Vers huit heures et demie, j'ai vu Marco entrer dans la classe avec sa casquette bleue. Il avait l'air pressé. »<\u002Fdiv>\n      <div class=\"temoin-cta\">🔍 Révéler le témoignage<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"temoin\">\n      <div class=\"temoin-name\">👁️ Témoin C — Le professeur<\u002Fdiv>\n      <div class=\"temoin-txt\">« Mon café était sur le bureau à huit heures moins quart. À neuf heures, il n'était plus là ! »<\u002Fdiv>\n      <div class=\"temoin-cta\">🔍 Révéler le témoignage<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 4. VERDICT -->\n<div id=\"verdict-zone\">\n  <div class=\"sec\">\n    <div class=\"sec-lbl\">\n      <div class=\"sec-num\">4<\u002Fdiv>\n      <div class=\"sec-title\">Le verdict de l'équipe<\u002Fdiv>\n      <div class=\"sec-instr\">Discutez, puis choisissez le coupable<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"verdict-grid\">\n      <div class=\"verdict-opt\" data-v=\"rousseau\"><span class=\"em\">👩‍🏫<\u002Fspan>Madame Rousseau<\u002Fdiv>\n      <div class=\"verdict-opt\" data-v=\"marco\"><span class=\"em\">🧢<\u002Fspan>Marco<\u002Fdiv>\n      <div class=\"verdict-opt\" data-v=\"lea\"><span class=\"em\">👱‍♀️<\u002Fspan>Léa<\u002Fdiv>\n      <div class=\"verdict-opt\" data-v=\"chen\"><span class=\"em\">🧹<\u002Fspan>Monsieur Chen<\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"verdict-actions\">\n      <button id=\"btn-verdict\" disabled=\"\">⚖️ Rendre le verdict<\u002Fbutton>\n      <div id=\"verdict-msg\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 5. RAPPORT -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">5<\u002Fdiv>\n    <div class=\"sec-title\">Le rapport d'enquête<\u002Fdiv>\n    <div class=\"sec-instr\">À rédiger en équipe — au passé composé !<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"rapport\">\n    <h3>RAPPORT D'ENQUÊTE — ÉQUIPE Nº ____<\u002Fh3>\n    <div class=\"fld\">Le coupable est : <span class=\"line\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Le vol a eu lieu à (heure) : <span class=\"line short\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Preuve 1 : <span class=\"line\" style=\"min-width:420px\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Preuve 2 : <span class=\"line\" style=\"min-width:420px\"><\u002Fspan><\u002Fdiv>\n    <div class=\"fld\">Nous pensons que le coupable est cette personne parce que <span class=\"line\" style=\"min-width:340px\"><\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- 6. DÉROULEMENT -->\n<div class=\"sec\">\n  <div class=\"sec-lbl\">\n    <div class=\"sec-num\">6<\u002Fdiv>\n    <div class=\"sec-title\">Déroulement de l'enquête<\u002Fdiv>\n    <div class=\"sec-instr\">≈ 3 heures, divisible en 2 séances<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"steps\">\n    <div class=\"step\"><div class=\"step-n\">1<\u002Fdiv><div class=\"step-t\">La mission<\u002Fdiv><div class=\"step-d\">15 min · Groupe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">2<\u002Fdiv><div class=\"step-t\">Préparer les questions<\u002Fdiv><div class=\"step-d\">20 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">3<\u002Fdiv><div class=\"step-t\">Les interrogatoires<\u002Fdiv><div class=\"step-d\">45 min · Dyade<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">4<\u002Fdiv><div class=\"step-t\">Les témoins<\u002Fdiv><div class=\"step-d\">20 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">5<\u002Fdiv><div class=\"step-t\">Recouper les indices<\u002Fdiv><div class=\"step-d\">25 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">6<\u002Fdiv><div class=\"step-t\">Le rapport<\u002Fdiv><div class=\"step-d\">25 min · Équipe<\u002Fdiv><\u002Fdiv>\n    <div class=\"step\"><div class=\"step-n\">7<\u002Fdiv><div class=\"step-t\">La grande révélation<\u002Fdiv><div class=\"step-d\">15 min · Groupe<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <button class=\"btn\" id=\"btn-solution\" style=\"margin-top:24px\">🗝️ Solution (réservée à l'enseignant·e)<\u002Fbutton>\n  <div id=\"solution-box\">\n    <h4>🗝️ La solution<\u002Fh4>\n    <p>Le coupable est <strong>Marco (Suspect 2)<\u002Fstrong>. Le concierge (Suspect 4) et le Témoin B ont vu une personne avec une <strong>casquette bleue<\u002Fstrong> près du bureau vers 8 h 15 – 8 h 30. Marco portait une casquette bleue et il est entré dans la classe le matin. Le café était encore là à 8 h moins quart (Léa) et a disparu avant 9 h (professeur). <strong>Madame Rousseau a un alibi confirmé<\u002Fstrong> (la secrétaire l'a vue à la cafétéria), même si elle a menti sur le café.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"footer\">Francisation · Niveau 4 (LAN-4049-8) · Production orale, compréhension orale et production écrite · Passé composé et marqueurs de temps<\u002Fdiv>\n\n<script>\n// Lecture enchaînée des segments audio (encodés à vitesse normale, sans perte de qualité)\nfunction setupPlaylist(playerId, segClass){\n  const player = document.getElementById(playerId);\n  const segs = [...document.querySelectorAll('.'+segClass)].map(a => a.getAttribute('src') || a.src);\n  if(!player || !segs.length) return;\n  let i = 0;\n  player.src = segs[0];\n  player.addEventListener('ended', () => {\n    if(i < segs.length - 1){\n      i++;\n      player.src = segs[i];\n      player.play().catch(()=>{});\n    } else {\n      i = 0;\n      player.src = segs[0];\n    }\n  });\n}\nsetupPlaylist('msg-player','seg-msg');\nsetupPlaylist('ali-player','seg-ali');\n\n// Suspects reveal\ndocument.querySelectorAll('.suspect').forEach(s => {\n  s.addEventListener('click', () => s.classList.toggle('revealed'));\n});\n// Témoins reveal\ndocument.querySelectorAll('.temoin').forEach(t => {\n  t.addEventListener('click', () => t.classList.toggle('revealed'));\n});\n\n// Verdict\nlet selected = null;\nconst btnV = document.getElementById('btn-verdict');\nconst msg = document.getElementById('verdict-msg');\ndocument.querySelectorAll('.verdict-opt').forEach(o => {\n  o.addEventListener('click', () => {\n    document.querySelectorAll('.verdict-opt').forEach(x => x.classList.remove('sel','good','bad'));\n    o.classList.add('sel');\n    selected = o.dataset.v;\n    btnV.disabled = false;\n    msg.textContent = '';\n    msg.className = '';\n  });\n});\nbtnV.addEventListener('click', () => {\n  if (!selected) return;\n  const el = document.querySelector('.verdict-opt.sel');\n  if (selected === 'marco') {\n    el.classList.remove('sel'); el.classList.add('good');\n    msg.textContent = '✓ Bravo, agents ! Vous avez trouvé le coupable. Expliquez vos preuves au passé composé !';\n    msg.className = 'ok';\n  } else {\n    el.classList.remove('sel'); el.classList.add('bad');\n    msg.textContent = '✗ Hum… les indices ne concordent pas. Relisez les témoignages et comparez les heures.';\n    msg.className = 'ko';\n  }\n});\n\n// Solution toggle\ndocument.getElementById('btn-solution').addEventListener('click', () => {\n  const box = document.getElementById('solution-box');\n  if (box.classList.contains('on')) { box.classList.remove('on'); return; }\n  if (confirm('Cette section est réservée à l\\'enseignant·e. Afficher la solution ?')) {\n    box.classList.add('on');\n  }\n});\n\n// Reset\ndocument.getElementById('btn-reset').addEventListener('click', () => {\n  document.querySelectorAll('.suspect,.temoin').forEach(x => x.classList.remove('revealed'));\n  document.querySelectorAll('.verdict-opt').forEach(x => x.classList.remove('sel','good','bad'));\n  document.getElementById('solution-box').classList.remove('on');\n  selected = null; btnV.disabled = true;\n  msg.textContent = ''; msg.className = '';\n  document.querySelectorAll('audio').forEach(a => { a.pause(); a.currentTime = 0; });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
