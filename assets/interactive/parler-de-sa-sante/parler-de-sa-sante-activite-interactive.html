<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Parler de sa santé</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F4F0F8;font-family:'Nunito','Arial Rounded MT Bold',sans-serif;color:#1A2E35}
body{display:flex;flex-direction:column;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:rgba(0,0,0,.04);border-radius:3px}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}

/* HEADER */
#hdr{background:#7B4F9E;color:#fff;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 3px 16px rgba(123,79,158,.3);flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-ic{width:44px;height:44px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.hdr-eye{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.2em;opacity:.7;line-height:1}
.hdr-h1{font-size:28px;font-weight:900;line-height:1.15}
.hdr-r{display:flex;align-items:center;gap:14px}
#prog-chip{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.45);border-radius:999px;padding:8px 18px;font-size:16px;font-weight:900;white-space:nowrap}
#btn-reset{background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.45);border-radius:10px;padding:10px 18px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;white-space:nowrap;transition:background .15s}
#btn-reset:hover{background:rgba(255,255,255,.28)}

/* TABS */
#tabs{background:#fff;display:flex;gap:6px;padding:10px 32px;position:sticky;top:76px;z-index:190;box-shadow:0 2px 12px rgba(0,0,0,.07);flex-wrap:wrap}
.tab{border:2.5px solid transparent;border-radius:999px;padding:9px 20px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;background:#F4F0F8;color:#6B8E97;transition:all .15s;display:flex;align-items:center;gap:8px}
.tab .tno{width:24px;height:24px;border-radius:50%;background:#D8C8EC;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0}
.tab.on{background:#7B4F9E;color:#fff}
.tab.on .tno{background:rgba(255,255,255,.28)}
.tab .tchk{display:none;color:#4ADE80;font-size:15px}
.tab.done .tchk{display:inline}

/* BANNER */
#sel-banner{background:#FEF3C7;border-bottom:3px solid #F59E0B;padding:10px 32px;display:none;align-items:center;gap:10px;font-size:20px;font-weight:800;color:#92400E;flex-shrink:0;position:sticky;top:132px;z-index:180}
#sel-banner.on{display:flex}

/* SECTIONS */
.sec{display:none;flex-direction:column}
.sec.on{display:flex}

/* DIALOGUE */
.dial-sec{background:#1D3545;color:#E8F5F7;padding:16px 32px;display:flex;gap:24px;border-bottom:4px solid #7B4F9E;flex-shrink:0}
.audio-pl{flex:0 0 148px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:6px;gap:10px;border-right:1px solid rgba(255,255,255,.1);padding-right:24px}
.audio-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;opacity:.6;text-align:center}
.btn-lu{background:rgba(255,255,255,.12);color:#E8F5F7;border:2px solid rgba(255,255,255,.35);border-radius:10px;padding:10px 14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s;text-align:center;line-height:1.3}
.btn-lu:hover{background:rgba(255,255,255,.25)}
.btn-lu.done{background:#166534;border-color:#4ADE80;color:#DCFCE7;cursor:default}
.audio-soon{font-size:12px;font-weight:700;opacity:.45;text-align:center;line-height:1.4}
#audio-player{display:none;width:100%;background:rgba(255,255,255,.1);border-radius:10px;padding:12px 16px}
#audio-player.on{display:block}
#audio-player audio{width:100%;height:32px;margin:0;accent-color:#FDE68A}
#audio-player .audio-info{font-size:11px;font-weight:700;color:#DCFCE7;margin-top:8px;text-align:center}
.dial-txt{flex:1;display:flex;flex-direction:column;gap:7px;font-size:20px;font-weight:600;line-height:1.75;padding-right:8px}
.d-lbl{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:#C3A8E0;margin-bottom:6px;opacity:.75}
.dl{line-height:1.7}.mb{color:#FCA5A5;font-weight:800}.dr{color:#C3A8E0;font-weight:800}

/* INTRO STRIP */
.intro{background:#EDE4F6;padding:14px 32px;font-size:18px;font-weight:700;color:#4C1D95;line-height:1.5;border-bottom:2px solid #D8C8EC}

/* MAIN */
.exs{flex:1;padding:22px 32px 48px;display:flex;flex-direction:column;gap:20px}

/* CARDS */
.card{background:#fff;border-radius:18px;padding:22px 26px;box-shadow:0 4px 20px rgba(123,79,158,.08)}
.c-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.tag{color:#fff;border-radius:999px;padding:5px 16px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.ctit{font-size:22px;font-weight:900}
.csub{font-size:16px;color:#6B8E97;font-weight:600}

/* SAVOIRS BOX */
.savoir{background:#F7F5FF;border-left:5px solid #6B4FBB;border-radius:0 14px 14px 0;padding:16px 22px;margin-bottom:4px}
.savoir h3{font-size:16px;font-weight:900;color:#6B4FBB;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.savoir table{border-collapse:collapse;width:100%}
.savoir td{padding:6px 12px;font-size:17px;font-weight:600;line-height:1.5;border-bottom:1px dashed #DDD6FE;vertical-align:top}
.savoir td:first-child{font-weight:900;color:#4C1D95;white-space:nowrap}
.savoir em{font-style:italic;color:#7C3AED}

/* ANNONCE (marketplace card) */
.annonce{background:#fff;border:2px solid #E2E8F0;border-radius:14px;overflow:hidden;max-width:560px;box-shadow:0 6px 24px rgba(0,0,0,.08)}
.annonce-img{background:linear-gradient(135deg,#94A3B8,#64748B);height:140px;display:flex;align-items:center;justify-content:center;font-size:64px}
.annonce-body{padding:16px 20px}
.annonce-t{font-size:22px;font-weight:900;color:#0F172A}
.annonce-p{font-size:26px;font-weight:900;color:#16A34A;margin:2px 0 8px}
.annonce-d{font-size:17px;font-weight:600;color:#334155;line-height:1.6}

/* FICHE-CONSEIL */
.fiche{background:#FFFBEB;border:2px solid #FDE68A;border-radius:14px;padding:18px 24px}
.fiche h3{font-size:17px;font-weight:900;color:#92400E;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.fiche li{font-size:17px;font-weight:600;color:#451A03;line-height:1.65;margin-left:22px;margin-bottom:6px}
.fiche b{font-weight:900}

/* ROWS */
.rows{display:flex;flex-direction:column;gap:8px}
.rrow{display:flex;align-items:center;gap:10px}
.stxt{flex:1;background:#F4F9FA;border-radius:10px;padding:14px 18px;font-size:22px;font-weight:700;color:#1A2E35;line-height:1.4}
.rrow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:stretch}
.qcard{background:#FFF6F3;border-left:4px solid #C0573A;border-radius:0 10px 10px 0;padding:12px 16px;display:flex;flex-direction:column;justify-content:center}
.qlbl{font-size:13px;font-weight:800;color:#C0573A;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.qtxt{font-size:20px;font-weight:700;color:#1A2E35;line-height:1.4}
.timelbl{flex:0 0 200px;background:#FEF3C7;border-radius:10px;padding:12px 16px;font-size:17px;font-weight:900;color:#92400E;text-align:center}
.blanks-p{font-size:23px;line-height:3;font-weight:600;color:#1A2E35}

/* ZONES */
.zone{display:flex;align-items:center;justify-content:center;min-height:56px;border-radius:10px;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:background .18s,border-color .18s,color .18s,transform .12s;user-select:none;text-align:center;padding:10px 14px;border:2.5px solid;line-height:1.35}
.zone.empty{background:#F0F9FF;border-color:#93C5D6;border-style:dashed;color:#94A3B8;font-size:18px}
.zone.dov{background:#E0F2FE!important;border-color:#38BDF8!important;border-style:solid!important;transform:scale(1.02)}
.zvf{min-width:150px;font-size:20px}
.f-vrai{background:#DCFCE7;border-color:#4ADE80;border-style:solid;color:#166534}
.f-faux{background:#FEE2E2;border-color:#FCA5A5;border-style:solid;color:#991B1B}
.zone.filled{background:#DBEAFE;border-color:#60A5FA;border-style:solid;color:#1E3A8A;font-size:18px}
.fb-ok{background:#D1FAE5!important;border-color:#34D399!important;border-style:solid!important;color:#065F46!important}
.fb-no{background:#FEE2E2!important;border-color:#F87171!important;border-style:solid!important;color:#991B1B!important;animation:shk .5s ease}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}60%{transform:translateX(6px)}80%{transform:translateX(-3px)}}

/* BLANKS */
.blank{display:inline-block;min-width:140px;padding:4px 14px;margin:0 3px;border-radius:8px;font-weight:800;vertical-align:middle;cursor:pointer;transition:background .18s,border-color .18s,color .18s;user-select:none;border:2.5px dashed #93C5D6;background:#F0F9FF;color:#94A3B8;font-size:21px;text-align:center}
.blank.filled{border-style:solid;border-color:#A78BFA;background:#EDE9FE;color:#4C1D95}
.blank.fb-ok{border-style:solid;border-color:#34D399;background:#D1FAE5;color:#065F46}
.blank.fb-no{border-style:solid;border-color:#F87171;background:#FEE2E2;color:#991B1B;animation:shk .5s ease}
.blank.dov{border-style:solid;border-color:#38BDF8;background:#E0F2FE}

/* BANK */
.bsec{border-radius:12px;padding:14px 12px;flex-shrink:0}
.bsec.b1{background:#F4F0F8;border:1.5px solid #D8C8EC}
.blbl{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;margin-bottom:10px;color:#7B4F9E}
.btiles{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.btiles.vert{flex-direction:column;flex-wrap:nowrap}

/* TILES */
.tile{border-radius:10px;font-weight:800;font-family:'Nunito',sans-serif;cursor:grab;transition:all .15s;user-select:none;border:2.5px solid;box-shadow:0 2px 7px rgba(0,0,0,.08);padding:10px 14px;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.35}
.tile:active{cursor:grabbing;transform:scale(1.04);box-shadow:0 5px 14px rgba(0,0,0,.15)}
.tile.sel{background:#FEF9C3!important;border-color:#FBBF24!important;color:#92400E!important;box-shadow:0 0 0 4px rgba(245,158,11,.22),0 2px 7px rgba(0,0,0,.08)!important;transform:translateY(-1px)}
.tv{background:#DCFCE7;border-color:#4ADE80;color:#166534;font-size:20px;padding:13px 22px}
.tf{background:#FEE2E2;border-color:#FCA5A5;color:#991B1B;font-size:20px;padding:13px 22px}
.tn{background:#F5F3FF;border-color:#C4B5FD;color:#4C1D95;font-size:16px}
.ta{background:#FFF4F2;border-color:#FDBA74;color:#9A3412;font-size:15px}
.bempty{font-size:13px;color:#94A3B8;font-weight:600;text-align:center;padding:8px 0;font-style:italic}

/* GHOST */
.ghost{position:fixed;z-index:9999;pointer-events:none;opacity:.88;transform:scale(1.06) rotate(1.5deg);box-shadow:0 8px 24px rgba(0,0,0,.25);border-radius:10px}

/* FLASHCARDS */
#fc-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(15,25,35,.6);backdrop-filter:blur(5px);align-items:center;justify-content:center}
#fc-overlay.on{display:flex}
#fc-box{background:#7B4F9E;border-radius:24px;padding:44px 56px;max-width:760px;width:92%;box-shadow:0 24px 64px rgba(0,0,0,.4);display:flex;flex-direction:column;align-items:center;gap:20px;animation:fcPop .3s cubic-bezier(.34,1.4,.64,1)}
@keyframes fcPop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
#fc-counter{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.22em;color:rgba(255,255,255,.5)}
#fc-word{font-size:38px;font-weight:900;color:#fff;text-align:center;line-height:1.2;border-bottom:2px solid rgba(255,255,255,.18);padding-bottom:18px;width:100%}
#fc-def{font-size:22px;font-weight:700;color:#fff;line-height:1.65;text-align:center}
#fc-ex{font-size:19px;font-weight:600;color:rgba(255,255,255,.78);line-height:1.6;text-align:center;font-style:italic}
#fc-ex strong{font-weight:900;font-style:normal;color:#fff}
#fc-def.hidden,#fc-ex.hidden{display:none}
#fc-reveal-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:8px 20px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.04em}
#fc-reveal-btn:hover{background:rgba(255,255,255,.38)}
#fc-reveal-btn.hidden{display:none}
#fc-btns{display:flex;gap:14px;margin-top:6px}
.fc-btn{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.38);color:#fff;border-radius:10px;padding:10px 22px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer}
.fc-btn:hover{background:rgba(255,255,255,.28)}

/* VOCAB STRIP */
.vocab-sec{background:#F4F0F8;border-bottom:3px solid rgba(123,79,158,.15);padding:14px 32px 18px}
.vocab-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px 20px}
.vw{display:flex;align-items:baseline;gap:8px;padding:7px 10px;border-radius:8px;background:rgba(255,255,255,.55)}
.vw span.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#7B4F9E;flex-shrink:0}
.vw span.w{font-size:18px;font-weight:700;color:#1A2E35}
@media(max-width:900px){.vocab-grid{grid-template-columns:1fr 1fr}.rrow2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="hdr">
  <div class="hdr-l">
    <div class="hdr-ic">🩺</div>
    <div><div class="hdr-eye">Francisation · Niveau 4</div><div class="hdr-h1">Parler de sa santé</div></div>
  </div>
  <div class="hdr-r">
    <div id="prog-chip">⭐ 0 / 0</div>
    <button id="btn-reset">↺ Réinitialiser</button>
  </div>
</div>

<div id="tabs"></div>

<div id="sel-banner">
  ✋ Sélectionné : «&nbsp;<span id="sel-lbl">—</span>&nbsp;» — Cliquez sur une case pour le placer.
</div>

<div id="sections"></div>

<div id="fc-overlay">
  <div id="fc-box">
    <div id="fc-counter">Carte 1 / 12</div>
    <div id="fc-word">—</div>
    <button id="fc-reveal-btn">Voir la définition</button>
    <div id="fc-def" class="hidden">—</div>
    <div id="fc-ex" class="hidden">—</div>
    <div id="fc-btns">
      <button class="fc-btn" id="fc-prev">← Précédente</button>
      <button class="fc-btn" id="fc-next">Suivante →</button>
      <button class="fc-btn" id="fc-close">✕ Fermer</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  JE DÉMÉNAGE ! — Module interactif Niveau 4 (FLS)
//  Sections : Je me prépare · Tâche 1 à 4 — suivi LMS intégré
// ═══════════════════════════════════════════════════════════════════════

// ── DIALOGUES ─────────────────────────────────────────────────────────
const DIALOGUES = {
  prep: {
    label: "Dialogue — Prendre un rendez-vous",
    lines: [
      ["FATIMA","Bonjour, j'aimerais prendre un rendez-vous. Je ne me sens pas bien depuis trois jours."],
      ["LA RÉCEPTIONNISTE","Bien sûr. Qu'est-ce qui ne va pas exactement ?"],
      ["FATIMA","J'ai mal à la gorge et j'ai de la fièvre. J'ai aussi beaucoup de difficulté à avaler."],
      ["LA RÉCEPTIONNISTE","Est-ce que vous toussez ?"],
      ["FATIMA","Oui, un peu. Et je suis très fatiguée."],
      ["LA RÉCEPTIONNISTE","D'accord. Est-ce que vous avez déjà consulté le docteur Tremblay ?"],
      ["FATIMA","Non, c'est la première fois. Est-ce qu'il reste de la place cette semaine ?"],
      ["LA RÉCEPTIONNISTE","Oui. Il y a une place demain, jeudi, à quatorze heures. Est-ce que ça vous convient ?"],
      ["FATIMA","Parfait ! Est-ce que je dois apporter ma carte d'assurance maladie ?"],
      ["LA RÉCEPTIONNISTE","Oui, s'il vous plaît. À demain, madame !"],
    ]
  },
  t1: {
    label: "Dialogue — Décrire ses symptômes",
    lines: [
      ["LE DOCTEUR","Bonjour Fatima. Alors, qu'est-ce qui vous amène aujourd'hui ?"],
      ["FATIMA","J'ai très mal à la gorge et j'ai de la difficulté à avaler depuis trois jours."],
      ["LE DOCTEUR","Est-ce que vous avez de la fièvre ?"],
      ["FATIMA","Oui, un peu. Et je suis fatiguée à cause de la fièvre. Je dors mal la nuit."],
      ["LE DOCTEUR","Je vais examiner votre gorge. Ouvrez grand la bouche, s'il vous plaît… Votre gorge est très rouge."],
      ["FATIMA","Est-ce que c'est grave, docteur ?"],
      ["LE DOCTEUR","Non, ce n'est pas grave. C'est une pharyngite. Ce n'est pas une infection bactérienne."],
      ["FATIMA","Est-ce que j'ai besoin d'un antibiotique ?"],
      ["LE DOCTEUR","Non, l'antibiotique est inutile parce que c'est un virus. Reposez-vous et buvez beaucoup d'eau."],
    ]
  },
  t2: {
    label: "Dialogue — Les conseils du médecin",
    lines: [
      ["LE DOCTEUR","Pour soulager votre gorge, prenez un médicament contre la douleur, comme l'acétaminophène."],
      ["FATIMA","Est-ce que j'ai besoin d'une ordonnance ?"],
      ["LE DOCTEUR","Non, c'est un médicament en vente libre. Vous pouvez l'acheter directement à la pharmacie."],
      ["FATIMA","D'accord. Est-ce que je peux prendre des vitamines aussi ?"],
      ["LE DOCTEUR","Oui, mais attention : ne prenez jamais un médicament périmé. Vérifiez toujours la date."],
      ["FATIMA","Combien de fois par jour dois-je prendre le médicament ?"],
      ["LE DOCTEUR","Trois fois par jour, après les repas. Si la fièvre continue plus de cinq jours, revenez me voir."],
      ["FATIMA","Merci beaucoup, docteur. Je vais suivre vos conseils."],
    ]
  },
  t4: {
    label: "Dialogue — Prévenir plutôt que guérir",
    lines: [
      ["FATIMA","Julie, tu as la voix bizarre ! Qu'est-ce que tu as ?"],
      ["JULIE","J'ai une laryngite. J'ai perdu la voix à cause du concert de samedi : j'ai trop crié !"],
      ["FATIMA","Oh non ! Est-ce que tu prends des antibiotiques ?"],
      ["JULIE","Non, l'antibiotique est inutile parce que c'est un virus. Le médecin dit de reposer ma voix."],
      ["FATIMA","Tu dois boire beaucoup d'eau et ne pas chuchoter. Chuchoter fatigue les cordes vocales."],
      ["JULIE","Je sais ! Grâce à tes conseils, je vais guérir plus vite. Merci, Fatima !"],
    ]
  },
};

// ── SECTIONS ──────────────────────────────────────────────────────────
const SECTIONS = [
  {id:'prep', no:'▶', title:'Je me prépare', color:'#7B4F9E',
   intro:"🏥 Fatima ne se sent pas bien depuis trois jours. Elle téléphone à la clinique pour prendre un rendez-vous. Lisez le dialogue, puis faites les exercices.",
   dialogue:'prep'},
  {id:'t1', no:'1', title:'Décrire ses symptômes', color:'#C0573A',
   intro:"🩺 Tâche 1 — Fatima décrit ses symptômes au médecin, qui l'examine et pose son diagnostic.",
   dialogue:'t1'},
  {id:'t2', no:'2', title:'Les conseils du médecin', color:'#2E7D6B',
   intro:"💊 Tâche 2 — Le médecin explique à Fatima comment se soigner et quels médicaments prendre.",
   dialogue:'t2'},
  {id:'t3', no:'3', title:'Chez le spécialiste', color:'#B45309',
   intro:"👩‍⚕️ Tâche 3 — Selon le problème de santé, on doit parfois consulter un médecin spécialiste."},
  {id:'t4', no:'4', title:'Prévenir plutôt que guérir', color:'#B4457E',
   intro:"🛡 Tâche 4 — Fatima rencontre son amie Julie, qui a perdu la voix. Elles parlent de prévention.",
   dialogue:'t4'},
];

// ── EXERCICES ─────────────────────────────────────────────────────────
const EXOS = [
  // ── JE ME PRÉPARE ──
  {sec:'prep', id:'p1', type:'vf', num:'Exercice 1', tit:'Vrai ou Faux', color:'#7B4F9E',
   sub:'Lisez le dialogue, puis répondez.', tiles:['VRAI','FAUX'],

const S = {pl:{}, sel:null, fb:{}};

// index zone → exercice
const ZONES = {};   // zid → {cv, zcat, exo}
EXOS.forEach(ex => {
  if (ex.type === 'vf')     ex.rows.forEach(r => ZONES[r.id] = {cv:r.ok, zcat:'vf', exo:ex.id});
  if (ex.type === 'match')  ex.rows.forEach(r => ZONES[r.id] = {cv:r.aid, zcat:'id', exo:ex.id});
  if (ex.type === 'rows')   ex.rows.forEach(r => ZONES[r.id] = {cv:r.cv, zcat:'id', exo:ex.id});
  if (ex.type === 'blanks') ex.segs.filter(s=>s.k==='b').forEach(s =>
    ZONES[s.id] = {cv:s.c, zcat: ex.byLabel ? 'lbl' : 'id', exo:ex.id});
});
const TOTAL_ZONES = Object.keys(ZONES).length;

// ── LMS TRACKING ──────────────────────────────────────────────────────
function lmsTrack(event, data) {
  try { window.parent.postMessage(Object.assign({lms:true, event:event}, data||{}), '*'); } catch(e) {}
  try {
    const up = new URLSearchParams(window.parent.location.search);
    const code = up.get('code'), actId = parseInt(up.get('activityId'))||null, title = up.get('title')||'';
    if (code && actId) {
      fetch('/api/student/progress', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(Object.assign({code, activityId:actId, activityTitle:title, event}, data||{})),
      }).catch(()=>{});
    }
  } catch(e2) {}
}
const TR = {attempts:{}, correct:{}};
function trackPlacement(zid, ok) {
  if (ok && !TR.correct[zid]) {
    TR.correct[zid] = true;
    if (!(zid in TR.attempts)) TR.attempts[zid] = 0;
    const zonesDone = Object.keys(TR.correct).length;
    const firstTry = Object.keys(TR.correct).filter(k => (TR.attempts[k]||0)===0).length;
    const totalErrors = Object.keys(TR.attempts).reduce((s,k)=>s+(TR.attempts[k]||0),0);
    lmsTrack('exercise_completed', {zones:TOTAL_ZONES, zonesDone, firstTry, totalErrors});
  } else if (!ok && !TR.correct[zid]) {
    TR.attempts[zid] = (TR.attempts[zid]||0) + 1;
  }
  updateChip();
}
let dialogueRead = false;
let currentDialogueAudio = null;

function getDialogueId(btn) {
  const dialSec = btn.closest('.dial-sec');
  const section = dialSec.closest('.sec');
  const secId = section.id.replace('sec-', '');
  const secObj = SECTIONS.find(s => s.id === secId);
  return secObj ? secObj.dialogue : null;
}

function getDialogueDir(dialogueId) {
  const dialogueMap = { prep: 'dialogue-1', t1: 'dialogue-2', t2: 'dialogue-3', t4: 'dialogue-4' };
  return dialogueMap[dialogueId] || 'dialogue-1';
}

function markDialogueRead(btn) {
  const dialogueId = getDialogueId(btn);
  const dialogueDir = getDialogueDir(dialogueId);
  const basePath = `/assets/interactive/parler-de-sa-sante/${dialogueDir}`;

  if (!btn.classList.contains('done')) {
    btn.classList.add('done');
    btn.textContent = '▶ En cours...';

    // Créer l'élément audio caché
    if (!currentDialogueAudio) {
      currentDialogueAudio = document.createElement('audio');
      currentDialogueAudio.controls = true;
      currentDialogueAudio.style.width = '100%';
      currentDialogueAudio.style.marginTop = '8px';
      btn.after(currentDialogueAudio);
    }

    // Construire la liste des fichiers audio
    const lines = DIALOGUES[dialogueId]?.lines || [];
    const audioList = [];
    for (let i = 1; i <= lines.length; i++) {
      const num = String(i).padStart(2, '0');
      const char = lines[i-1][0].toLowerCase().replace(/\s+/g, '_');
      audioList.push(`${basePath}/line_${num}_${char}.mp3`);
    }

    // Charger et jouer
    if (audioList.length > 0) {
      let currentAudioIndex = 0;
      currentDialogueAudio.src = audioList[currentAudioIndex];
      currentDialogueAudio.onended = () => {
        if (currentAudioIndex < audioList.length - 1) {
          currentAudioIndex++;
          currentDialogueAudio.src = audioList[currentAudioIndex];
          currentDialogueAudio.play();
        } else {
          btn.textContent = '✓ Dialogue écouté !';
          if (!dialogueRead) { dialogueRead = true; lmsTrack('dialogue_listened'); }
        }
      };
      currentDialogueAudio.play();
    }
  }
}

// ── LOGIQUE DE PLACEMENT ──────────────────────────────────────────────
function checkOk(zid, iid, lbl) {
  const z = ZONES[zid];
  if (!z) return false;
  if (z.zcat === 'vf' || z.zcat === 'lbl') return lbl === z.cv;
  return iid === z.cv;
}
function doPlace(zid, iid, lbl, cat, from) {
  if (from === zid) { S.sel = null; render(); return; }
  if (from && from !== zid) { if (S.pl[zid]) S.pl[from] = S.pl[zid]; else delete S.pl[from]; delete S.fb[from]; delete S.fb[zid]; }
  else if (!from && S.pl[zid]) { delete S.pl[zid]; delete S.fb[zid]; }
  S.pl[zid] = {iid, lbl, cat}; S.sel = null;
  const ok = checkOk(zid, iid, lbl);
  S.fb[zid] = ok ? 'ok' : 'no';
  trackPlacement(zid, ok);
  render();
  setTimeout(() => { delete S.fb[zid]; if (!ok) delete S.pl[zid]; render(); }, ok ? 1400 : 850);
}
function zoneClick(zid) {
  if (S.sel) { doPlace(zid, S.sel.iid, S.sel.lbl, S.sel.cat, S.sel.from); }
  else if (S.pl[zid] && !S.fb[zid]) {
    const {iid,lbl,cat} = S.pl[zid];
    delete S.pl[zid]; delete S.fb[zid];
    S.sel = {iid,lbl,cat,from:zid}; render();
  }
}
function tileClick(iid, lbl, cat) {
  if (S.sel && S.sel.iid === iid && !S.sel.from) S.sel = null;
  else S.sel = {iid,lbl,cat,from:null};
  render();
}

let dd = null;
function drg(el, iid, lbl, cat, from) {
  el.draggable = true;
  el.addEventListener('dragstart', e => { dd = {iid,lbl,cat,from:from||null}; e.dataTransfer.setData('text/plain', JSON.stringify(dd)); e.dataTransfer.effectAllowed='move'; setTimeout(()=>el.style.opacity='.45',0); });
  el.addEventListener('dragend', () => { el.style.opacity=''; dd=null; });
}
function drp(el, zid) {
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dov'); });
  el.addEventListener('dragleave', () => el.classList.remove('dov'));
  el.addEventListener('drop', e => { e.preventDefault(); el.classList.remove('dov'); let d=dd; if(!d){try{d=JSON.parse(e.dataTransfer.getData('text/plain'))}catch{}} if(!d)return; doPlace(zid, d.iid, d.lbl, d.cat, d.from); dd=null; });
}

// touch
let ts=null, ghost=null;
function tch(el, iid, lbl, cat, from) {
  el.addEventListener('touchstart', e => { const t=e.touches[0]; ts={x:t.clientX,y:t.clientY,iid,lbl,cat,from:from||null,el,moved:false}; }, {passive:true});
}
document.addEventListener('touchmove', e => {
  if(!ts) return;
  const t=e.touches[0], dx=t.clientX-ts.x, dy=t.clientY-ts.y;
  if(!ts.moved && Math.sqrt(dx*dx+dy*dy)>8){
    ts.moved=true;
    const r=ts.el.getBoundingClientRect();
    ghost=ts.el.cloneNode(true);
    ghost.className=ts.el.className+' ghost'; ghost.style.width=r.width+'px';
    ghost.style.left=(t.clientX-r.width/2)+'px'; ghost.style.top=(t.clientY-r.height/2)+'px';
    document.body.appendChild(ghost);
  }
  if(ts.moved && ghost){ e.preventDefault(); ghost.style.left=(t.clientX-ghost.offsetWidth/2)+'px'; ghost.style.top=(t.clientY-ghost.offsetHeight/2)+'px'; }
}, {passive:false});
document.addEventListener('touchend', e => {
  if(!ts) return;
  if(ts.moved && ghost){
    ghost.remove(); ghost=null;
    const t=e.changedTouches[0];
    const zel=document.elementsFromPoint(t.clientX,t.clientY).find(x=>x.dataset&&x.dataset.zid);
    if(zel) doPlace(zel.dataset.zid, ts.iid, ts.lbl, ts.cat, ts.from);
    e.preventDefault();
  }
  ts=null;
});

// ── HELPERS ───────────────────────────────────────────────────────────
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function usedIds(){return new Set(Object.values(S.pl).map(p=>p.iid))}
function shuffled(arr, seed){
  const a=arr.slice(); let s=seed||42;
  for(let i=a.length-1;i>0;i--){ s=(s*9301+49297)%233280; const j=Math.floor((s/233280)*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function mkZone(zid, extra, placeholder){
  const el=document.createElement('div');
  const placed=S.pl[zid], fb=S.fb[zid], z=ZONES[zid];
  let cls=['zone']; if(extra)cls.push(extra);
  if(fb)cls.push('fb-'+fb);
  else if(placed){
    if(z.zcat==='vf'&&(placed.lbl==='VRAI'||placed.lbl==='FAUX'))cls.push(placed.lbl==='VRAI'?'f-vrai':'f-faux');
    else cls.push('filled');
  } else cls.push('empty');
  el.className=cls.join(' ');
  el.dataset.zid=zid;
  el.textContent=placed?placed.lbl:(placeholder||'déposer ici');
  el.addEventListener('click',()=>zoneClick(zid));
  drp(el,zid);
  if(placed&&!fb){drg(el,placed.iid,placed.lbl,placed.cat,zid);tch(el,placed.iid,placed.lbl,placed.cat,zid)}
  return el;
}
function mkBlank(zid){
  const el=document.createElement('span');
  const placed=S.pl[zid], fb=S.fb[zid];
  let cls=['blank'];
  if(fb)cls.push('fb-'+fb); else if(placed)cls.push('filled');
  el.className=cls.join(' ');
  el.dataset.zid=zid;
  el.textContent=placed?placed.lbl:'…';
  el.addEventListener('click',()=>zoneClick(zid));
  drp(el,zid);
  if(placed&&!fb){drg(el,placed.iid,placed.lbl,placed.cat,zid);tch(el,placed.iid,placed.lbl,placed.cat,zid)}
  return el;
}
function mkTile(iid,lbl,cat,cls){
  const t=document.createElement('div');
  t.className='tile '+cls+(S.sel&&S.sel.iid===iid&&!S.sel.from?' sel':'');
  t.textContent=lbl;
  t.addEventListener('click',()=>tileClick(iid,lbl,cat));
  drg(t,iid,lbl,cat,null); tch(t,iid,lbl,cat,null);
  return t;
}

// ── CONSTRUCTION DU DOM ───────────────────────────────────────────────
function buildStatic(){
  // tabs
  const tabs=document.getElementById('tabs');
  SECTIONS.forEach(sec=>{
    const b=document.createElement('button');
    b.className='tab'; b.id='tab-'+sec.id;
    b.innerHTML='<span class="tno">'+sec.no+'</span>'+esc(sec.title)+'<span class="tchk">✓</span>';
    b.addEventListener('click',()=>{curSec=sec.id;render();window.scrollTo({top:0,behavior:'smooth'})});
    tabs.appendChild(b);
  });
  // sections
  const wrap=document.getElementById('sections');
  SECTIONS.forEach(sec=>{
    const d=document.createElement('div');
    d.className='sec'; d.id='sec-'+sec.id;
    let h='';
    h+='<div class="intro" style="border-color:'+sec.color+'33">'+sec.intro+'</div>';
    if(sec.dialogue){
      const dia=DIALOGUES[sec.dialogue];
      h+='<div class="dial-sec" style="border-bottom-color:'+sec.color+'">';
      h+='<div class="audio-pl"><div class="audio-lbl">Dialogue</div>';
      h+='<button class="btn-lu" onclick="markDialogueRead(this)">📖 J\'ai lu<br>le dialogue</button>';
      h+='<div class="audio-soon">🔊 Audio<br>bientôt disponible</div></div>';
      h+='<div class="dial-txt"><div class="d-lbl">'+esc(dia.label)+'</div>';
      dia.lines.forEach((l,i)=>{
        const cls=(i%2===0)?'mb':'dr';
        h+='<div class="dl"><span class="'+cls+'">'+esc(l[0])+' :</span> '+esc(l[1])+'</div>';
      });
      h+='</div></div>';
    }
    if(sec.id==='prep'){
      h+='<div class="vocab-sec"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">';
      h+='<div style="background:#7B4F9E;color:#fff;border-radius:999px;padding:3px 14px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;">Vocabulaire</div>';
      h+='<div style="font-size:15px;font-weight:700;color:#4A7A82;">Mots du module — <span style="font-weight:900;cursor:pointer;text-decoration:underline dotted;" onclick="fcOpen(0)">Cliquez pour les flashcards 🃏</span></div></div>';
      h+='<div class="vocab-grid">';
      FC_CARDS.forEach(c=>{h+='<div class="vw" style="cursor:pointer" onclick="fcOpenWord(\''+c.word.replace(/'/g,"\\'")+'\')"><span class="dot"></span><span class="w">'+esc(c.word)+'</span></div>'});
      h+='</div></div>';
    }
    h+='<div class="exs" id="exs-'+sec.id+'"></div>';
    d.innerHTML=h;
    wrap.appendChild(d);
  });
  // exercise cards
  EXOS.forEach(ex=>{
    const host=document.getElementById('exs-'+ex.sec);
    const card=document.createElement('div');
    card.className='card';
    let h='';
    if(ex.savoir){
      h+='<div class="savoir"><h3>'+ex.savoir.h+'</h3><table>';
      ex.savoir.rows.forEach(r=>{h+='<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>'});
      h+='</table></div>';
    }
    if(ex.annonce){
      h+='<div class="annonce" style="margin-bottom:16px"><div class="annonce-img">🛋</div><div class="annonce-body">';
      h+='<div class="annonce-t">DIVAN 3 PLACES</div><div class="annonce-p">150 $</div>';
      h+='<div class="annonce-d">Divan gris en tissu, en très bon état, provenant d\'une maison non fumeur. Peu utilisé. Dimensions : 200 cm × 90 cm. <b>Prix ferme.</b> Disponible pour ramassage ce week-end. Écrivez-moi ou appelez au 514-555-0123.</div></div></div>';
    }
    if(ex.fiche){
      h+='<div class="fiche" style="margin-bottom:16px"><h3>📋 FICHE-CONSEIL — Bien planifier son déménagement</h3><ul>';
      h+='<li><b>Un mois avant :</b> réservez votre compagnie de déménagement, triez vos affaires et donnez les objets inutiles.</li>';
      h+='<li><b>Deux semaines avant :</b> emballez les objets que vous utilisez rarement. Étiquetez chaque boîte selon la pièce.</li>';
      h+='<li><b>Une semaine avant :</b> faites votre changement d\'adresse (poste, banque, employeur). Confirmez l\'heure des déménageurs.</li>';
      h+='<li><b>Le jour J :</b> gardez vos documents importants et vos médicaments avec vous. Prévoyez de l\'eau pour l\'équipe.</li>';
      h+='<li><b>Après :</b> déballez d\'abord la cuisine et la salle de bain. Vérifiez que rien n\'a été endommagé.</li>';
      h+='</ul></div>';
    }
    h+='<div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">';
    h+='<div style="flex:1;min-width:300px">';
    h+='<div class="c-hdr"><span class="tag" style="background:'+ex.color+'">'+esc(ex.num)+'</span><span class="ctit" style="color:'+ex.color+'">'+esc(ex.tit)+'</span><span class="csub">'+esc(ex.sub)+'</span></div>';
    if(ex.type==='blanks') h+='<p class="blanks-p" id="mount-'+ex.id+'"></p>';
    else h+='<div class="rows" id="mount-'+ex.id+'"></div>';
    h+='</div>';
    const vert=(ex.type==='match'||ex.type==='rows')?' vert':'';
    const bw=(ex.type==='match'||ex.type==='rows')?'300px':'220px';
    h+='<div class="bsec b1" style="flex:0 0 '+bw+'"><div class="blbl">Réponses</div><div class="btiles'+vert+'" id="bank-'+ex.id+'"></div></div>';
    h+='</div>';
    card.innerHTML=h;
    host.appendChild(card);
  });
}

// ── RENDER ────────────────────────────────────────────────────────────
function render(){
  // tabs + sections visibility
  SECTIONS.forEach(sec=>{
    document.getElementById('tab-'+sec.id).classList.toggle('on', curSec===sec.id);
    document.getElementById('sec-'+sec.id).classList.toggle('on', curSec===sec.id);
    // done check: all zones of this section correct
    const zids=Object.keys(ZONES).filter(z=>{const ex=EXOS.find(e=>e.id===ZONES[z].exo);return ex.sec===sec.id});
    const done=zids.length>0&&zids.every(z=>TR.correct[z]);
    document.getElementById('tab-'+sec.id).classList.toggle('done',done);
  });
  // banner
  const ban=document.getElementById('sel-banner');
  if(S.sel){ban.classList.add('on');document.getElementById('sel-lbl').textContent=S.sel.lbl}
  else ban.classList.remove('on');

  const used=usedIds();

  EXOS.forEach(ex=>{
    const mount=document.getElementById('mount-'+ex.id);
    const bank=document.getElementById('bank-'+ex.id);
    mount.innerHTML=''; bank.innerHTML='';

    if(ex.type==='vf'){
      ex.rows.forEach(r=>{
        const row=document.createElement('div');row.className='rrow';
        const txt=document.createElement('div');txt.className='stxt';txt.innerHTML=r.txt;
        row.appendChild(txt);row.appendChild(mkZone(r.id,'zvf'));
        mount.appendChild(row);
      });
      ex.tiles.forEach((lbl,i)=>{
        const cls = ex.neutral ? 'tn' : (lbl==='VRAI'||lbl==='MUETTE'?'tv':'tf');
        bank.appendChild(mkTile(ex.id+'_t'+i,lbl,ex.id,cls));
      });
    }

    if(ex.type==='match'){
      ex.rows.forEach(r=>{
        const row=document.createElement('div');row.className='rrow2';
        const qc=document.createElement('div');qc.className='qcard';
        qc.innerHTML='<div class="qlbl">Question</div><div class="qtxt">'+esc(r.q)+'</div>';
        row.appendChild(qc);row.appendChild(mkZone(r.id,null,'glissez la réponse ici'));
        mount.appendChild(row);
      });
      shuffled(ex.rows,7).forEach(r=>{
        if(used.has(r.aid))return;
        bank.appendChild(mkTile(r.aid,r.a,ex.id,'ta'));
      });
      if(!bank.children.length)bank.innerHTML='<div class="bempty">Toutes les réponses sont placées !</div>';
    }

    if(ex.type==='rows'){
      ex.rows.forEach(r=>{
        const row=document.createElement('div');row.className='rrow';
        const lb=document.createElement('div');lb.className='timelbl';lb.textContent=r.lbl;
        row.appendChild(lb);
        const z=mkZone(r.id,null,'glissez l\'action ici');z.style.flex='1';
        row.appendChild(z);
        mount.appendChild(row);
      });
      shuffled(ex.bank,13).forEach(b=>{
        if(used.has(b.id))return;
        bank.appendChild(mkTile(b.id,b.l,ex.id,'ta'));
      });
      if(!bank.children.length)bank.innerHTML='<div class="bempty">Toutes les actions sont placées !</div>';
    }

    if(ex.type==='blanks'){
      ex.segs.forEach(sg=>{
        if(sg.k==='t'){mount.appendChild(document.createTextNode(sg.t))}
        else{mount.appendChild(mkBlank(sg.id))}
      });
      shuffled(ex.words,23).forEach(w=>{
        if(used.has(w.id))return;
        bank.appendChild(mkTile(w.id,w.l,ex.id,'tn'));
      });
      if(!bank.children.length)bank.innerHTML='<div class="bempty">Tous les mots sont placés !</div>';
    }
  });
  updateChip();
}
function updateChip(){
  const n=Object.keys(TR.correct).length;
  document.getElementById('prog-chip').textContent='⭐ '+n+' / '+TOTAL_ZONES;
}

// ── RESET ─────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click',()=>{
  S.pl={};S.sel=null;S.fb={};render();
});

// ── FLASHCARDS ────────────────────────────────────────────────────────
let fcIdx=0;
function fcShow(){
  const c=FC_CARDS[fcIdx];
  document.getElementById('fc-counter').textContent='Carte '+(fcIdx+1)+' / '+FC_CARDS.length;
  document.getElementById('fc-word').textContent=c.word;
  document.getElementById('fc-def').textContent=c.def;
  document.getElementById('fc-ex').innerHTML=c.ex;
  document.getElementById('fc-def').classList.add('hidden');
  document.getElementById('fc-ex').classList.add('hidden');
  document.getElementById('fc-reveal-btn').classList.remove('hidden');
}
function fcOpen(i){fcIdx=i||0;fcShow();document.getElementById('fc-overlay').classList.add('on')}
function fcOpenWord(w){const i=FC_CARDS.findIndex(c=>c.word===w);fcOpen(i>=0?i:0)}
document.getElementById('fc-reveal-btn').addEventListener('click',()=>{
  document.getElementById('fc-def').classList.remove('hidden');
  document.getElementById('fc-ex').classList.remove('hidden');
  document.getElementById('fc-reveal-btn').classList.add('hidden');
});
document.getElementById('fc-prev').addEventListener('click',()=>{fcIdx=(fcIdx-1+FC_CARDS.length)%FC_CARDS.length;fcShow()});
document.getElementById('fc-next').addEventListener('click',()=>{fcIdx=(fcIdx+1)%FC_CARDS.length;fcShow()});
document.getElementById('fc-close').addEventListener('click',()=>document.getElementById('fc-overlay').classList.remove('on'));
document.getElementById('fc-overlay').addEventListener('click',e=>{if(e.target.id==='fc-overlay')document.getElementById('fc-overlay').classList.remove('on')});

// ── GO ────────────────────────────────────────────────────────────────
buildStatic();
render();
</script>
